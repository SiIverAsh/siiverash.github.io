  intro: 花澤香菜以其清澈透明且辨识度极高的声线在声优界独树一帜，被粉丝誉为拥有「天使之声」。自幼以童星身份出道，后转型声优深耕配音领域。其音域宽广，可精准驾驭从元气少女到冷艳成熟的多元声线，演技细腻且富有层次。作为歌手亦取得非凡成就，多次登上日本武道馆举办个人演唱会，单曲屡次进入Oricon周榜前十。凭借扎实的台词功底、卓越的音乐才能与持续稳定的高质量作品输出，成为平成至令和时代最具影响力的女性声优之一，2026年版《声優名鑑》女性編连续多年收录其条目，业界地位无可撼动。
  name: 花澤香菜
