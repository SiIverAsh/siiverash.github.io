  - desc: John Snow Labs于2026年5月发布的Spark NLP 6.3.3版本，首次集成ModernBERT嵌入模型，支持原生向量数据库连接与布局感知文档处理。该版本在长文档理解与多语言NER任务上实现20%的准确率提升，并提供统一的RAG流水线API。
    tags:
