  - desc: 2026年6月最新提出的大推理模型高效推理方案。ADaPT通过Token级解耦机制，在长链推理过程中动态剪枝冗余计算，在保持推理质量的同时将解码延迟降低40%-60%。该方法无需额外训练，即插即用于现有推理模型，为推理效率优化开辟了新范式。
