algorithm:
- desc: 一种基础且直观的机器学习算法，通过树状结构对特征进行递归划分实现分类或回归。常用算法包括ID3、C4.5和CART。其可解释性强，是众多集成方法（如随机森林、梯度提升树）的基学习器，广泛用于金融风控、医疗诊断等领域。
  tags:
  - 机器学习
  - 分类
  - 回归
  - 树模型
  title: 决策树 (Decision Tree)
cv_recommend:
  agency: アイムエンタープライズ（I'm Enterprise）
  hometown: 東京都
  intro: 拥有透明感与柔和音色的实力派声优，声音辨识度极高，既能演绎温柔细腻的少女声线，也能驾驭沉稳冷静的角色。歌唱能力同样出众，多次举办个人演唱会及参与音乐活动。以自然的演技风格著称，台词表现力曾获“即使演绎语速极快的长台词也能清晰传达情感”的业界评价。为人谦逊，工作态度严谨，接受采访时曾直言“只有不断地练习才能维持并提升自己的表演水平”，在业界始终保持高人气与良好口碑。
  name: 早見沙織
date: '2026-06-06'
history:
