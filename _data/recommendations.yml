  - desc: CDNA 4 采用第二代矩阵核心（Matrix Core 2.0），支持 FP8、BF16、FP16 混合精度计算，峰值算力达 2.3 PetaFLOPS。集成
      8 通道 HBM3e 内存，带宽 6.4 TB/s，配备一致性 Fabric 互联技术，延迟降低 40%。专为 AI 训练与推理优化，能效比较前代提升
      2.5 倍。
