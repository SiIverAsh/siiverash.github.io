  Net:
  - desc: 2026 年 2 月推出的 NVIDIA Spectrum-4 交换机提供 64 个 800GbE 端口，总吞吐量 51.2Tbps，支持 RoCE
      和 NVIDIA 的 SHARP 网络计算。针对 AI 集群设计，实现微秒级延迟和自适应路由，为万卡级 GPU 互联提供网络基座。
