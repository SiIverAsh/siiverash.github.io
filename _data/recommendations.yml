llm:
- desc: DeepSeek于2026年4月发布V4系列，Pro版本采用改进的混合专家(MoE)架构，总参数量约1.6T，激活参数318B，支持100万Token超长上下文窗口。创新性引入Multi-Token
    Prediction(MTP)训练目标与Agent-Aware预训练数据配比，在SWE-bench verified上达71.2%解决率，HumanEval编码基准94.6%。推理成本仅为同类模型的1/5，已开源权重并支持HuggingFace推理。
  tags:
  - DeepSeek
  - MoE
  - 1M Context
  - Agent
  - Open Source
  title: 'DeepSeek V4 Pro: 百万Token上下文MoE旗舰，Agent场景原生优化'
new_project:
- desc: nex-agi团队开源的Nex-N2是一个专为Agentic Coding设计的AI代理框架，支持思考-行动-观察循环与长程任务执行。支持OpenAI、Anthropic、DeepSeek等多种LLM后端，内置文件系统、Shell、浏览器与Git工具链集成。N2-Pro版本在SWE-bench上取得63.8%解决率，支持多Agent协作与动态环境交互。GitHub近期快速获得开发者关注。
  tags:
  - Agent Framework
  - Coding Agent
  - Multi-Agent
  - Open Source
  - LLM
  title: 'Nex-N2: 面向Agentic Coding的开源思考-行动框架'
  url: https://github.com/nex-agi/Nex-N2
paper:
- desc: '顶会论文推荐: CVPR 2026。提出从真实世界视频中学习可迁移通用知识的自监督框架。通过视频生成作为代理任务，模型在没有任何人工标注的情况下习得物理规律、物体恒常性与空间几何先验。在机器人操控、自动驾驶感知与视频问答等下游任务中展现出卓越的零样本迁移能力，为视觉世界模型研究开辟新路径。'
  tags:
  - CVPR 2026
  - World Model
  - Video Generation
  - Transfer Learning
  title: 'VideoWorld 2: Learning Transferable Knowledge from Real-world Videos'
  url: https://openaccess.thecvf.com/content/CVPR2026/html/Ren_VideoWorld_2_Learning_Transferable_Knowledge_from_Real-world_Videos_CVPR_2026_paper.html
