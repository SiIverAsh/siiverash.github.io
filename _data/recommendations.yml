algorithm:
- desc: K-Means 是一种基于距离的无监督聚类算法，通过迭代更新聚类中心与样本分配，最小化类内平方和误差。时间复杂度 O(n·k·t)，适用于大规模数据预处理与特征压缩，是数据挖掘与计算机视觉的基础工具。
  tags:
  - 聚类
  - 无监督学习
  - 数据挖掘
  - 机器学习
  title: K-Means 聚类算法
cv_recommend:
