algorithm:
- desc: 决策树是机器学习中最经典的基础算法之一，广泛应用于分类与回归任务。其核心思想是通过递归地将数据集按特征值分裂为子集，构建树状结构，每个内部节点代表一个特征测试，每个叶节点代表预测值。常用分裂准则包括信息增益(ID3)、信息增益比(C4.5)和基尼系数(CART)。决策树具有极强的可解释性（可直接可视化为规则集），能自动处理非线性关系与特征交互。单一决策树容易过拟合，但作为随机森林与XGBoost等集成方法的基学习器，构成了现代表格数据建模的基石。
  tags:
  - 监督学习
  - 分类
  - 回归
  - 可解释AI
  title: 决策树 (Decision Tree)
