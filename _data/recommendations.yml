algorithm:
- desc: 周志华等人提出的异常检测算法，通过随机划分特征空间隔离异常点，时间复杂度O(n log n)，适用于高维数据和大规模场景。
  tags:
  - 异常检测
  - 集成方法
  - 无监督
  - 高效
  title: 孤立森林 (Isolation Forest)
