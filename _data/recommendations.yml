llm:
- desc: 面壁智能于2026年5月开源MiniCPM-V 4.6，仅1.3B参数却支持视觉-语言多模态推理，运行仅需6GB显存，在OCR、图表理解等任务上接近数十倍参数量模型性能，专为移动端与边缘设备优化。
  tags:
  - Multimodal
  - On-Device AI
  - Open Source
  - MiniCPM
  - 1.3B
  title: MiniCPM-V 4.6：1.3B参数端侧多模态大模型
new_project:
- desc: OpenManus是一个模块化多智能体框架，支持任务规划、工具调用与记忆管理，旨在成为Manus的开放替代品，已获超20,000 GitHub Stars，活跃社区持续构建跨平台AI助手应用。
  tags:
  - AI Agent
  - Open Source
  - Multi-Agent
  - Python
  title: OpenManus：开源通用AI Agent框架
  url: https://github.com/FoundationAgents/OpenManus
paper:
- desc: CVPR 2026 Oral论文，提出无需训练即可实现跨域医学肿瘤分割的方法，结合解剖学推理与统计拒绝机制，在多个OOD数据集上超越现有监督方法，显著提升模型对未知病灶的泛化能力。
  tags:
  - Medical Image Segmentation
  - OOD Generalization
  - Anatomical Reasoning
  - CVPR 2026
  title: 'R²Seg: Training-Free OOD Medical Tumor Segmentation via Anatomical Reasoning
    and Statistical Rejection'
  url: https://arxiv.org/abs/2511.12691
