  News:
  - desc: 美国商务部于 2026 年 3 月正式批准向英特尔提供 85 亿美元直接资金，用于亚利桑那州和俄亥俄州的先进制程晶圆厂建设。该补贴是《芯片与科学法案》下最大单笔拨款，旨在增强美国本土半导体制造能力。
    tags:
