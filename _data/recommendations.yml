  News:
  - desc: 台积电在2026年北美技术研讨会上首次披露A13节点细节，该工艺属于2nm级别，采用增强型纳米片晶体管，并延续使用现有EUV光刻设备，无需High-NA即可实现性能和密度提升。A13计划于2029年量产，将支撑下一代AI与高性能计算芯片。
    tags:
