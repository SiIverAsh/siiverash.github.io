algorithm:
- desc: K-Means是最经典的无监督学习算法之一，由Stuart Lloyd于1957年提出（1982年正式发表）。算法通过迭代优化将n个数据点划分到k个簇中，使得簇内平方和(WCSS)最小化。核心步骤包括：(1)随机初始化k个质心；(2)将每个点分配到最近质心；(3)重新计算各簇的质心位置；(4)重复直至收敛。K-Means的时间复杂度为O(n·k·d·i)，其中n为样本数、k为簇数、d为维度、i为迭代次数。该算法广泛应用于客户分群、图像压缩、异常检测与文档聚类。其关键局限性在于需预先指定k值、对初始质心敏感，且假设簇为球形分布。K-Means++初始化与Elbow
    Method是常用的工程改进手段。
  tags:
  - Unsupervised Learning
  - Clustering
  - Lloyd's Algorithm
  - WCSS Minimization
  - Elbow Method
  title: K-Means聚类 (K-Means Clustering)
