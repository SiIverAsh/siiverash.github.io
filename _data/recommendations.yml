  year: '1815'
- event: 美国飞行员Amelia Earhart作为乘客搭乘飞机从纽芬兰飞抵威尔士，成为首位飞越大西洋的女性
  year: '1928'
- event: 物理学家Sally Ride搭乘挑战者号航天飞机执行STS-7任务，成为美国首位进入太空的女性宇航员
  year: '1983'
- event: 刘强东在北京中关村创立京东商城（JD.com），后发展为中国最大的自营式电商平台之一
  year: '1998'
- event: 美国天文学家宣布在仙女座星系中发现首个中等质量黑洞（约5000倍太阳质量），填补了恒星级与超大质量黑洞之间的空白
  year: '2002'
