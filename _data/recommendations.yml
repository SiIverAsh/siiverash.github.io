    - 3D Reconstruction
    - Transformer
    - Point Cloud
    - Single-View
    title: 'RnG: A Unified Transformer for Complete 3D Modeling from Partial Observations'
  GPU:
  - desc: NVIDIA于COMPUTEX 2026发布RTX Spark处理器，首次将Grace ARM CPU与Blackwell GPU集成于单一SoC，通过NVLink-C2C实现统一内存架构，提供高达1
      PetaFLOP的AI算力。该芯片由联发科协助设计，原生支持Windows on ARM与x86模拟，内置RTX GPU光线追踪核心及DLSS 4.5支持，并集成NPU处理本地AI
      Agent工作负载，定位为Agentic AI时代的个人AI超算处理器。
    tags:
