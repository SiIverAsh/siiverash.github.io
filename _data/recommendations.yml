  year: 1777年
- event: 第二次世界大战中，德国军队未经抵抗进入巴黎，法国政府被迫迁往波尔多
  year: 1940年
- event: 第45任美国总统唐纳德·特朗普出生于纽约市皇后区
  year: 1946年
- event: 中华人民共和国第一届全国人民代表大会通过《中华人民共和国宪法》，确立国旗、国徽与国歌
  year: 1954年
- event: 福克兰战争（马岛战争）结束，阿根廷驻军向英军投降，历时74天的冲突正式终结
  year: 1982年
- event: 伦敦格伦费尔塔高层住宅发生重大火灾，引发全球对建筑防火材料安全性的反思与法规修订
  year: 2017年
llm:
- desc: 2026年6月Anthropic发布Claude Fable 5，为Mythos系列首款面向公众的模型。采用改进的Constitutional AI对齐框架，支持200K
    Token上下文窗口，在数学推理（GSM8K 97.2%）、代码生成（HumanEval 95.8%）与多语言理解任务上全面超越前代。支持工具调用与结构化输出。
  tags:
  - Claude Fable 5
  - Anthropic
  - Mythos
  - 200K上下文
  title: Anthropic Claude Fable 5：Mythos级通用推理模型首次公开
new_project:
- desc: 2026年6月GitHub趋势榜首。系统化上下文工程工具包，提供Prompt模板管理、上下文窗口优化、动态信息注入与多Agent上下文共享框架。支持OpenAI、Claude、DeepSeek等多后端，内置上下文压缩与缓存策略，显著降低长对话Token消耗。
  tags:
  - 上下文工程
  - Prompt优化
  - 多Agent
  - 开源
  title: davidkimai/Context-Engineering
  url: https://github.com/davidkimai/Context-Engineering
paper:
- desc: ICLR 2026 Outstanding Paper。首次系统性揭示大语言模型在多轮对话中存在严重的「迷失」现象：随对话轮次增加，模型逐步偏离初始指令与上下文约束，核心原因在于注意力机制的长程衰减与KV缓存累积误差。提出Turn-Level
    Attention Rescaling（TAR）方法，在10+轮对话中任务完成率提升27%。
  tags:
  - ICLR 2026
  - 多轮对话
  - 注意力衰减
  - LLM
  title: LLMs Get Lost In Multi-Turn Conversation
  url: https://openreview.net/forum?id=VKGTGGcwl6
