algorithm:
- desc: 经典无监督学习算法，目标是将n个d维样本划分至K个簇，最小化簇内平方误差和（WCSS）。标准Lloyd迭代算法每轮复杂度O(nKd)，交替执行分配步（将每个点归入最近质心）与更新步（重新计算簇质心）。广泛应用于向量量化（VQ）、客户分群、图像压缩等领域。关键局限性包括需预设K值、对初始质心敏感、仅发现凸球形簇。K-Means++初始化可提供O(log
    K)近似比保证。
  tags:
  - Clustering
  - Unsupervised Learning
  - Vector Quantization
  - Lloyd's Algorithm
  title: K-Means聚类 (K-Means Clustering)
cv_recommend:
  agency: ラクーンドッグ（Raccoon Dog）
  hometown: 埼玉県
  intro: 1998年4月30日出生于埼玉县，2014年通过选拔进入声优业界。音质清澈通透且具透明感，既能演绎温柔内敛的少女角色，也能出色胜任少年角色，声线跨度在同代声优中极为突出。2019年荣获第13届声优奖新人女优赏，标志着业界对其演技实力的高度认可。表演风格以情感表达细腻自然著称，在沉静独白与情绪爆发场景之间切换自如，擅于通过微妙的语气变化传递角色内心层次。历经十余年磨练，已成为平成世代最具代表性的实力派女性声优之一，持续活跃于配音、旁白、广播剧等多个领域。
  name: 石見舞菜香
date: '2026-05-20'
history:
- event: 葡萄牙航海家瓦斯科·达·伽马抵达印度卡利卡特（Calicut），成功开辟欧洲经好望角直达亚洲的海上新航线，标志全球化贸易时代开端。
  year: '1498'
- event: 17国代表在巴黎签署《米制公约》（Metre Convention），成立国际计量局（BIPM），确立国际单位制（SI）的法理基础。5月20日后被定为'世界计量日'。
  year: '1875'
- event: 托马斯·爱迪生首次公开展示活动电影放映机（Kinetoscope），采用连续胶片循环播放技术，被视为电影放映技术的先驱原型。
  year: '1891'
- event: 查尔斯·林德伯格驾驶'圣路易斯精神号'单翼机从纽约罗斯福机场起飞，历经33.5小时不着陆飞行抵达巴黎，完成人类史上首次单人横跨大西洋飞行。
  year: '1927'
- event: 《科学》（Science）期刊发表法国巴斯德研究所吕克·蒙塔尼耶团队论文，首次报道分离出导致艾滋病的逆转录病毒（后命名为HIV-1），奠定艾滋病研究基础。
  year: '1983'
- event: 哈勃太空望远镜（HST）传回WF/PC相机拍摄的首批科学图像（First Light），分辨率达0.1角秒级，开启空间光学天文学新纪元，深刻改变人类对宇宙的认知。
  year: '1990'
llm:
- desc: 智谱AI于2026年5月13日发布的最新一代旗舰大模型，首次将LLM能力从短时交互延伸至8小时级连续自治工程任务执行。核心创新包括：多轮自我纠错机制（每步输出自评估，最多回溯修正数百次）、分层任务规划器、持久化工作记忆模块。开源版本在SWE-Bench
    Verified上得分率达71.3%，在编程与长程推理基准上对标GPT-5级别性能。
  tags:
  - GLM-5.1
  - Zhipu AI
  - Long-Horizon Agent
  - Open Source
  title: 智谱GLM-5.1：突破8小时自治工程任务的旗舰Agent模型
new_project:
- desc: 开源AI Agent记忆管理框架（GitHub 20K+ Stars），提供三级记忆系统：短期（会话内上下文窗口管理）、长期（向量化语义检索）与图记忆（实体关系图谱），支持与LangChain、AutoGen、CrewAI等主流Agent框架的一行代码集成。核心特性包括自适应记忆压缩、时间衰减加权检索、细粒度访问控制，实现跨会话持久化与个性化Agent行为。采用FastAPI+PostgreSQL+pgvector技术栈。
  tags:
  - AI Agent
  - Memory Layer
  - Open Source
  - Vector Search
  title: mem0：AI Agent通用记忆层
  url: https://github.com/mem0ai/mem0
paper:
- desc: ACL 2026最佳论文奖（Best Paper Award）。Amazon研究团队提出超越概率分布层面Token级统计的LLM公平性量化框架，创新性地将语义等价类与统计假设检验引入模型偏见测量，证明仅比较输出Token分布无法捕捉深层语义歧视。在12个主流开源/闭源LLM上的大规模实验揭示：当前模型在语义层面的群体间差异化对待比Token层面严重2.7-4.3倍。
  tags:
  - ACL 2026
  - Best Paper
  - LLM Fairness
  - Semantic Analysis
  title: 'Quantifying Fairness in LLMs Beyond Tokens: A Semantic and Statistical Perspective'
  url: https://arxiv.org/abs/2506.19028
