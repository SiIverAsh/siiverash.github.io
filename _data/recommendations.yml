algorithm:
- desc: 经典集成学习算法，通过Bootstrap采样构建多棵决策树并投票输出结果。核心优势：天然抗过拟合、可处理高维特征、提供特征重要性排序。适用场景涵盖分类、回归与异常检测，是Kaggle竞赛中长期霸榜的基线模型，也是工业级表格数据建模的首选算法之一。
  tags:
  - Ensemble Learning
  - Bagging
  - Classification
  - Feature Importance
  title: 随机森林 (Random Forest)
cv_recommend:
  agency: 81プロデュース
  hometown: 富山県
  intro: 1994年1月17日出生于富山县，2012年通过第6届81Audition特别赏进入声优界，现隶属81 Produce。声线清澈透明且辨识度极高，擅长在温柔与冷峻之间自如切换，从治愈系少女到复杂内敛角色皆能精准驾驭。2019年获第13届声优奖新人女优赏，2021年再获第15届声优奖助演女优赏，实力备受业界认可。歌唱事业签约Lantis，唱功扎实，现场表现稳定。
  name: 上田麗奈
date: '2026-06-09'
history:
- event: 中英签署《展拓香港界址专条》，清政府将香港新界及235个岛屿租借给英国，租期99年。
  year: '1898'
- event: 美国国务卿威廉·詹宁斯·布莱恩因反对威尔逊总统对德强硬政策而辞职。
  year: '1915'
- event: 唐老鸭(Donald Duck)在迪士尼动画短片《聪明的小母鸡》中首次亮相。
  year: '1934'
- event: 普密蓬·阿杜德登基成为泰国国王(拉玛九世)，在位70年至2016年。
  year: '1946'
- event: 美国海军首艘弹道导弹核潜艇「乔治·华盛顿号」(SSBN-598)下水。
  year: '1959'
- event: 传奇赛马「秘书处」(Secretariat)以31个马位优势赢得贝尔蒙特大奖赛，完成三冠王壮举。
  year: '1973'
llm:
- desc: NVIDIA发布Nemotron 3 Ultra，采用Hybrid Mamba-Transformer架构的混合专家模型(MoE)，总参数5500亿，激活参数550亿。支持NVFP4原生精度推理，在BFCL、SWE-bench等Agent基准上超越GPT-5，单卡H200即可运行。开源权重已发布于Hugging
    Face。
  tags:
  - NVIDIA
  - Nemotron
  - MoE
  - Mamba-Transformer
  title: 'NVIDIA Nemotron 3 Ultra: 550B MoE混合Mamba-Transformer'
new_project:
- desc: TypeScript原生多智能体编排框架。输入自然语言目标即可自动生成任务DAG并协调多个Agent执行。原生支持MCP协议，内置实时可视化追踪面板。仅三个运行时依赖(OpenAI
    SDK、Zod、D3.js)，零配置启动，适合快速搭建复杂Agent工作流。
  tags:
  - Multi-Agent
  - MCP
  - TypeScript
  - Task Orchestration
  title: open-multi-agent
  url: https://github.com/open-multi-agent/open-multi-agent
paper:
- desc: CVPR 2026 Honorable Mention。提出从2D图像/视频中直接提取3D物体与人物交互轨迹的统一框架，无需3D训练数据即可生成高质量纹理网格，开源代码已发布。
  tags:
  - CVPR 2026
  - 3D Reconstruction
  - Segment Anything
  - Zero-Shot 3D
  title: 'SAM 3D: 3Dfy Anything in Images'
  url: https://arxiv.org/abs/2511.16624
tech:
  Arch:
  - desc: RISC-V International批准RVA23应用处理器Profile标准，首次强制要求Hypervisor扩展、Vector 1.0向量指令集、密码学扩展及指针掩码(Pointer
      Masking)特性。标志着RISC-V在服务器与移动端具备完整的操作系统级虚拟化与安全能力，为RISC-V进军主流计算市场奠定ISA基础。
    tags:
    - RISC-V
    - RVA23
    - ISA Standard
    - Hypervisor
    title: RISC-V RVA23 Profile正式获批
  Audio:
  - desc: k2-fsa团队提出全语种零样本TTS模型。基于扩散语言模型架构，在单一模型中统一100+语言的语音合成，仅需3秒参考音频即可实现跨语种音色克隆。采用Flow
      Matching训练范式与多语言音素对齐策略，在MOS评分上达到4.31，接近真人录音水平。
    tags:
    - TTS
    - Diffusion Language Model
    - Zero-Shot
    - Multilingual Speech
    title: 'OmniVoice: Towards Omnilingual Zero-Shot Text-to-Speech with Diffusion
      Language Models'
  CPU:
  - desc: Qualcomm在Computex 2026展示Snapdragon X2 Elite旗舰PC处理器。基于TSMC N3P工艺，集成12个Oryon
      V3性能核+6个效率核共18核心，单核加速4.3GHz。Hexagon NPU提供45+ TOPS AI算力，Adreno 830 GPU支持LPDDR5X-8533。Geekbench
      6单核超越Apple M4约8%，多核领先Intel Lunar Lake旗舰35%，NVFP4原生精度支持端侧70B模型推理。
    tags:
    - ARM PC
    - Qualcomm
    - Oryon V3
    - TSMC N3P
    title: 'Qualcomm Snapdragon X2 Elite: 18核Oryon V3挑战x86霸权'
  Computer Vision:
  - desc: CVPR 2026 Honorable Mention。Meta FAIR提出，基于Segment Anything的三维扩展，可从单张RGB图像或视频中提取物体的3D几何、外观及人-物交互轨迹。采用多视图扩散先验与可微渲染联合优化，无需3D监督即可生成带纹理的高质量3D网格，支持开放词汇3D分割。
    tags:
    - CVPR 2026
    - 3D Vision
    - Segment Anything
    - Meta FAIR
    title: 'SAM 3D: 3Dfy Anything in Images'
  GPU:
  - desc: Intel于Computex 2026正式发布Arc G3系列，面向Windows掌机市场。旗舰型号Arc G3 Extreme集成8个Xe3核心(Xe-LPG+架构)，GPU最高频率4.70GHz，配备12MB
      L2缓存，支持LPDDR5X-8533内存。原生支持XeSS 2超分与DX12 Ultimate，实测Steam Deck同级功耗下性能领先AMD Z2
      Extreme约25%。
    tags:
    - Intel Arc
    - Xe3 Architecture
    - Handheld Gaming
    - XeSS 2
    title: 'Intel Arc G3 Extreme: Xe3架构掌机专用芯片'
  Lang:
  - desc: 2026年6月3日发布。引入基于集合论的类型系统(Set-Theoretic Types)，支持编译期渐进类型检查与类型推断。新增`defstruct`类型注解语法，函数签名可携带完整类型信息。编译器利用类型信息优化模式匹配分支，在Phoenix框架基准测试中吞吐量提升12-18%。
    tags:
    - Elixir
    - Gradual Typing
    - BEAM VM
    - Set-Theoretic Types
    title: 'Elixir 1.20: 正式成为渐进类型语言'
  NLP:
  - desc: EACL 2026长文。揭示LLM的多语言知识天然存在于高度稀疏的低维子空间中，提出基于稀疏自编码器的多语言可控框架SparseLang，仅需调整不足0.1%的参数即可实现细粒度语言风格切换，在保持生成质量的同时将推理开销降低67%，为LLM多语言解释性开辟新范式。
    tags:
    - EACL 2026
    - Multilingual NLP
    - Sparse Autoencoder
    - LLM Interpretability
    title: 'Language Lives in Sparse Dimensions: Toward Interpretable and Efficient
      Multilingual Control for Large Language Models'
  Net:
  - desc: NVIDIA在MWC 2026后披露自研6G无线单元(RU)芯片路线图，将AI推理加速器直接嵌入射频前端，支持实时频谱感知与波束赋形优化。与Nokia达成战略合作，目标2028年实现AI-Native
      6G基站商用部署，峰值速率突破1Tbps，时延低于0.1ms。
    tags:
    - 6G
    - AI-RAN
    - NVIDIA
    - Nokia
    title: NVIDIA与Nokia联合推进AI-RAN 6G无线单元芯片
  News:
  - desc: 北京时间6月9日凌晨，Apple在WWDC 2026正式发布全新Siri AI对话助手。基于此前1月公布的10亿美元Google Gemini合作协议，Siri
      AI深度融合Gemini 3 Ultra多模态能力，支持跨应用自然语言任务编排、屏幕内容理解与主动式建议。同步发布Apple Intelligence
      2.0，引入端侧70亿参数小模型与私有云计算混合推理架构，iOS 27/macOS 26即日起推送Developer Beta。
    tags:
    - Apple
    - WWDC 2026
    - Siri AI
    - Google Gemini
    title: 'Apple WWDC 2026: Siri AI诞生，Google Gemini十亿美元联姻落地'
