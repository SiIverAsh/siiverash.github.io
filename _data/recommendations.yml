algorithm:
- desc: DBSCAN（Density-Based Spatial Clustering of Applications with Noise）是一种基于密度的聚类算法，无需预先指定簇数量，能有效识别噪声点。适用于空间数据聚类，时间复杂度为O(n
    log n)。
  tags:
  - 聚类算法
  - 无监督学习
  - 密度聚类
  - 机器学习
  title: 'DBSCAN: 基于密度的聚类算法'
