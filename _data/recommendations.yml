algorithm:
- desc: K-Means 是一种基于划分的聚类算法，通过迭代优化将 n 个样本划分到 K 个簇中，最小化簇内平方误差 (Inertia)。核心步骤包括初始化质心、分配样本到最近质心、更新质心位置。Lloyd
    算法保证局部收敛，时间复杂度 O(n·K·d·i)。广泛用于客户分群、图像压缩与异常检测等场景。K-Means++ 初始化策略显著改善收敛质量。
  tags:
  - Clustering
  - Unsupervised-Learning
  - K-Means
  - ML-Basics
  title: 'K-Means 聚类: 无监督学习基石'
cv_recommend:
  agency: 81プロデュース
  hometown: 埼玉県
  intro: 高橋李依是日本当下最具代表性的实力派女性声优之一。她自幼对表演艺术抱有浓厚兴趣，高中毕业后通过选拔进入 81 プロデュース 附属养成所接受系统训练，由此正式踏入声优行业。她的声线清亮通透，具有极高的辨识度与感染力，能够精准驾驭从活力少女到沉稳成年女性的宽幅角色类型，尤其擅长在情感爆发场景中呈现细腻的层次变化。2018
    年，她凭借多年的扎实积累荣获第 12 回声优奖「主演女优赏」，这一荣誉充分肯定了她在行业内的卓越表现。除配音工作外，高橋李依亦以歌手身份活跃，发行的多张个人单曲与专辑均获得好评，展现出不俗的音乐素养。她始终保持谦逊敬业的工作态度，录音现场常以严谨的准备与灵活的即兴反应赢得制作团队的信任，被视为同世代声优中的标杆人物。
  name: 高橋李依
date: '2026-05-31'
