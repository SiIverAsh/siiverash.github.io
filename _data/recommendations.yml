  NLP:
  - desc: EACL 2026长文论文，提出利用篇章图结构引导大语言模型进行文档级翻译。该方法通过构建源文档的篇章关系图（Discourse Graph），显式建模段落间的逻辑连接（因果、转折、并列等），使LLM在翻译长文档时保持篇章连贯性与语义一致性。在多个语言对的文档翻译基准上显著优于传统句子级方法。
    tags:
