  - Rails
  - Privacy
  title: Maybe Finance — 开源个人财务管理平台
  url: https://github.com/maybe-finance/maybe
paper:
- desc: ICLR 2025 获奖论文。提出视觉自回归建模范式，将图像生成重新定义为「下一尺度预测」而非传统「下一 token 预测」。采用多尺度 VQVAE
    编码器，从 1×1 token map 逐步预测至完整分辨率，实现扩散模型级别的生成质量，同时推理速度提升约 20 倍。该工作为视觉生成领域开辟了超越扩散模型的全新技术路线。
  tags:
  - ICLR 2025
  - Image Generation
  - Autoregressive
  - Scaling Law
  title: 'VAR: Visual Autoregressive Modeling — Scalable Image Generation via Next-Scale
    Prediction'
  url: https://arxiv.org/abs/2404.02905
