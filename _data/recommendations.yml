  - desc: Arm于2026年6月Computex期间正式发布AGI CPU——公司历史上首款自研物理芯片产品。基于Neoverse V3架构，采用Armv9.4-A指令集，单插槽集成最多128个定制核心，支持SVE3向量扩展与机密计算。搭配HBM3e内存控制器与CXL
      3.1互连，专为大规模Agentic AI推理与云计算设计，支持SuperMicro双路参考服务器平台。
    tags:
    - Arm
