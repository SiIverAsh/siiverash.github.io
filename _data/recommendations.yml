    title: Intel Diamond Rapids Xeon 7：192核服务器CPU架构曝光
  Audio:
  - desc: Qwen团队于2026年初发布Qwen3-TTS开源系列，支持流式语音生成、自由声线设计与高保真语音克隆。模型采用自回归+Non-Autoregressive混合架构，在语音自然度(MOS
      4.5+)和说话人相似度(SIM 0.92+)上达到商用水平。支持零样本声音克隆仅需3秒参考音频，并提供完整的微调工具链与ONNX/OpenVINO部署方案。
    tags:
    - Text-to-Speech
    - Voice Cloning
    - Streaming TTS
    - Qwen3 Open-Source
    title: Qwen3-TTS：阿里云开源流式语音合成系列模型
  CPU:
  - desc: AMD于CES 2026正式展示代号Venice的第六代EPYC处理器，采用TSMC N2(2nm)工艺制造，最高配备256个Zen 6C密集核心/512线程，8个CCD每个可配置128MB
      L3缓存，总L3缓存高达1GB。相较前代Turin(Dense)，整数性能提升70%，浮点性能提升80%，支持DDR5-6400 12通道内存与PCIe
      6.0。计划2026年下半年量产，专为AI推理与超大规模云计算优化。
    tags:
    - AMD EPYC Venice
    - Zen 6C 256核
    - TSMC 2nm N2
    - Server CPU
    title: AMD EPYC Venice (Zen 6)：业界首款2nm服务器CPU，256核巨兽
  Computer Vision:
  - desc: Meta AI与牛津VGG联合提出的前馈式3D几何估计Transformer，仅需单次前向传播即可从2D图像中直接预测高精度3D点云、相机参数与深度图，无需3D先验或迭代优化。在多个3D重建基准上超越传统Bundle
      Adjustment方法，推理速度提升数个数量级，标志着3D视觉从优化驱动到前馈驱动的范式转变。
    tags:
    - CVPR 2025 Best Paper
    - 3D Reconstruction
    - Feed-Forward Transformer
    - Meta AI & Oxford VGG
    title: 'VGGT: Visual Geometry Grounded Transformer (CVPR 2025 Best Paper)'
  GPU:
  - desc: NVIDIA于2026年4月正式发布RTX 5060 Ti，基于Blackwell GB206-300 GPU核心，搭载4608个CUDA Core、144个Tensor
      Core和36个RT Core，配备16GB GDDR7显存（128-bit位宽，448GB/s带宽），TDP 180W。支持DLSS 4多帧生成与神经网络渲染，4K游戏中帧率相比RTX
      4060 Ti提升2.3倍，首发定价约399美元（16GB版），是目前Blackwell架构最具性价比的AI与游戏双栖显卡。
    tags:
