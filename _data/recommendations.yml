    - 天玑
    title: 联发科发布天玑9400+旗舰芯片
  Audio:
  - desc: 基于500万小时多语言语音数据训练，支持3秒语音克隆与细粒度情感、音色调控。采用扩散模型与Transformer结合架构，首包延迟仅97ms，MOS评分达4.5，同时开源32B参数量版本，支持实时端侧部署。
