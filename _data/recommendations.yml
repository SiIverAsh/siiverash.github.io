llm:
- desc: Meta 开源 Llama 4 系列中的 Maverick 模型 (402B 总参数，17B 活跃参数)，采用 Mixture-of-Experts
    架构，支持文本与图像的多模态理解。在 MMLU-Pro 与 HumanEval+ 等基准上逼近 GPT-5，为开源社区提供可商用级的多模态推理能力。
  tags:
  - Llama4
  - MoE
  - Multimodal
  - Open-Source
  title: 'Llama 4 Maverick: 402B MoE 开源多模态模型'
new_project:
- desc: Astral 团队用 Rust 重写的 Python 包管理器，替代 pip、pip-tools 与 virtualenv。采用全局缓存与增量解析策略，依赖解析速度较
    pip 快 10-100 倍，内置虚拟环境管理、锁文件支持与 PEP 723 内联脚本元数据，2025 年 GitHub Star 增长最快的 Python
    工具之一。
  tags:
  - uv
  - Python
  - Rust
  - Package-Manager
  title: 'uv: 极速 Python 包与项目管理器'
  url: https://github.com/astral-sh/uv
paper:
- desc: 顶会论文推荐：Stability AI 提出的基于校正流 (Rectified Flow) 的扩散 Transformer 架构，通过改进的噪声调度和
    Transformer 骨干网络，在文生图任务上实现高分辨率 (1024×1024) 直接生成，无需级联或超分网络。引入 T5-XXL 文本编码器与 dual-stream
    注意力机制，在视觉质量与文本对齐上显著优于此前方法。
  tags:
  - Rectified-Flow
  - DiT
  - Text-to-Image
  - ICML2024
  title: Scaling Rectified Flow Transformers for High-Resolution Image Synthesis
  url: https://arxiv.org/abs/2403.03206
tech:
  Arch:
  - desc: Universal Chiplet Interconnect Express 2.0 规范于 2025 年 Q2 发布，新增 3D 堆叠互连支持，每引脚速率提升至
      64 GT/s，支持标准化测试与可管理性协议。为异构集成芯片 (Intel Arrow Lake、AMD Strix Halo 等) 提供跨厂商兼容的
      Die-to-Die 互连基础。
    tags:
    - UCIe2.0
    - Chiplet
    - 3D-Stacking
    - Interconnect
    title: 'UCIe 2.0: 通用芯粒互连标准'
  Audio:
  - desc: 基于 Flow Matching 的非自回归语音生成模型，支持 TTS、语音降噪、风格迁移、跨语言语音转换等六大任务，无需针对特定任务微调。在
      LibriSpeech 上词错率 (WER) 低至 1.9%，跨语言风格迁移自然度 MOS 达 4.3。
    tags:
    - Voicebox
    - Flow Matching
    - TTS
    - Meta
    title: 'Meta Voicebox: 多任务语音生成基础模型'
  CPU:
  - desc: 采用 Lion Cove P-core + Skymont E-core 混合架构，台积电 N3B 工艺。8P+16E 共 24 核心 24 线程，P-core
      最大睿频 5.7 GHz，配备 36MB L3 Cache，内置 NPU 4 提供 13 TOPS AI 算力，支持 LGA 1851 平台与 DDR5-6400。
    tags:
    - ArrowLake
    - LionCove
    - TSMC-N3B
    - NPU
    title: 'Intel Core Ultra 9 285K: Arrow Lake 旗舰'
  Computer Vision:
  - desc: Meta 推出的第二代分割一切模型，将提示式分割从静态图像扩展到视频领域。基于流式记忆架构 (Streaming Memory)，在单帧交互延迟小于
      50ms 的前提下实现对任意长度视频的目标追踪与分割，支持点、框、掩码三种提示方式，零样本泛化能力较 SAM 1 提升 40%+。
    tags:
    - SAM2
    - Video Segmentation
    - Zero-Shot
    - Meta
    title: 'SAM 2: Segment Anything in Images and Videos'
  GPU:
  - desc: 基于 GB206-300 GPU，Blackwell 架构，台积电 4NP 制程。配备 4,608 个 CUDA 核心，16GB GDDR7 显存，128-bit
      位宽，带宽 448 GB/s。支持 DLSS 4 多帧生成与 Reflex 2，TGP 180W，PCIe 5.0 x8 接口。
    tags:
    - RTX5060Ti
    - Blackwell
    - GDDR7
    - DLSS4
    title: 'NVIDIA GeForce RTX 5060 Ti: Blackwell 中端主力'
  Lang:
  - desc: Modular 公司推出的 Mojo 语言融合 Python 语法与底层系统性能，支持 SIMD 向量化、自动调优 (autotune) 和零成本抽象。通过
      MLIR 编译器框架实现与 Python 生态的无缝互操作，在矩阵乘法等核心计算上性能可达纯 Python 的 35,000 倍。
    tags:
    - Mojo
    - MLIR
    - Systems-Programming
    - Python
    title: 'Mojo: Python 兼容的系统编程语言'
  NLP:
  - desc: Meta 于 2025 年 4 月发布 Llama 4 系列，包含 Scout (109B)、Maverick (402B) 和 Behemoth
      (2T) 三个规模。首次在 Llama 系列中引入原生多模态能力，支持图文交错理解与生成。采用 Mixture-of-Experts 架构，推理时仅激活部分参数，Scout
      模型可在单张 H100 上高效运行。
    tags:
    - Llama4
    - MoE
    - Multimodal
    - Open-Source
    title: 'Llama 4: Meta 开源多模态大模型'
  Net:
  - desc: IEEE 802.11bn 标准草案推进中，聚焦超高可靠性而非单纯峰值速率提升。引入多接入点协调波束成形 (Co-BF)、多链路操作增强 (MLO+)
      和分布式 MU-MIMO，目标将 99.999% 可靠性下的时延控制在 1ms 以内，面向工业自动化和 XR 实时交互场景。
    tags:
    - WiFi8
    - 802.11bn
    - Ultra-Reliability
    - MLO
    title: 'Wi-Fi 8 (802.11bn): 超高可靠性无线接入'
  News:
  - desc: 台积电于 2026 年 Q2 宣布 N2 节点进入风险量产阶段，采用全环绕栅极 (GAA) 纳米片晶体管结构，相较 N3 节点在同等功耗下性能提升
      15%，同等性能下功耗降低 30%，逻辑密度提升 1.15 倍。苹果 A20 与 Intel Nova Lake 预计首批采用。
    tags:
    - TSMC
    - N2
    - GAA
    - Nanosheet
    title: 台积电 2nm (N2) 工艺进入风险量产
