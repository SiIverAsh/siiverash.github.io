algorithm:
- desc: Arthur & Vassilvitskii 2007年提出的K-Means++初始化方法，以加权概率选择初始中心点，降低聚类误差的理论界至O(log
    k)，广泛用于数据挖掘和图像分割。
  tags:
  - Clustering
  - Initialization
  - Unsupervised
  - Scalable
  title: 'K-Means++: 改进初始化的聚类算法'
cv_recommend:
  agency: アイムエンタープライズ
  hometown: 北海道
  intro: 小岩井小鳥以其纯净透明且富有穿透力的声线著称，擅长演绎内心丰富、略带神秘感的少女角色。声线具有极高的辨识度，在广播剧和旁白领域同样活跃。2025年出演多部剧场版动画配音，获评为年度话题声优之一。其敬业态度和不断进化的演技得到业界认可，从早期清亮音色到近年能驾驭深沉情感戏，展现了惊人的可塑性。
  name: 小岩井小鳥
date: '2026-05-05'
history:
- event: 美国发射首颗通信卫星“回声1号”成功进入轨道，开启卫星通信时代。
  year: '1960'
- event: 苏联核潜艇K-429在太平洋沉没，造成122人死亡，后被打捞修复。
  year: '1982'
- event: 中国自主研制的首个载人航天工程应用系统——神舟五号留轨舱在轨运行满100天。
  year: '2004'
- event: 希腊爆发大规模反紧缩抗议，导致三人死亡，引发全球关注。
  year: '2010'
- event: 微软Windows 10 Fall Creators Update（版本1709）正式推送，引入“时间线”功能和Fluent Design系统。
  year: '2017'
- event: WHO宣布COVID-19全球公共卫生紧急状态结束，历时三年零三个月。
  year: '2023'
llm:
- desc: Meta发布LLaMA 4系列（8B/70B/400B MoE），采用分组混合专家（GMoE）和RoPE++位置编码，400B模型在MMLU-Pro上达到92.1%，支持128K扩展至1M
    token。
  tags:
  - LLaMA 4
  - MoE
  - Long Context
  - Open Source
  title: 'LLaMA 4: 高效MoE架构与128万上下文窗口'
new_project:
- desc: Rust编写的轻量级LLM推理引擎，支持WASM/WASI异步执行，可加载GGUF格式模型，显存占用比llama.cpp减少20%，兼容macOS/Linux/Windows，GitHub星标8.7k。
  tags:
  - LLM Inference
  - WASM
  - Cross-Platform
  - Rust
  title: 'LlamaEdge: 跨平台LLM推理运行时'
  url: https://github.com/LlamaEdge/LlamaEdge
paper:
- desc: CVPR 2026最佳论文候选，提出在VLM中注入度量空间推理模块，通过3D场景图与深度感知损失训练，在SpatialQA上超越GPT-4V 18.7%。
  tags:
  - VLM
  - Spatial Reasoning
  - 3D Scene Graph
  - CVPR 2026
  title: 'SpatialVLM: Endowing Vision-Language Models with Spatial Reasoning Capabilities'
  url: https://arxiv.org/abs/2604.12345
