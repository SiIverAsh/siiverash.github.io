  title: 'XGBoost: 可扩展的梯度提升系统'
cv_recommend:
  agency: 青二プロダクション (Aoni Production)
  hometown: 爱知县
  intro: 她拥有透明感且细腻的演技，能够驾驭从少女到成熟女性的广泛角色。2023年荣获第17届声优奖主演女声优奖与助演女声优奖，成为史上首位同时获得两项大奖的声优，展现了极高的实力与认可度。她在业界以扎实的台词功底和情感表现力著称，持续活跃于动画、游戏及外语影视配音领域，是当代日本声优界的中坚力量。
  name: 种崎敦美 (Tanezaki Atsumi)
date: '2026-05-07'
history:
- event: 贝多芬《第九交响曲》在维也纳首演。
  year: '1824'
- event: 英国客轮卢西塔尼亚号被德国潜艇击沉，造成1198人死亡。
  year: '1915'
- event: 德国无条件投降，二战欧洲战场结束。
  year: '1945'
- event: 越南奠边府战役胜利，标志第一次印度支那战争结束。
  year: '1954'
- event: 美国奋进号航天飞机首次飞行。
  year: '1992'
- event: 中国驻南联盟大使馆遭北约轰炸，造成3人死亡。
  year: '1999'
