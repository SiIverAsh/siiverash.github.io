    - 1Gbps+ Upload
    - 3GPP Release 18
    title: 中国移动5G-A超级上行商用网络速率突破1Gbps
  News:
  - desc: 2026年5月8日，中央网信办联合工信部、公安部正式印发《智能体规范应用与创新发展实施意见》，首次对AI Agent（智能体）的法律责任界定、数据安全边界、人机交互透明度及自主决策权限做出系统性规范。文件设立了分级分类管理框架，高风险领域（金融交易、医疗诊断、司法辅助）的智能体须经安全评估方可部署。该意见被业界视为中国AI治理从模型层面向Agent层面延伸的标志性文件。
    tags:
    - AI Governance
    - Agent Regulation
    - 中国网信办
    - AI Policy 2026
    title: 国家网信办发布《智能体规范应用与创新发展实施意见》
