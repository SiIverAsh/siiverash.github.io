    title: 'Python 4.0 Alpha 1: 重大语法与性能改进'
  NLP:
  - desc: Google发布Gemma 3.2，在2B/9B/27B参数规模上进一步优化指令跟随与多语言能力，采用分组查询注意力(GQA)与旋转位置编码(RoPE)，支持128k上下文窗口，在MMLU、HellaSwag等基准上优于同等规模模型。
    tags:
