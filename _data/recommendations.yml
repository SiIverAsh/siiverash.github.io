  intro: 梶裕貴是日本知名声优，2006年出道。他以清澈而富有穿透力的少年音著称，嗓音辨识度极高，擅长演绎热血、温柔、深沉等多种角色类型。在配音工作中注重情感表达与角色融合，凭借扎实的演技获得多项声优奖项，包括声优奖主演男优奖。其专业态度与多变的声线备受业界认可，被誉为声优界的实力派代表。
  name: 梶裕貴
date: '2026-03-20'
