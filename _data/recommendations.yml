  intro: 高橋李依是日本新生代声优中的实力派代表，毕业于代代木动画学院。2013年正式出道，凭借清澈而富有感染力的声线迅速崭露头角。她擅长演绎从元气少女到冷静知性角色的广泛类型，在声优名鉴中连续多年位居前列。其扎实的演技和对角色情感的细腻把握，使其在广播节目和现场活动中亦表现出众。高橋李依还以出色的歌唱能力著称，参与过多次角色歌和演唱会。她的多才多艺和对工作的敬业态度，奠定了其在业界不可替代的地位。所属事务所81
    Produce是日本老牌声优经纪公司，旗下拥有众多一线声优。
  name: 高橋李依
