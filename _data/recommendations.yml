algorithm:
- desc: 随机森林是Breiman于2001年提出的集成学习算法，通过构建多棵决策树并汇总投票结果进行预测。核心机制包含两个随机性来源：Bootstrap自助采样（有放回地从训练集中抽取子集）与随机特征子空间选择（每棵树节点分裂时仅考虑随机选取的特征子集）。这种双重随机化使得随机森林具有出色的抗过拟合能力与高维数据适应性，可同时处理分类与回归任务。算法天然提供特征重要性评估，且对缺失值与异常值鲁棒。在大模型时代，随机森林仍广泛用于表格数据基线建模、特征工程与可解释性分析，是每位数据科学从业者的必备工具。
  tags:
  - Ensemble Learning
  - Decision Tree
  - Bagging
  - Feature Importance
  - Classic ML
  title: 随机森林 (Random Forest)
cv_recommend:
  agency: アイムエンタープライズ (I'm Enterprise)
  hometown: 東京都
  intro: 早見沙織是日本平成至令和时代最具代表性的女性声优之一。自幼接受古典音乐训练，拥有罕见的绝对音感与细腻的声线控制能力，音域宽广且兼具透明感与力量感。2007年出道后迅速崭露头角，凭借清澈而富有情感表现力的嗓音在业内赢得极高评价。2026年《声優名鑑》收录女性声优达1135名，早見沙織蝉联中高生最喜爱女性声优排行榜榜首，足见其跨越世代的影响力。她还以歌手身份活跃，亲自担任大量作品词曲创作，展现了作为全能艺术家的深厚素养。
  name: 早見沙織
date: '2026-05-23'
history:
- event: 圣女贞德在法国贡比涅被勃艮第军队俘获，后被移交英军，最终以异端罪名被处以火刑
  year: 1430年
- event: 布拉格抛窗事件：波希米亚新教徒将神圣罗马帝国官员抛出窗外，成为三十年战争导火索
  year: 1618年
- event: 意大利向奥匈帝国宣战，正式加入协约国一方参与第一次世界大战
  year: 1915年
- event: 美国传奇银行劫匪邦尼与克莱德在路易斯安那州遭警方伏击，身中百余弹身亡
  year: 1934年
- event: 德意志联邦共和国基本法（波恩宪法）正式颁布，西德从此成为一个主权国家
  year: 1949年
- event: Sun Microsystems在SunWorld大会上正式发布Java编程语言，提出'一次编写，到处运行'理念
  year: 1995年
llm:
- desc: 2026年5月，Cohere开源其最强模型Command A+，采用218B参数混合专家(MoE)架构，激活参数约25B，可在2张H100 GPU上运行。该模型以完整Apache
    2.0许可证发布，首创无损FP8量化技术（量化前后基准测试零退化），并内置原生引用生成能力——模型输出可自动附带来源句子级引用。上下文窗口128K，支持多语言，在MMLU、HumanEval等基准上对标GPT-4o级别性能，是目前参数效率最高的全开源旗舰模型之一。
  tags:
  - Cohere
  - Command A+
  - MoE
  - Apache 2.0
  - Open Source LLM
  title: Cohere Command A+：218B MoE全开源Apache 2.0旗舰模型，支持无损量化与原生引用
new_project:
- desc: Nanobot 是香港大学数据科学实验室(HKUDS)于2026年5月发布的开源个人AI Agent框架，核心代码仅约4000行，却实现了完整的Agent能力——包括工具调用、上下文记忆管理、多轮对话规划与浏览器自动化。框架采用极简模块化设计，支持接入任意LLM后端（OpenAI/Anthropic/本地模型），通过YAML配置文件即可定义自定义工具与工作流。上线一周内GitHub
    Star突破8000，成为轻量Agent框架的标杆项目，特别适合学习Agent原理与快速原型开发。
  tags:
  - AI Agent
  - Open Source
  - Lightweight
  - LLM
  - Automation
  title: Nanobot：HKUDS开源的超轻量个人AI Agent框架（~4K行代码）
  url: https://github.com/HKUDS/Nanobot
paper:
- desc: 顶会论文推荐：该工作提出了一种无需外部监督的视觉推理自改进框架。通过在视觉语言模型(VLM)内部构建对比样本对（正确推理链 vs. 扰动推理链），利用对比学习信号迭代优化模型的视觉推理能力。在ScienceQA、MMMU等7个视觉推理基准上，方法使基线VLM平均提升8.3个百分点，且仅需模型自身生成数据进行训练。ICLR
    2026 Oral论文，发表于2026年5月。
  tags:
  - ICLR 2026 Oral
  - Visual Reasoning
  - VLM
  - Self-Improving
  - Contrastive Learning
  title: 'Through the Lens of Contrast: Self-Improving Visual Reasoning in VLMs (ICLR
    2026 Oral)'
  url: https://openreview.net/forum?id=ZymCPON45y
tech:
  Arch:
  - desc: 2026年3月，阿里达摩院正式发布玄铁C950，基于RISC-V RV64GCB架构，采用15级超标量乱序流水线设计，最高支持16核配置，主频达2.5GHz。芯片采用7nm工艺制造，SPECint2006得分突破9.5/GHz，刷新RISC-V性能世界纪录。C950集成DDR5/LPDDR5内存控制器与PCIe
      5.0接口，支持服务器级RAS特性与可信执行环境，目标市场为云原生数据中心与AI推理加速，标志着RISC-V正式进入高性能服务器赛道。
    tags:
    - RISC-V
    - Server CPU
    - Alibaba DAMO
    - XuanTie
    - 7nm
    title: 玄铁C950：阿里达摩院发布全球性能最高RISC-V服务器CPU
  Audio:
  - desc: LongCat-AudioDiT 是美团 LongCat 团队于2026年4月开源的高保真文本到语音模型，基于 AudioDiT（音频扩散Transformer）架构，直接在波形潜空间建模，参数规模达3.5B。零样本条件下仅需3秒参考音频即可实现高自然度音色克隆，支持中英双语。相较传统梅尔频谱方案，端到端波形生成避免了声码器级联失真，MOS评分在中文测试集上达到4.52，逼近真人录音水平。
    tags:
    - Zero-Shot TTS
    - Diffusion Transformer
    - Voice Cloning
    - Open Source
    - Meituan
    title: LongCat-AudioDiT：美团开源波形潜空间扩散TTS，突破零样本音色克隆上限
  CPU:
  - desc: 2026年4月22日，AMD发布Ryzen 9 9950X3D2 Dual Edition，基于Zen 5架构，16核32线程，在两个CCD上各搭载一枚64MB
      3D V-Cache，L3缓存总量高达192MB（32MB片上+160MB堆叠）。最高Boost频率维持5.7GHz，TDP 170W，兼容AM5平台。双3D
      V-Cache设计使得缓存敏感型工作负载（编译、仿真、大型游戏）性能较9950X3D提升15%-25%，在SPEC CPU 2017整数吞吐量测试中刷新桌面处理器纪录，成为开发者与创作者的最强生产力平台。
    tags:
    - AMD
    - Zen 5
    - 3D V-Cache
    - Desktop CPU
    - AM5
    title: AMD Ryzen 9 9950X3D2 Dual Edition：业界首款双3D V-Cache桌面处理器
  Computer Vision:
  - desc: VGGT-Ω 在原始 VGGT 基础上引入全向三维重建能力，通过单一前馈网络直接从多视角图像预测相机参数、深度图与三维点云，无需迭代优化。模型基于大规模合成数据训练，支持任意数量输入视图，推理速度达到毫秒级。架构核心为视觉几何基座Transformer，将几何先验嵌入自注意力机制，在多个三维重建基准上刷新SOTA，标志着前馈式3D视觉的重要里程碑。
    tags:
    - CVPR 2026 Oral
    - 3D Reconstruction
    - Visual Geometry
    - Transformer
    - Facebook Research
    title: VGGT-Ω：Facebook Research 视觉几何基座Transformer (CVPR 2026 Oral)
  GPU:
  - desc: RTX 5060 Ti 基于NVIDIA Blackwell架构GB206核心，集成4608个CUDA核心，配备16GB GDDR7显存（128-bit位宽，带宽448GB/s），Boost频率达2.57GHz。支持DLSS
      4多帧生成与神经网络渲染，整卡TGP为180W。相比前代RTX 4060 Ti，光栅化性能提升约35%，光追性能提升50%以上，起售价$399，于2026年4月正式发售。作为Blackwell家族最具性价比的型号，成为1080p/1440p游戏与入门级AI工作负载的新标杆。
    tags:
