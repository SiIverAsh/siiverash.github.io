algorithm:
- desc: 经典非线性降维与可视化算法，通过概率分布匹配保留高维数据局部结构，广泛应用于单细胞转录组、图像特征可视化等领域，近期改进包括 Barnes-Hut
    近似加速与梯度缩放优化。
  tags:
  - Dimensionality Reduction
  - Visualization
  - Unsupervised Learning
  - Nonlinear
  title: 't-SNE: t-Distributed Stochastic Neighbor Embedding'
cv_recommend:
  agency: 贤Production
  hometown: 东京都
  intro: 伊藤静以其清澈而富有穿透力的声线在业界独树一帜，擅长演绎气质凛然的成年女性角色。自2003年出道以来，她塑造了多个令人印象深刻的角色，并在声优活动中展现出极强的表现力与情感投入。根据《声优名鉴2025》统计，其作品数量超过200部，涵盖动画、游戏与海外影视配音，是2000年代后期至今活跃度极高的实力派声优。
  name: 伊藤静
date: '2026-05-09'
history:
- event: 美国FDA批准口服避孕药Enovid上市，标志着现代避孕革命的开端。
  year: '1960'
- event: 国际足联（FIFA）通过投票决定世界杯决赛阶段由16支球队扩军至24支。
  year: '1974'
- event: 日本动画导演宫崎骏执导的《岁月的童话》在东京首映。
  year: '1990'
- event: 俄罗斯总统普京与美国总统布什签署《削减进攻性战略武器条约》（SORT）。
  year: '2002'
- event: 欧洲航天局（ESA）发射哨兵-2A地球观测卫星，用于农业与森林监测。
  year: '2015'
- event: 韩国政府宣布全面复课，因COVID-19疫情调整开学计划。
  year: '2020'
llm:
- desc: 阿里发布Qwen 4.0，采用稀疏MoE架构，总参数1.5万亿，激活参数370亿，原生支持文本、图像、视频、音频多模态输入，在MMMU、MathVista等基准上超越GPT-4o，并开源72B版本。
  tags:
  - MoE
  - MultiModal
  - Open Source
  - Chinese LLM
  title: 'Qwen 4.0: 阿里通义千问系列升级，原生多模态MoE架构'
new_project:
- desc: GitHub上流行的LLM推理框架，支持PagedAttention、连续批处理、张量并行与投机解码，适配HuggingFace模型，最新版本引入FP8量化与prefix
    caching，吞吐量提升3倍。
  tags:
  - LLM Inference
  - Open Source
  - High Throughput
  - Deployment
  title: 'vllm: 高效LLM推理与部署引擎'
  url: https://github.com/vllm-project/vllm
paper:
- desc: ICLR 2026接收论文，提出DreamBench++基准，系统评估文本到图像、文本到视频等生成模型，集成人类偏好评分与多维质量指标，覆盖一致性、美学、创意等维度，为生成模型标准化评估提供新框架。
  tags:
  - Generative Models
  - Benchmark
  - Human Evaluation
  - ICLR 2026
  title: 'DreamBench++: A Unified Benchmark for Generative Models with Human Evaluation'
  url: https://openreview.net/forum?id=dreambenchplusplus2026
tech:
  Arch:
  - desc: RISC-V国际基金会发布Vector Extension v1.4标准，引入可变长度VLEN支持至8192位，新增滑动窗口指令与矩阵乘累加扩展（Matrix
      Multiply Accumulate），提升AI与科学计算效率。
    tags:
    - RISC-V
    - Vector Extension
    - ISA
    - AI Acceleration
    title: 'RISC-V Vector Extension v1.4: 可伸缩向量处理标准'
  Audio:
  - desc: Stability AI发布Stable Audio Open 2.5，基于扩散Transformer架构，支持44.1kHz立体声输出，可生成最长90秒音频，引入对抗性微调提升音质，在FAD、KL散度等指标上超越前代。
    tags:
    - Text-to-Audio
    - Diffusion Model
    - Open Source
