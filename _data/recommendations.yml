algorithm:
- desc: KNN是一种基于实例的非参数分类与回归算法，通过计算待测样本与训练集中距离最近的k个样本的类别众数进行预测，核心依赖距离度量（如欧氏距离），模型简单易解释，广泛应用于推荐系统与模式识别。
  tags:
  - KNN
  - Classification
  - Lazy Learning
  - Distance Metrics
  title: K-近邻算法 (k-Nearest Neighbors, KNN)
cv_recommend:
  agency: 青二プロダクション（青二制作）
  hometown: 北海道
  intro: 佐仓绫音于1994年1月29日出生在日本北海道，目前隶属于青二制作。她拥有清亮透明的音色与极强的声音可塑性，既能呈现温柔细腻的少女质感，也能塑造坚强果敢的角色形象，同时具备扎实的歌唱力。除动画外，她广泛活跃于综艺旁白、电台主持及广告领域，表现出众的表现力与稳定的现场反应能力令其在业界获得高度评价，被视为新生代中最具综合实力的声优之一。其不断提升的演技深度与多元发展路线持续拓宽着声优职业的边界。
  name: 佐仓绫音
date: '2026-05-21'
