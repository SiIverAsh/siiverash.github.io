  year: '1943'
- event: 克里斯托弗·莱瑟姆·肖尔斯 (Christopher Latham Sholes) 获得打字机专利，QWERTY键盘布局由此诞生，沿用至今超过150年。
  year: '1868'
- event: 任天堂64 (Nintendo 64) 在日本正式发售，首发游戏包括《超级马力欧64》，开创了3D动作游戏的全新标杆。
  year: '1996'
- event: 社交新闻网站 Reddit 正式上线，由Steve Huffman与Alexis Ohanian联合创立，日后成长为全球最具影响力的互联网社区之一。
  year: '2005'
