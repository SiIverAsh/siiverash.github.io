algorithm:
- desc: 首次原生支持多目标回归与分类，允许单模型同时预测多个标签。新增GPU外部存储支持，可处理超过1TB的训练数据，推理速度提升30%。集成Shapley值解释与自动超参优化，成为传统机器学习库的里程碑更新。
  tags:
  - XGBoost
  - 机器学习
  - 多目标学习
  - GPU加速
  title: XGBoost 3.2.0 发布：多目标输出与 GPU 外部存储支持
cv_recommend:
  agency: I'm Enterprise
  hometown: 日本神奈川县
  intro: 内田真礼是日本知名声优兼歌手，隶属于I'm Enterprise事务所。她出生于神奈川县，以其多变的声线和精准的情感表达在业界备受赞誉。她的声音可塑性极强，能够驾驭从甜美到冷峻的各种角色类型，在配音工作中展现出卓越的专业素养。同时，她也在音乐领域积极发展，发行了多张个人专辑，展现了多元化的艺术才华。
  name: 内田真礼
date: '2026-03-15'
history:
- event: 罗马独裁官尤利乌斯·凯撒在元老院被刺杀，标志着罗马共和国的终结。
  year: 公元前44年
- event: 纳粹德国军队占领捷克斯洛伐克剩余领土，完全吞并该国。
  year: 1939年
- event: 美国总统林登·B·约翰逊在国会发表演讲，呼吁通过《投票权法案》。
  year: 1965年
- event: 第一个“.com”域名symbolics.com被注册，标志着商业互联网时代的开端。
  year: 1985年
- event: 叙利亚反政府示威升级为全面内战，导致持续多年的冲突与人道主义危机。
  year: 2011年
- event: 新西兰克赖斯特彻奇两座清真寺发生枪击事件，造成51人死亡，40人受伤。
  year: 2019年
llm:
- desc: 采用混合专家架构，1200亿参数，支持32K上下文，在Agent任务中吞吐量相比稠密模型提升5倍。开源权重包括Base、Instruct、Reward模型，在HellaSwag、MMLU等基准上达到SOTA，专为智能体推理优化。
  tags:
  - 开源大模型
  - 混合专家
  - 智能体
  - NVIDIA
  title: NVIDIA Nemotron 3 Super：120B参数开源大模型，吞吐量提升5倍
