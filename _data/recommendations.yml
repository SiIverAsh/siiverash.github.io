cv_recommend:
  agency: アクセルワン（Axel One）
  hometown: 东京都
  intro: 水瀬いのり是2010年代后期迅速崛起的女性声优。其声线清澈通透，兼具少女的甜美与成年的柔韧，能精准驾驭从活泼俏皮到深沉内敛的多种声域。在歌唱领域同样展现卓越才能，多次举办个人巡回演唱会，以稳健的现场唱功赢得广泛赞誉。作为声优歌手，她不仅通过声音塑造角色灵魂，更以全面表现持续拓展声优业界边界，被誉为同世代最受瞩目的全能型声优之一。
  name: 水瀬いのり
date: '2026-05-22'
history:
- event: 阿瑟·柯南·道尔出生，英国作家，夏洛克·福尔摩斯的创造者。
  year: 1859年
- event: 德国与意大利签署《钢铁条约》，形成轴心国军事同盟。
  year: 1939年
- event: 智利瓦尔迪维亚发生里氏9.5级大地震，为有记录以来最强地震。
  year: 1960年
- event: 锡兰改国名为斯里兰卡共和国，废除君主制。
  year: 1972年
- event: 阿拉伯也门共和国与也门民主人民共和国统一为也门共和国。
  year: 1990年
- event: 英国曼彻斯特竞技场发生自杀式爆炸袭击，造成22人死亡。
  year: 2017年
