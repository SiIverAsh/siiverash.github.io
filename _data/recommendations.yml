algorithm:
- desc: K-Means 通过迭代最小化样本点到质心的距离平方和，实现数据自动分组。其简单高效使其成为聚类分析的首选算法，广泛用于客户分群、图像压缩与异常检测。选择合适
    K 值常借助肘部法则或轮廓系数。
  tags:
  - 聚类
  - 无监督学习
  - K-Means
  - 数据分析
  title: K-Means 聚类：无监督学习的基石
cv_recommend:
  agency: アイムエンタープライズ（I'm Enterprise）
  hometown: 东京都
  intro: 佐倉綾音以清亮而极具辨识度的声线著称，音域宽广，既能演绎元气少女的活泼灵动，亦能塑造冷峻少年的沉稳厚重。其演技张弛有度，在情感爆发与细腻独白间转换自如，歌唱实力亦备受认可，多次获得声优奖。她通过丰富的声线变化塑造了诸多风格迥异的角色，展现出深厚的职业功底与艺术感染力，是中生代声优中极具代表性的实力派之一。
  name: 佐倉綾音
date: '2026-07-02'
history:
- event: 美国作家欧内斯特·海明威在爱达荷州家中自杀身亡，享年61岁
  year: '1961'
- event: 美国总统林登·约翰逊签署《1964年民权法案》，禁止种族、肤色、宗教、性别或国籍歧视
  year: '1964'
- event: 越南南北统一，改国名为越南社会主义共和国
  year: '1976'
- event: NASA火星探路者号成功着陆火星，并释放旅居者号漫游车
  year: '1997'
- event: RealNetworks发布RealOne Player，整合音频、视频与网页浏览功能
  year: '2002'
- event: 希腊议会通过养老金和税收改革法案，为接收国际货币基金组织与欧盟救助扫清障碍
  year: '2010'
llm:
- desc: DeepSeek-Coder-V2 采用 MoE 架构，激活 16B 参数，总参数 236B，支持 338 种编程语言和 128K 上下文。在 HumanEval、MBPP
    等基准上超越 GPT-4 Turbo，并开源模型权重。
  tags:
  - DeepSeek
  - 代码生成
  - MoE
  - 开源
  title: 'DeepSeek-Coder-V2: 开源代码大模型突破 GPT-4 Turbo 性能'
new_project:
- desc: SWE-agent 将大型语言模型转化为自主软件工程代理，能够在真实仓库中定位并修复 bug、实现新功能。通过自定义的 agent-计算机接口 (ACI)
    与专用工具，在 SWE-bench 上达到 12.5% 的解决率。
  tags:
  - LLM
  - 软件工程
  - Agent
  - GitHub
  title: princeton-nlp/SWE-agent
  url: https://github.com/princeton-nlp/SWE-agent
paper:
- desc: 该论文提出一种无需参考模型的偏好优化算法，将奖励建模为生成序列的平均对数概率，并引入长度归一化，显著简化 RLHF 流程。在 AlpacaEval
    2 和 Arena-Hard 上超越了现有方法。
  tags:
  - RLHF
  - 偏好优化
  - LLM
  - 对齐
  title: 'SimPO: Simple Preference Optimization with a Reference-Free Reward'
  url: https://arxiv.org/abs/2405.14734
tech:
  Arch:
  - desc: 据泄漏资料，Zen 6 代号 “Morpheus”，将采用 TSMC N3 工艺，前端每周期可解码 8 条 x86 指令，大幅拓宽执行引擎。核心调度器重设计，L1
      数据缓存延迟降低，并引入新的矩阵扩展指令集以加速 AI 推理。预计 2027 年亮相。
    tags:
    - Zen 6
    - AMD
    - 3nm
    - 微架构
    title: AMD Zen 6 架构细节曝光：每周期可解码 8 指令，3nm 工艺
  Audio:
  - desc: Turbo 2.5 模型将端到端延迟压缩至 80ms 以内，支持 32 种语言的自然语音生成，并新增高表现力风格 (expressive style)
      与音色克隆一致性改进。模型基于改进的流匹配 (Flow Matching) 架构，通过知识蒸馏与并行解码实现实时交互。
    tags:
    - 语音合成
    - 流匹配
    - 多语言
    - 低延迟
    title: ElevenLabs Turbo 2.5：多语言超低延迟语音合成模型发布
  CPU:
  - desc: Ryzen 9 9950X3D 配备 16 核 32 线程，在其中一个 CCD 上搭载 64MB 3D V-Cache，另一 CCD 维持高频设计，实现游戏与创作双优。基础频率
      4.5 GHz，加速频率 5.7 GHz，TDP 170W，支持 DDR5-8000 与 PCIe 5.0，兼容 AM5 主板。
    tags:
    - Ryzen
    - 3D V-Cache
    - Zen 5
    - AM5
    title: AMD Ryzen 9 9950X3D：Zen 5 双 CCD 3D V-Cache，AM5 平台旗舰登场
  Computer Vision:
  - desc: 该工作提出了一个端到端的可驱动3D数字人重建系统，通过联合建模外观、几何与动态变形，首次实现从单目视频中直接生成可用于实时动画的高保真化身。核心技术包括基于NeRF的隐式表示与线性混合蒙皮（LBS）的深度融合，并在动态场景中引入光照解耦模块，显著提升重光照与姿态控制的泛化性。
    tags:
    - CVPR 2026
    - 3D重建
    - 数字人
    - NeRF
    title: CVPR 2026 最佳论文：OmniRecon - 从单目视频中重建可驱动3D数字人的统一框架
  GPU:
  - desc: RTX 5070 搭载 GB205-300 GPU，集成 6,144 CUDA 核心与 192-bit 显存位宽，搭配 12GB GDDR7，TBP
      250W。在 1440p 游戏中平均领先 RTX 4070 约 25%，支持 DLSS 4 多帧生成与 Reflex 2 低延迟技术，建议零售价 4,199
      元。
    tags:
    - RTX 5070
    - Blackwell
    - GDDR7
    - DLSS 4
    title: NVIDIA GeForce RTX 5070 12GB：Blackwell 中高端 GDDR7 主力全面铺货
  Lang:
  - desc: Python 3.14 将模式匹配 (match-case) 扩展至可伸缩类型与映射协议，显著提升数据解析表达能力；同时引入基于 copy-and-patch
      的轻量级 JIT 编译器（实验性），在特定数值计算负载中获得最高 15% 的性能提升。
    tags:
    - Python
    - 模式匹配
    - JIT
    - 语言特性
    title: Python 3.14 正式发布：模式匹配增强与实验性 JIT 编译
  NLP:
  - desc: Gemini 2.5 Pro 支持原生 2,000,000 token 上下文窗口，整合增强的推理与多模态理解能力，在 MMLU-Pro、HumanEval
      等基准上超越 GPT-4.5。模型采用 MoE 架构，训练数据包含图像、音频、视频及多语言文本，并首次引入 “thinking budget” 机制，允许用户控制推理深度。
    tags:
    - Gemini
    - 多模态
    - 长上下文
    - MoE
    title: Gemini 2.5 Pro：谷歌推出200万上下文多模态推理大模型
  Net:
  - desc: 随着 Rel-19 在 2026 年 Q1 正式冻结，基于 NR-NTN (New Radio Non-Terrestrial Network)
      的卫星直连手机技术进入运营商规模测试。多家厂商在 L/S 波段实现双向数据通信，下行速率达 20 Mbps，为偏远地区覆盖和应急通信提供 3GPP 标准化方案。
    tags:
    - 3GPP
    - NTN
    - 卫星通信
    - 5G-Advanced
    title: 3GPP Release 19 标准冻结后：NTN 卫星直连手机进入规模测试阶段
  News:
  - desc: 本届 WWDC 重点发布 visionOS 3 空间计算平台更新，引入 3D 窗口化多任务与 AI 场景理解；Mac Pro 更新为 M4 Ultra
      芯片，配备最高 64 核 GPU 与 256GB 统一内存，面向专业渲染与本地大模型部署。
    tags:
    - WWDC
    - Apple
    - visionOS
    - M4 Ultra
    title: 苹果 WWDC 2026：visionOS 3 与全新 Mac Pro 携 M4 Ultra 芯片亮相
