algorithm:
- desc: 由Leo Breiman于2001年提出的集成学习经典算法。核心思想是通过Bootstrap自助采样构建多棵决策树，并在每个节点分裂时随机选取特征子集，最终以投票（分类）或平均（回归）方式聚合预测结果。随机森林天然具备抗过拟合能力，具有特征重要性评估、缺失值处理稳健、可并行化训练等优点。在结构化数据的分类、回归、异常检测等工业场景中，至今仍是与XGBoost并列的首选基线模型。OOB（袋外误差）可提供无偏泛化性能估计，无需额外划分验证集。
  tags:
  - Ensemble Learning
  - Bagging
  - Decision Tree
  - Feature Importance
  title: 随机森林 (Random Forest)
cv_recommend:
  agency: VOICE KIT
  hometown: 神奈川県
  intro: 上坂すみれ，1991年12月19日出生于神奈川県，毕业于上智大学外国语学部俄语学科，具备流利的俄语能力，这一独特语言背景在其职业生涯中赋予了她鲜明的个人标签。她最初以童星身份活动，2011年正式以声优出道，2021年移籍至VOICE
    KIT事务所。其声线辨识度极高，音域宽广，从少女到成熟女性角色的切换游刃有余。独特之处在于她深厚的俄罗斯文化造诣——对苏联军事史、俄国文学及洛丽塔时尚均有深入研究，被粉丝亲切称为「すみぺ」。她具有深厚的歌唱实力，多张个人单曲进入Oricon周榜前10。在行业评价中，她以知性气质与对角色内核的精准把握著称，成功将学术素养转化为表演深度，在声优业界独树一帜。
  name: 上坂すみれ (Uesaka Sumire)
date: '2026-05-18'
history:
- event: 拿破仑·波拿巴经法国参议院（Sénat conservateur）宣告成为法兰西第一帝国皇帝，法国从共和制转变为帝制，深刻改变了欧洲政治格局。
  year: 1804年5月18日
- event: 美国最高法院对「普莱西诉弗格森案」(Plessy v. Ferguson)做出判决，以7:1裁定「隔离但平等」原则合宪，该判决直到1954年Brown
    v. Board of Education案才被推翻，是美国民权史上的关键转折点。
  year: 1896年5月18日
- event: 美国密歇根州巴斯镇发生「巴斯学校爆炸案」(Bath School disaster)，学校董事会财务主管Andrew Kehoe引爆炸药，造成45人死亡（含38名儿童），是美国历史上死亡人数最多的校园袭击事件。
  year: 1927年5月18日
- event: 美国女性飞行员杰奎琳·科克伦(Jacqueline Cochran)驾驶F-86佩刀战斗机突破音障，成为世界上首位实现超音速飞行的女性，开创女性航空史新纪元。
  year: 1953年5月18日
- event: 美国阿波罗10号（Apollo 10）从肯尼迪航天中心发射升空，作为阿波罗11号登月前的「全套彩排」，登月舱在距月表仅15.6km处进行分离与下降演练，为两月后人类首次登月铺平道路。
  year: 1969年5月18日
- event: 美国华盛顿州圣海伦斯火山（Mount St. Helens）发生5.1级地震引发大规模喷发，山体北坡整体崩塌，喷发柱高达24公里，57人遇难，火山灰覆盖11个州，是北美历史上最具破坏性的火山喷发之一。
  year: 1980年5月18日
llm:
- desc: OpenAI于2026年4月24日正式发布GPT-5.5，作为新一代Agentic Foundation Model，在编码（SWE-bench Verified
    82.3%）、数学推理（FrontierMath 91.7%）和多模态理解（MMMU 79.2%）上均大幅刷新SOTA。核心技术创新包括原生的长程任务规划(Agentic
    Planning)、增强的代码执行沙箱(Code Interpreter 2.0)和128K全模态上下文窗口（文本+图像+音频）。GPT-5.5 Instant变体将幻觉率较前代降低52.5%，API成本降至GPT-5的1/3。
  tags:
  - GPT-5.5
  - OpenAI
  - Agentic AI
  - Multimodal Foundation Model
  title: OpenAI GPT-5.5：2026年4月最强Agentic旗舰模型发布
new_project:
- desc: 字节跳动开源的deer-flow是一个面向分钟到小时级复杂任务的SuperAgent编排框架。核心特性包括：沙箱化代码执行与文件管理、持久化记忆与上下文管理、工具与子Agent动态调度、消息网关多模型路由、层级化技能库(Skill
    Library)。支持从软件工程（全栈开发、CI/CD调试）、数据分析到创意内容生成的端到端自主执行。采用Python+TypeScript混合架构，内置OpenTelemetry可观测性，支持多种LLM后端（OpenAI/Anthropic/Qwen/DeepSeek）。
  tags:
  - AI Agent
  - SuperAgent
  - Open Source
  - ByteDance
  title: deer-flow：字节跳动开源超长程SuperAgent框架
  url: https://github.com/bytedance/deer-flow
paper:
- desc: 阿里巴巴Qwen团队提出的门控注意力机制，通过引入可学习的非线性门控函数替代标准Softmax注意力，从根本上消除了Attention-Sink现象并实现天然稀疏性。在同等推理效率下，该方法使LLaMA-8B模型在MMLU、GSM8K等基准上提升2-5个百分点，长文本任务（128K
    Token）推理延迟降低40%，显存占用减少35%。该工作已在Qwen系列模型中大规模部署验证，为下一代高效注意力机制奠定了理论与实践基础。
  tags:
  - NeurIPS 2025 Best Paper
  - Gated Attention
  - LLM Efficiency
  - Qwen
  title: 'Gated Attention for Large Language Models: Non-linearity, Sparsity, and
    Attention-Sink-Free (NeurIPS 2025 Best Paper)'
  url: https://arxiv.org/abs/2505.06708
tech:
