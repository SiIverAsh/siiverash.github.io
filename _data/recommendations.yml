algorithm:
- desc: 基于贝叶斯定理与特征条件独立假设的经典概率分类算法。其'朴素'之处在于假设所有特征相互独立，尽管该假设在现实中鲜有成立，却使模型参数数量从指数级降至线性级，训练与推理速度极快。在高维稀疏数据（如文本分类、垃圾邮件过滤）中表现尤为出色，常作为复杂深度学习模型的强Baseline。核心推论为通过先验概率与似然计算后验概率，取最大后验类别为预测结果。
  tags:
  - 贝叶斯定理
  - 分类算法
  - 监督学习
  - 概率模型
  - 文本分类
  - 生成式模型
  title: 朴素贝叶斯 (Naive Bayes)
cv_recommend:
  agency: 大沢事務所
  hometown: 东京都
  intro: 以清澈透明且富有穿透力的声线特质著称，音域宽广，从少女的纤细到成熟女性的深沉皆能自如驾驭。2012年正式声优出道后迅速展现出色表现力，凭借细腻入微的情感层次与扎实的台词功底获得业界广泛认可。职业生涯中曾因伤病经历休业低谷期，复出后以更加沉稳圆熟的演技回归一线，展现出令人钦佩的职业韧性。其声质兼具柔和与力量，在需要情绪爆发与内心独白交替的场景中表现尤为突出，是当代兼具人气与实力的中生代声优代表之一。
  name: 種田梨沙
date: '2026-06-10'
history:
- event: Apple II个人电脑首次发货，搭载MOS 6502处理器与4KB RAM，成为历史上首款大规模成功的量产微型计算机，定义了个人电脑的产品形态。
  year: '1977'
- event: SOS莫尔斯求救信号（···---···）首次在海上正式使用，英国冠达邮轮SS Slavonia号在亚速尔群岛附近遇险时发出，此后成为国际通用遇难信号标准。
  year: '1909'
- event: 匈牙利发明家比罗·拉斯洛（László Bíró）获得圆珠笔专利。其油墨粘度与滚珠输送系统的工程设计至今仍是书写工具的基础。
  year: '1943'
- event: NASA勇气号（Spirit）火星探测器由Delta II火箭成功发射，踏上为期七个月的火星之旅，开启了人类火星表面地质探索的黄金时代。
  year: '2003'
- event: 匿名戒酒会（Alcoholics Anonymous）在美国俄亥俄州阿克伦成立，开创了基于同伴互助的行为矫正模式，影响了后续全球范围内的互助组织运动。
  year: '1935'
- event: 杜邦公司正式注册Mylar（聚酯薄膜）商标。该材料以卓越的电绝缘性、机械强度和热稳定性广泛应用于电子电容器、航天隔热层及数据存储磁带。
  year: '1952'
llm:
- desc: Meta于2026年4月发布Llama 4系列，采用原生多模态MoE（混合专家）架构，包含三个版本：Scout（轻量高效端侧部署）、Maverick（主力模型，109B总参/17B活跃参数）及Behemoth（288B总参/30B活跃参数，旗舰性能）。创新之处在于Early
    Fusion多模态编码器，使模型在预训练阶段即联合学习图文音视频表征，而非事后拼接，在MMLU-Pro、MathVista等多模态推理基准上全面超越GPT-5。全部权重开源。
  tags:
  - Meta
  - Llama 4
  - MoE
  - Multimodal
  - Open Source
  - Early Fusion
  title: 'Llama 4: Meta原生多模态MoE大模型系列'
new_project:
- desc: Git原生的AI Agent开放标准与参考实现框架。通过标准化的YAML/JSON Agent技能描述文件（存放于.gitagent/目录），开发者可在任意Git仓库中定义、版本管理及共享AI
    Agent能力。核心特性包括：多Agent间通过Git协议进行技能发现与协作、内置沙箱化工具执行引擎、与Claude Code/GitHub Copilot等主流AI编码助手深度集成。2026年6月GitHub
    Trending连续上榜，正在成为Agent互操作性的社区事实标准。
  tags:
  - AI Agent
  - Git-native
  - Open Standard
  - Multi-agent
  - Developer Tools
  - MCP Alternative
  title: open-gitagent/gitagent
  url: https://github.com/open-gitagent/gitagent
paper:
- desc: NeurIPS 2025最佳论文奖得主。该工作系统性分析大规模深度强化学习中训练不稳定的根源——梯度估计方差的指数级放大效应，提出Stable Gradients方法，通过自适应梯度裁剪与方差缩减技术实现稳定训练。在Atari、MuJoCo及大规模多智能体场景中对PPO、SAC等主流RL算法取得一致且显著的性能提升，为RL的工业化落地扫除了关键障碍。
  tags:
  - NeurIPS 2025
  - Best Paper
  - Deep RL
  - Gradient Stability
  - Reinforcement Learning
  - Scale
  title: Stable Gradients for Stable Learning at Scale in Deep Reinforcement Learning
  url: https://proceedings.neurips.cc/paper_files/paper/2025/hash/32375260090404f907ceae19f3564a7e-Abstract-Conference.html
tech:
  Arch:
  - desc: Tenstorrent于2025年12月正式发布TT-Ascalon高性能RISC-V CPU，由芯片传奇Jim Keller主导设计。基于自研8发射乱序执行RISC-V核心，支持RV64GCBH+向量扩展，SPECint2017单核性能突破8.0分/GHz，对标ARM
      Cortex-X系列旗舰。采用台积电先进制程，8核Cluster共享32MB L3缓存，目标市场覆盖数据中心、AI推理边缘与高性能嵌入式，填补了RISC-V在高性能通用计算领域的空白。
    tags:
    - RISC-V
    - Tenstorrent
    - Jim Keller
    - High-Performance
    - 8-wide OoO
    - CPU
    title: 'Tenstorrent TT-Ascalon: Jim Keller团队RISC-V性能旗舰'
  Audio:
  - desc: 小红书技术团队开源dots.tts，业界首个全连续自回归文本到语音模型。摒弃离散token中间表示，直接在连续声学空间建模，从根本上消除离散量化引入的信息瓶颈与发音错误。支持零样本声音克隆，仅需3秒参考音频即可高保真复刻任意说话人音色与韵律，在自然度和说话人相似度上全面超越现有离散TTS方案。
    tags:
    - TTS
    - Zero-shot Voice Cloning
    - Continuous Autoregressive
    - Open Source
    - Speech Synthesis
    title: 'dots.tts: 小红书开源全连续自回归TTS模型'
  CPU:
  - desc: AMD Zen 6 'Medusa'架构于2026年6月迎来大规模泄露。首次确认采用2nm级先进制程，核心前端从Zen 5的4-wide升级至8-wide指令分发，支持原生512位矢量数据路径与AVX-512完整实现，整数与浮点执行单元数量翻倍。桌面旗舰SKU加速频率超6.5
      GHz，CCD集成288MB 3D V-Cache，IPC较Zen 5提升超30%，预计2027年初量产，被视为x86阵营对ARM冲击的全面反击。
    tags:
    - AMD
    - Zen 6
    - Medusa
    - 2nm
    - 8-wide Dispatch
    - AVX-512
    - 6.5GHz
    title: 'AMD Zen 6 ''Medusa'': 2nm 8-wide架构全面泄露'
  Computer Vision:
  - desc: CVPR 2026论文，提出RnG统一Transformer框架，首次实现从部分观测（单视图RGB图像或稀疏点云）端到端重建完整3D模型，包含几何、纹理和未观测区域。核心创新为Point-Pixel-UV三模态联合注意力机制，在单视图重建与点云补全任务上均达SOTA，无需多阶段流水线或额外先验模型。
    tags:
