  - desc: Vortex 3.0正式发布，成为全球首个拥有完整3D图形渲染管线的全栈开源RISC-V GPU。新版本支持Vulkan API、完整可编程着色器管线、硬件光栅化与ASIC设计流程。基于RISC-V
      RV32IMF指令集扩展，已在FPGA与ASIC双路径验证。采用SIMT执行模型，支持OpenCL计算与图形混合工作负载。开源社区活跃，已适配Linux
      DRM框架。
