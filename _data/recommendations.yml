  year: '1865'
- event: 泰坦尼克号邮轮在北大西洋撞上冰山后沉没，造成逾1500人遇难。
  year: '1912'
- event: 西班牙第二共和国成立，结束了波旁王朝的统治。
  year: '1931'
- event: 苏联签署日内瓦协议，同意从阿富汗撤军。
  year: '1988'
- event: 国际人类基因组计划宣布完成，成功测序人类全部DNA。
  year: '2003'
- event: 冰岛埃亚菲亚德拉冰盖火山爆发，导致欧洲航空交通大规模中断。
  year: '2010'
llm:
- desc: LLaMA 4是Meta开源的多模态大语言模型，参数量7200亿，支持图像、音频和文本输入。采用混合专家架构，在常识推理和代码生成任务中媲美GPT-5.4，遵循Apache
    2.0协议。
  tags:
  - 大语言模型
  - 开源
  - Meta
  - 多模态
  title: 'LLaMA 4: Meta 开源多模态大语言模型'
new_project:
- desc: VideoCrafter2是腾讯AI Lab开源的视频生成框架，基于扩散模型和数据增强技术，支持文本到视频和图像到视频生成，在UCF101和Kinetics数据集上取得SOTA。
  tags:
  - 视频生成
  - 深度学习
  - 开源
  - GitHub
  title: 'VideoCrafter2: Overcoming Data Limitations for Video Generation'
  url: https://github.com/ailab-cvc/videocrafter
paper:
- desc: 该论文提出一种将鱼眼相机输入直接集成到高斯溅射中的方法，通过跨视图联合优化实现高质量3D重建，适用于自动驾驶和VR场景。发表于ICLR 2026。
  tags:
  - 计算机视觉
  - 3D重建
  - 高斯溅射
  - 论文
  title: 'DirectFisheye-GS: Enabling Native Fisheye Input in Gaussian Splatting with
    Cross-View Joint Optimization'
  url: https://www.arxiv.org/abs/2604.00648
tech:
