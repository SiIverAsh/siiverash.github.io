  intro: 1989年12月27日出生于东京都。2010年以声优身份正式出道，凭借清亮而富有穿透力的音质迅速获得业界关注。声线可塑性极强，既能驾驭元气活力的少女声线，也能演绎沉稳冷静的角色。2014年荣获第8回声优奖新人女优奖。除配音工作外，亦以歌手身份活跃，个人音乐作品风格多元。在广播节目主持与舞台演出中也展现了出色的即兴应变能力与表现力，是被业界广泛认可的实力派声优。
  name: 内田真礼
date: '2026-06-12'
