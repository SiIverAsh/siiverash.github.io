llm:
- desc: Grok-3由xAI于2025年末发布，训练算力为Grok-2的10倍（约2亿GPU小时），采用MoE架构，激活参数约300B。核心突破包括：原生多模态（文本+图像+代码同token空间）、DeepSearch深度研究代理（自主多步检索与验证）、以及超长上下文窗口（1M
    token）。在AIME 2025数学竞赛与GPQA博士级科学推理基准上，Grok-3性能接近Claude 4 Opus水平，X Premium+用户已可免费使用。
  tags:
  - Grok-3
  - xAI
  - MoE
  - 多模态推理
  title: Grok-3：xAI推出的万亿参数级多模态推理大模型
new_project:
- desc: 微软开源的下一代多智能体AI应用开发框架。AutoGen支持构建由多个可对话AI代理组成的对话网络，代理之间可自主委派任务、交换信息、执行代码与调用外部工具。v0.5版本引入事件驱动架构与异步消息传递，支持人在回路（Human-in-the-Loop）断点交互，并原生集成OpenAI、Azure、本地LLM等多后端。适用于复杂推理、数据分析和自动化工作流编排场景。
  tags:
  - 多智能体
  - AI框架
  - LLM编排
  - 微软开源
  title: microsoft/autogen
  url: https://github.com/microsoft/autogen
paper:
- desc: NeurIPS 2023口头报告论文。DPO彻底绕过传统RLHF中显式奖励模型训练与PPO强化学习两阶段流程，直接使用偏好对数据以二分类交叉熵优化策略模型。理论上证明DPO目标等价于带KL散度约束的奖励最大化，但实现仅需数行代码修改标准微调loss。在摘要与单轮对话任务上，DPO以更低的计算开销全面匹配或超越PPO-RLHF，已成为开源模型对齐的事实标准方法。
  tags:
  - RLHF替代
  - 偏好对齐
  - NeurIPS 2023
  - DPO
  title: 'Direct Preference Optimization: Your Language Model is Secretly a Reward
    Model'
  url: https://arxiv.org/abs/2305.18290
tech:
  Arch:
  - desc: UCIe 2.0在1.1版物理层（32GT/s单通道）基础上，新增对CXL 3.1、PCIe 6.0与流协议的原生隧道支持，实现同一PHY上多协议混合传输。关键更新包括：标准化3D堆叠接口（bump
      pitch降至25μm）、管理性通道支持芯片全生命周期遥测、以及多芯片系统形式化验证框架。Intel、AMD、NVIDIA、台积电均已宣布下一代产品全面采用。
    tags:
    - chiplet
    - UCIe 2.0
    - 芯片互联
    - 异构集成
    title: UCIe 2.0规范正式发布：chiplet互联进入多协议统一时代
  Audio:
  - desc: Meta FAIR在MusicGen基础上引入流匹配（Flow Matching）替代原有的EnCodec+Transformer自回归方案，采用Diffusion
      Transformer (DiT) 骨干，原生支持44.1kHz立体声生成。新架构将音乐生成时间压缩至实时因子0.3，FAD评分降至1.82（历史最低），并首次实现文本描述对乐器空间位置的精确控制，已完全开源。
    tags:
    - 音乐生成
    - 流匹配
    - DiT
    - 开源音频
    title: MusicGen Remixed：基于流匹配与DiT架构的立体声音乐生成
  CPU:
  - desc: 9900X3D采用Zen 5架构，12核24线程（单CCD搭载64MB 3D V-Cache，另一CCD标准32MB L3），总计128MB L3缓存，最高加速频率5.6GHz，TDP
      120W。第二代3D V-Cache将CCD置于缓存之下，散热效率大幅改善。Geekbench 6单核得分3520，游戏性能接近9950X3D2的94%，同时保持全核生产力优势，AM5平台兼容600/800系主板。
    tags:
    - Zen 5
    - 3D V-Cache
    - AM5
    - 12核
    title: AMD Ryzen 9 9900X3D：Zen 5 12核单3D V-Cache，AM5游戏与生产力兼得
  Computer Vision:
  - desc: SpatialLM将点云几何编码与LLM语义推理深度融合，采用Q-Former桥接3D编码器与预训练语言模型骨干，支持开放词汇3D场景问答、目标定位与关系推理。在ScanNet与3RScan基准上，零样本3D定位精度较2D-LVM方案提升41%，并首次实现基于自然语言指令的3D场景编辑，标志着视觉-语言-空间三模态融合的重大突破。
    tags:
    - 3D场景理解
    - 空间推理
    - 多模态融合
    - LLM
    title: SpatialLM：基于大型语言模型的3D空间理解与场景重建统一框架
  GPU:
  - desc: RTX 5060 Ti搭载GB206-300 GPU，4608 CUDA核心，128-bit 16GB GDDR7显存（28Gbps，448GB/s带宽），TGP仅180W。相比RTX
      4060 Ti，光栅化性能提升约35%，光追性能提升超50%，DLSS 4多帧生成加持下4K游戏可达60fps+。PCIe 5.0 x8接口，支持AV1双编码器，首发价3299元（16GB版），2026年3月上市，目前渠道现货充足。
    tags:
    - Blackwell
    - GDDR7
    - RTX 5060 Ti
    - DLSS 4
    title: NVIDIA GeForce RTX 5060 Ti 16GB：Blackwell中端GDDR7主力全面铺货
  Lang:
  - desc: Rust 2025 Edition于2026年Q2正式稳定，核心特性包括：async闭包（async || {}）支持在闭包内直接.await、返回位置impl
      Trait（RPIT）在trait关联函数中完全可用、if-let链式守卫（if let ... && let ...）消除嵌套match。此外Cargo构建系统引入全局缓存共享与增量编译v2，中型项目全量编译时间平均缩减37%。
    tags:
    - Rust
    - 编程语言
    - 异步编程
    - 类型系统
    title: Rust 2025 Edition正式发布：Async闭包、RPIT与if-let链式语法全面落地
  NLP:
  - desc: Mamba-2提出结构化状态空间对偶（SSD）框架，从矩阵变换角度证明线性注意力与状态空间模型本质上是半可分离矩阵的不同分解形式。该统一理论催生了8K序列上比FlashAttention-2快2-8倍的混合架构，在300B
      token预训练规模下困惑度全面优于同参数量的Transformer++与纯Mamba基线，已集成至HuggingFace Transformers生态。
    tags:
    - 状态空间模型
    - SSM
    - Transformer替代
    - 长序列建模
    title: Mamba-2：状态空间模型与Transformer注意力机制的深度统一
  Net:
  - desc: Wi-Fi 8在Wi-Fi 7的320MHz带宽与4K-QAM基础上，核心目标是实现超高可靠性（UHR）。引入分布式MLO多链路聚合增强、协调空间复用（Co-SR）与确定性低延迟调度机制，目标将最差情况时延降至1ms以下，丢包率控制在10⁻⁶量级。物理层新增分布式RU与改进前导码打孔方案，预计2028年最终冻结，2026年中完成Draft
      1.0。
    tags:
    - Wi-Fi 8
    - 802.11bn
    - UHR
    - 低延迟无线
    title: Wi-Fi 8 (IEEE 802.11bn)：超高可靠性无线标准进入草案1.0阶段
  News:
  - desc: 台积电于2026年6月宣布N2P制程在新竹Fab 20成功进入风险量产阶段。N2P采用全环绕栅极（GAA）纳米片晶体管架构，相比N3E实现同等功耗下15%速度提升或同速下35%功耗降低，逻辑密度提升1.15倍。SRAM单元面积仅0.0175μm²（较N3缩减23%），首次引入背面供电网络（BSPDN）试用版本。Apple
      A20与NVIDIA Rubin GPU已锁定首批产能。
    tags:
    - TSMC
    - N2P
    - GAA
    - 先进制程
    title: TSMC N2P制程进入风险量产：GAA纳米片晶体管定义2026下半年先进工艺
