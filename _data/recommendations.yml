algorithm:
- desc: 经典监督学习算法，通过寻找最大化类别间隔的最优超平面实现二分类与多分类。核技巧(Kernel Trick)使其能高效处理非线性可分数据，常用核函数包括RBF、多项式与Sigmoid。SVM在小样本高维数据场景下表现优异，广泛应用于文本分类、图像识别与生物信息学。sklearn.svm提供SVC/SVR等完整实现，关键超参数包括C(正则化强度)与gamma(RBF核宽度)。
  tags:
  - SVM
  - Supervised Learning
  - Kernel Method
  - Classification
  - Margin Maximization
  title: 支持向量机 (Support Vector Machine, SVM)
cv_recommend:
