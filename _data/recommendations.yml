algorithm:
- desc: 支持向量机通过寻找最大化类别间隔的超平面实现分类，借助核技巧（RBF、多项式）映射至高维空间处理非线性问题，软间隔与正则化平衡泛化能力。其凸优化目标保证全局最优解，在小样本、高维模式识别（如文本分类、生物特征识别）中依然保持竞争力，是理解统计学习理论与结构风险最小化的基石算法。
  tags:
  - SVM
  - Kernel Method
  - Classification
  - Convex Optimization
  title: 支持向量机 (SVM)
cv_recommend:
  agency: ミュージックレイン
  hometown: 东京都
  intro: 雨宮天以清澄透明且富有穿透力的声线著称，音域宽广，能够精准捕捉角色内心波动的细微层阶。她的演技基础扎实，情感流露自然不造作，在沉稳与活泼之间切换自如。其发声位置靠前，赋予声音一种独特的空灵感，同时在中低音域也保有温润厚度，使得角色塑造层次丰富。雨宮天善于通过气息控制和语速变化传达微妙情绪，无论是静谧独白还是情感宣泄场景，均能保持极强的控制力。她经由试镜选拔进入声优业界，在事务所体系下持续拓展表现边界，并积极开展音乐活动，以单人名义发行多部作品，展现出演唱与表现的双重才能，成为新一代声优艺术家的代表性存在。
  name: 雨宮天
date: '2026-06-01'
history:
- event: 玛丽莲·梦露出生于洛杉矶。
  year: '1926'
- event: 披头士专辑《Sgt. Pepper's Lonely Hearts Club Band》发行，被视为概念专辑里程碑。
  year: '1967'
- event: 美国有线电视新闻网（CNN）开播，成为全球首个24小时新闻频道。
  year: '1980'
- event: Napster 文件共享服务上线，颠覆音乐产业分发模式。
  year: '1999'
- event: 尼泊尔王室血案：王储迪彭德拉枪杀国王比兰德拉及多名王室成员后自杀。
  year: '2001'
- event: 通用汽车公司根据美国破产法第11章申请破产保护，进行史上最大规模汽车业重组。
  year: '2009'
llm:
- desc: Google推出Gemini 1.5 Pro，采用混合专家路由与高效注意力机制，支持原生多模态（文本、图像、音频、视频）并实现100万token上下文窗口，在‘大海捞针’测试中达到99.7%召回率。模型通过JAX框架的SCALE技术高效训练，在MMMU、MathVista等跨模态推理任务上刷新SOTA，同时提供基于TPU
    v5的本地部署方案。
  tags:
  - Gemini
  - Long Context
  - MoE
  - Multimodal
  title: 'Gemini 1.5 Pro: 超长上下文多模态模型'
new_project:
- desc: 面向自托管LLM的浏览器端用户界面，支持Ollama和OpenAI兼容API。提供多轮对话、Markdown渲染、RAG增强检索、文档上传分析及语音输入输出，具备多用户管理与模型实时切换能力。采用SvelteKit构建，可一键Docker部署，已成为本地大模型交互的事实标准前端。
  tags:
  - Open-Source
  - AI
  - UI
  - Self-Hosted
  title: Open WebUI
  url: https://github.com/open-webui/open-webui
paper:
- desc: 阿里巴巴通义千问团队发布Qwen2技术报告，涵盖0.5B-72B密集模型与MoE版本。所有变体均基于Grouped Query Attention、SwiGLU激活，预训练于3T
    tokens多语言语料。72B模型在MMLU、HumanEval等基准上超越LLaMA 3 70B，而7B模型在同等规模中性能最优。其开源权重与全面训练细节推动了可复现大模型研究。
  tags:
  - Qwen2
  - LLM
  - Open-Source
  - Mixture-of-Experts
  title: 'Qwen2: Advanced Open-Source Large Language Models'
  url: https://arxiv.org/abs/2407.10671
tech:
  Arch:
  - desc: 英特尔在其20A工艺节点上实现PowerVia背面供电技术，将电源网络完全移至晶圆背面，正面专用于信号布线。此举消除电源/信号间串扰，使EUV工艺下晶体管密度提升10%，IR压降降低30%，并简化M0层设计。PowerVia已与RibbonFET栅极环环绕配合，用于Arrow
      Lake处理器量产准备。
    tags:
    - Backside Power Delivery
    - Intel
    - 20A
    - Semiconductor
    title: '英特尔PowerVia: 背面供电技术进入量产准备'
  Audio:
  - desc: OpenVoice V2 实现了极低成本下的零样本语音克隆与风格迁移。通过解耦音色、风格和语言表征，仅需一段短音频即可复刻目标声音，并支持灵活的情感、口音和节奏控制。其流水线采用流匹配与对抗训练，在LibriSpeech上仅用1.5M参数便达到4.2%词错误率，且推理延迟低于50ms，适用于实时语音助手。
    tags:
    - Voice Cloning
    - Zero-shot
    - TTS
    - Style Transfer
    title: 'OpenVoice V2: 低成本零样本语音克隆'
  CPU:
  - desc: Core Ultra 5 245K 基于Intel 20A工艺与Arrow Lake架构，拥有14核心（6 Lion Cove P核 + 8 Skymont
      E核），P核加速至5.0GHz，E核4.5GHz，24MB L3缓存，内置NPU 4引擎提供13 TOPS AI算力，支持PCIe 5.0与LGA 1851接口，基础功耗125W，专为Lunar
      Lake后的主流桌面与AI PC设计。
    tags:
    - Arrow Lake
    - Intel
    - NPU
    - LGA 1851
    title: Intel Core Ultra 5 245K (Arrow Lake)
  Computer Vision:
  - desc: 百度提出首个实时检测Transformer（RT-DETR），通过混合编码器与IoU感知查询选择机制，在保持DETR高精度的同时将推理延迟降至同类CNN实时检测器水平。在COCO
      val2017上，RT-DETR-R50达到53.0% AP，推理速度达108 FPS（TensorRT FP16），其去噪训练与查询优化设计为端到端检测提供了高效工业级方案。
    tags:
    - Object Detection
    - DETR
    - Real-Time
    - Transformer
    title: 'RT-DETR: 基于Transformer的实时目标检测'
  GPU:
  - desc: RTX 5070 采用台积电4NP工艺Blackwell架构，搭载6144 CUDA核心、192张量核心及40 RT核心，集成12GB GDDR7显存于192-bit位宽，带宽达672
      GB/s。基础频率2.1GHz，加速2.5GHz，TGP 220W。支持DLSS 4多帧生成与光线重构，FP8 AI算力达388 TOPS，面向1440p高刷光追与本地AI推理。
    tags:
    - Blackwell
    - GDDR7
    - Ray Tracing
    - DLSS 4
    title: NVIDIA GeForce RTX 5070 (Blackwell)
  Lang:
  - desc: Go 1.23 正式引入 range-over-func 语法，允许开发者通过泛型迭代器定义自定义集合遍历逻辑，并与标准库 iter 包协同。此特性基于类型参数与
      yield 机制，使串流数据处理、惰性求值等场景编码更优雅，同时编译器优化使迭代器函数内联开销可忽略，运行时性能不受泛型影响。
    tags:
    - Go
    - Programming Language
    - Iterators
    - Generics
    title: 'Go 1.23: 泛型迭代器与标准库增强'
  NLP:
  - desc: BAAI发布BGE-M3，支持超过100种语言，实现密集、稀疏（词汇）与多向量（ColBERT）三种检索范式统一。模型采用XLM-RoBERTa架构，训练阶段引入自蒸馏与对比学习，在BEIR、MTEB等多语言基准上刷新记录，单次前向即可生成适用于不同检索策略的1024维向量，大幅简化多语言RAG流水线。
    tags:
    - Embedding
    - Multilingual
    - Dense Retrieval
    - Sparse Retrieval
    title: 'BGE-M3: 多语言多粒度嵌入模型'
  Net:
  - desc: 欧盟Hexa-X-II项目联合爱立信、诺基亚等厂商完成首次140GHz频段RIS辅助通信外场测试。该系统利用含1024单元的超表面实现智能反射，结合AI信道预测，在100米距离实现20Gbps峰值速率，频谱效率达8
      bps/Hz，为2030年商用6G的1Tbps体验奠定物理层基础。
    tags:
    - 6G
    - THz
    - RIS
    - AI-Native
    title: 6G太赫兹通信与智能超表面原型系统
  News:
  - desc: 2026年2月，微软发布Majorana 1芯片，采用拓扑超导体纳米线实现8个拓扑量子比特，量子态受栅极保护，单比特门保真度达99.9%。该芯片集成于稀释制冷平台，通过数字脉冲控制，标志着从含噪声中等规模量子（NISQ）向容错量子计算的重大转折。
    tags:
    - Quantum Computing
    - Microsoft
    - Topological Qubit
    - Majorana
    title: 微软发布首个拓扑量子比特芯片Majorana 1
