    title: NVIDIA Vera CPU：88核Arm Neoverse数据中心CPU
  Computer Vision:
  - desc: 清华大学与阿里巴巴联合提出ViT³，将测试时训练（Test-Time Training）引入视觉Transformer，通过每个patch独立的TTT通道将计算复杂度从O(N²)降至O(N)，在ImageNet-1K达到87.2%
      top-1准确率，同时保持全局感受野，为视觉基础模型提供新的高效范式。
    tags:
    - Vision Transformer
    - Test-Time Training
    - Linear Complexity
    - CVPR 2026
    title: 'ViT³: 测试时训练解锁视觉Transformer线性复杂度 (CVPR 2026 Oral)'
  GPU:
  - desc: RTX 5070基于Blackwell架构，搭载6144 CUDA核心、12GB GDDR7显存（600 GB/s带宽），核心频率2.51 GHz，支持DLSS
      4多帧生成与光线重建，TDP 250W，针对2K高帧率游戏与本地AI推理提供显著加速。
    tags:
