new_project:
- desc: Nous Research发布的开源AI Agent框架Hermes Agent，2026年5月成为全球使用量最大的开源AI Agent项目。核心特性包括：跨会话持久记忆（Persistent
    Session Memory）结合自动压缩与语义检索、基于MCP协议的多工具编排引擎、支持300+种MCP服务器无缝集成。采用本地优先架构，支持完全离线运行。内置Cross-Session
    Auto-Compression机制使长期记忆存储效率提升10倍，在SWE-bench Verified等基准上刷新开源Agent性能纪录。
  tags:
  - AI Agent
  - Open Source
  - Persistent Memory
  - MCP Protocol
  - Nous Research
  title: 'Hermes Agent: 带持久记忆的开源AI Agent框架'
  url: https://github.com/NousResearch/hermes-agent
paper:
- desc: 该论文系统研究了语言模型推理能力涌现与训练动态之间的深层关联，发现推理能力并非简单地随模型规模线性增长，而是呈现阶段性跃迁。作者通过理论分析与大规模实验，揭示了影响推理能力的关键训练动力学因素——包括数据课程策略、损失地形几何结构、以及梯度的多尺度交互。基于此提出EvoLM训练框架，通过动态课程调整与梯度协调机制，使3B参数模型在数学推理任务上达到传统7B模型的性能水平。
  tags:
  - NeurIPS 2025
  - Best Paper
  - Training Dynamics
  - Reasoning
  - Language Model
  title: 'EvoLM: In Search of Lost Training Dynamics for Language Model Reasoning
    (NeurIPS 2025 Best Paper)'
  url: https://proceedings.neurips.cc/paper_files/paper/2025/hash/778cc31583604ebf246726055e9f737f-Abstract-Conference.html
