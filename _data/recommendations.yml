algorithm:
- desc: 支持向量机是一种监督学习算法，通过寻找最大间隔超平面进行分类，支持核技巧处理非线性问题，适用于小样本高维度场景，是传统机器学习中的经典方法。
  tags:
  - 监督学习
  - 分类算法
  - 核方法
  - 最大间隔
  title: 支持向量机 (Support Vector Machine)
cv_recommend:
  agency: 东京俳优生活协同组合（俳协）
  hometown: 广岛县
  intro: 种崎敦美是日本新生代声优中的杰出代表，以其清澈而多变的声线和高度的演技可塑性闻名。她擅长通过细腻的情感表达塑造角色，在业内获得广泛认可。近年来，她积极参与各类配音工作，展现出稳定的专业素养和持续的成长潜力，成为声优界备受瞩目的实力派之一。
  name: 种崎敦美
date: '2026-04-11'
history:
- event: 布痕瓦尔德集中营被盟军解放，标志着纳粹集中营体系开始瓦解。
  year: '1945'
- event: 美国总统杜鲁门就朝鲜战争向全国发表讲话，宣布解除道格拉斯·麦克阿瑟的职务。
  year: '1951'
- event: 阿波罗13号任务发射升空，随后发生服务舱氧气罐爆炸，成为NASA史上最著名的救援任务。
  year: '1970'
- event: 波斯湾战争正式停火，联合国安理会通过第687号决议，确立停火条件。
  year: '1991'
- event: 日本政府将福岛第一核电站事故的核危机级别提升至最高级7级，与切尔诺贝利事故同级。
  year: '2011'
- event: 事件视界望远镜（EHT）合作组织发布人类首张黑洞照片，揭示了M87星系中心的超大质量黑洞。
  year: '2019'
