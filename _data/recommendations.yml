  intro: 高桥李依是日本新生代实力派声优，1994年出生于埼玉县，所属事务所为81 Produce。她以充满活力的元气声线和精湛的演技著称，能够驾驭从开朗少女到冷酷角色的广泛类型。在舞台上，她以丰富的表情和即兴发挥的颜艺表演深受观众喜爱，被粉丝称为‘颜艺大师’。尽管出道时间较晚，但她迅速积累了大量人气，并多次在声优奖项中获得提名。她的声音清澈富有感染力，为众多角色注入了独特的生命力，是当代日本声优界备受瞩目的存在。
  name: 高桥李依
date: '2026-04-27'
