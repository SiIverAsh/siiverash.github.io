  - desc: 2026年6月8日，3GPP在新加坡全会上正式锁定6G标准化关键里程碑。Release 21规范将于2029年3月完成冻结，为芯片厂商预留约3年开发窗口。6G核心指标包括：峰值速率100Gbps以上、亚毫秒级确定性延迟、原生AI-RAN融合架构、太赫兹频段(100GHz-300GHz)商用化路线图，以及通感一体化(ISAC)标准框架。
