  Net:
  - desc: 2026年4月，中国移动联合华为在北京、上海、广州等核心城市正式商用5G-Advanced超级上行(SUL)增强方案，通过TDD-FDD载波聚合与上行MIMO技术，单用户上行峰值速率突破1Gbps（实测1.2Gbps），时延低至4ms。该方案面向AI视频分析、云XR、工业视觉质检等高上行带宽场景，是3GPP
      Release 18标准的关键落地实践。
    tags:
