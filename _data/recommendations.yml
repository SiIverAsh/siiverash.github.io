    title: 'NaturalSpeech 3: 零样本语音合成新范式'
  CPU:
  - desc: Zen 5 架构，TSMC 4nm，16 核 32 线程，最大加速 5.7 GHz，80 MB 缓存。IPC 提升 16%，支持 AVX-512
      和 DDR5-6000。TDP 170W。
    tags:
