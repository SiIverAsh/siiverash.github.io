llm:
- desc: 百度于2026年5月9日正式发布文心大模型5.1（ERNIE 5.1），在LMArena搜索榜等多榜单登顶国内第一。核心突破包括：通过端到端训练效率优化将预训练成本降至业界平均水平的6%；引入增强推理架构实现多步逻辑推理与搜索增强生成一体化；升级多模态理解能力覆盖图文混合输入。同步在百度智能云千帆平台上线，提供API调用与企业私有化部署方案。该模型标志着国产大模型在成本效率与推理能力上达到新高度。
