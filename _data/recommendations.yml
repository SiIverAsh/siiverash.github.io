    title: Meta发布Llama 3：使用15T数据预训练，最大参数超4000亿
  Net:
  - desc: 基于QUIC协议深度优化，引入零RTT连接建立与前向安全加密，在100ms延迟环境下吞吐量比传统TCP代理提升5倍。支持多路复用与流量伪装，头部开销仅2字节，已提交IETF草案，成为下一代隐私增强传输标准候选。
    tags:
