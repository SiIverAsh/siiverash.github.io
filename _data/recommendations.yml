      Cove性能核+16个Skymont能效核，最高睿频6.0GHz，支持DDR5-8000与PCIe 5.0，单核性能提升15%。
    tags:
    - Intel
    - Arrow Lake
    - Hybrid Architecture
    - DDR5
    title: 'Intel Core Ultra 9 295K: Arrow Lake-S Refresh'
  Computer Vision:
  - desc: 上海AI实验室推出InternVideo2.5，在视频理解、多模态对齐和生成任务上达到SOTA，支持任意分辨率视频输入，采用动态掩码与自适应帧采样，在Ego4D、Kinetics-700等基准上刷新纪录。
    tags:
    - Video Understanding
    - MultiModal
    - Foundation Model
