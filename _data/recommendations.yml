algorithm:
- desc: 经典的线性二分类算法，通过逻辑函数将线性回归的输出映射到(0,1)区间，以概率形式进行预测。使用最大似然估计求解参数，简单高效，可解释性强，是信用评分、医学诊断等领域的基准模型，也是深度学习的基础组件之一。
  tags:
  - Classification
  - Statistical Learning
  - Linear Model
  - Supervised
  title: 逻辑回归 (Logistic Regression)
cv_recommend:
  agency: アクセルワン
  hometown: 東京都
  intro: 清澈通透的声线是其最鲜明的标志，能够细腻地表现从青涩少女到成熟女性的丰富内心世界。作为歌手同样成果丰硕，多次举办个人巡回演唱会，唱功扎实且舞台感染力强。演技自然流畅，情感层次分明，在同行与观众中均享有高度评价。她持续挑战多元化的角色，展现出宽广的戏路与不懈的进取心，被视为新时代声优的代表人物之一，拥有广泛且忠实的粉丝群体。
  name: 水瀬いのり
date: '2026-06-16'
history:
