    title: 'InternVideo2.5: Scaling Video Foundation Models with Multi-Modal Understanding'
  GPU:
  - desc: AMD基于RDNA 5架构发布RX 8070 XT，采用4nm工艺，集成128个计算单元，支持无限缓存V4与AI加速器，光线追踪性能提升2.5倍，显存带宽达1.2TB/s，对标RTX
      5090。
    tags:
    - AMD
    - RDNA 5
    - Ray Tracing
    - AI Accelerator
    title: 'AMD Radeon RX 8070 XT: RDNA 5架构旗舰显卡'
  Lang:
  - desc: Python 4.0进入Alpha阶段，引入静态类型增强（泛型参数默认不可变）、新模式匹配（序列解构支持）、移除GIL的初步实现（自由线程），以及JIT编译器优化，性能提升约30%。
    tags:
    - Python
