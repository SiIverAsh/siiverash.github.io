paper:
- desc: 该论文发表于ICLR 2026，提出将法线估计重构为阴影序列预测问题，通过时序扩散模型生成多光照条件下的阴影序列，进而回归表面法线。在ScanNet与NYUv2数据集上达到SOTA，平均角度误差降低至12.5度。
  tags:
  - 计算机视觉
  - 三维重建
  - 法线估计
  - ICLR 2026
  title: 'RoSE: Monocular Normal Estimation via Shading Sequence Prediction'
  url: https://arxiv.org/abs/2602.09929
