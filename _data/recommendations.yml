    title: 'Intel Nova Lake桌面CPU: 52核与Z990平台首曝'
  Computer Vision:
  - desc: ICLR 2026论文，由NVIDIA Toronto AI Lab提出。该方法通过视频扩散模型自蒸馏实现端到端生成式3D场景重建，无需显式3D监督即可从稀疏视图合成高质量新视角。核心创新在于将预训练视频扩散模型的时序先验蒸馏至3D表示中，在场景级NeRF与GS重建任务上达到SOTA，单场景推理仅需数分钟。
    tags:
    - 3D重建
    - 视频扩散模型
    - 自蒸馏
    - ICLR 2026
    title: 'Lyra: Generative 3D Scene Reconstruction via Video Diffusion Model Self-Distillation'
  GPU:
  - desc: NVIDIA在GTC 2026发布Vera Rubin平台，包含6款全新芯片：Rubin GPU（双Die设计、HBM4内存、FP4算力达15
      PFLOPS）、Vera CPU（Grace继任者、自研ARM核心）、NVLink 6交换机（3.6 TB/s带宽）、CX10网卡（800GbE）、BlueField
      5 DPU及Spectrum 5交换机。Rubin Ultra维持双Die方案，NVL72机架集成72颗GPU，专为万亿参数MoE推理与Agentic
      AI工厂设计。
    tags:
    - NVIDIA Rubin
    - HBM4
    - NVLink 6
    - Agentic AI
    title: 'NVIDIA Vera Rubin: 新一代Agentic AI超级计算平台'
  Lang:
  - desc: Python 3.15 beta于2026年5月发布，正式版预计2026年10月。最大变更为PEP 703 Free-Threading（无GIL模式）成为CPython默认构建，消除多线程瓶颈；PEP
      744引入的JIT编译器（基于Copy-and-Patch）进入稳定阶段，纯Python代码加速2-5倍。同步推出PEP 803 'abi3t'稳定ABI，确保C扩展兼容自由线程构建。
    tags:
    - Python 3.15
    - Free-Threading
    - JIT编译器
    - 无GIL
    title: 'Python 3.15: Free-Threading默认启用与JIT编译器落地'
  NLP:
  - desc: EACL 2026最佳论文奖。该研究首次系统证明LLM Agent团队可协作发现并利用真实世界零日安全漏洞。多Agent框架包含规划、执行、代码分析等角色分工，在无先验知识条件下对15个真实CVE进行端到端漏洞利用测试，成功率达53%，揭示LLM在网络安全领域的双刃剑效应。
    tags:
    - LLM Agent
    - 零日漏洞
    - 网络安全
    - EACL 2026 Best Paper
    title: Teams of LLM Agents can Exploit Zero-Day Vulnerabilities
