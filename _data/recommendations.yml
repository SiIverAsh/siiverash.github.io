new_project:
- desc: 一个自进化的AI Agent框架，支持Agent动态构建技能树并在交互中持续学习与扩展能力。项目采用模块化设计，将工具调用、记忆管理与任务规划解耦，允许Agent在运行时自主发现新技能并组合复用。适用于构建可长期运行的自治Agent系统。
  tags:
  - AI Agent
  - Self-Evolving
  - Skill Tree
  - Autonomous System
  title: lsdefine/GenericAgent
  url: https://github.com/lsdefine/GenericAgent
paper:
- desc: ICLR 2026杰出论文奖（Outstanding Paper Award）。该论文从通信复杂性理论角度严格证明了Transformer架构在表示能力上具有内在的简洁性（Succinctness），即Transformer能以远少于传统序列模型的参数表达特定函数族。这一理论结果为理解大语言模型的规模化定律提供了全新的计算复杂度视角，揭示了注意力机制在表达效率上的根本优势。
  tags:
  - ICLR 2026
  - Outstanding Paper
  - Transformer Theory
  - Communication Complexity
  title: Transformers Are Inherently Succinct
  url: https://arxiv.org/abs/2510.19315
