llm:
- desc: 2026年6月，Anthropic下一代中阶模型Claude Sonnet 5（代号Fennec）的模型标识符在合作平台意外曝光。泄露信息显示其在编程、多步推理与长上下文理解方面实现跨代提升，编程基准得分超越前代Opus
