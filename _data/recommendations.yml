cv_recommend:
  agency: I'm Enterprise
  hometown: 北海道
  intro: 松冈祯丞是日本男性声优，以其多变的声线和深厚的演技功底在业界广受认可。他的声音可塑性强，能够驾驭从少年到成熟男性的多种角色类型，尤其擅长表达细腻的情感变化。自2010年代出道以来，他通过持续积累经验，逐步建立起独特的配音风格。在专业领域，他注重角色内心世界的刻画，往往能通过声音赋予角色鲜明的个性。此外，他在声优活动中展现出诚恳谦逊的态度，积极参与广播节目和粉丝见面会，赢得了观众的支持与喜爱。他的职业生涯体现了对声优艺术的不懈追求，已成为当代声优界的中坚力量之一。
  name: 松冈祯丞
date: '2026-03-17'
history:
- event: 意大利王国成立，维托里奥·埃马努埃莱二世成为首任国王。
  year: '1861'
- event: 美国成功发射人造卫星“先锋1号”，成为世界上第四颗进入太空的人造卫星。
  year: '1958'
- event: 南非举行白人公投，以压倒性多数支持结束种族隔离制度，为民主化铺平道路。
  year: '1992'
- event: 美国及其盟友开始对伊拉克进行军事行动，标志着伊拉克战争的爆发。
  year: '2003'
- event: 联合国安理会通过第1973号决议，决定在利比亚设立禁飞区，以保护平民。
  year: '2011'
- event: 全球多国因新冠疫情宣布封锁措施，包括旧金山等城市实施“居家令”。
  year: '2020'
