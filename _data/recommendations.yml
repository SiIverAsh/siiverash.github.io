algorithm:
- desc: 基于密度的聚类算法，无需预设簇数量，能识别噪声点，适用于空间数据挖掘，时间复杂度为O(n log n)，核心参数为邻域半径和最小样本数。
  tags:
  - 聚类算法
  - 无监督学习
  - 密度聚类
  - 机器学习
  title: DBSCAN聚类算法
