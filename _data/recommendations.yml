algorithm:
- desc: 经典二分类算法，通过sigmoid函数将线性输出映射为概率，利用对数损失进行最大似然估计，具有高可解释性与低计算开销，是很多现代分类器的基础。
  tags:
  - 分类
  - 监督学习
  - 统计学习
  - 可解释性
  title: 逻辑回归 (Logistic Regression)
cv_recommend:
  agency: ソニー・ミュージックアーティスツ
  hometown: 东京都
  intro: 水濑祈以清亮甜美的声线著称，音质通透且辨识度极高。她善于通过细腻的呼吸与抑扬捕捉角色内心变化，既能诠释活泼元气的少女，也能驾驭温柔内向的复杂人物，情绪转换自然且极具感染力。作为声优歌手，她的歌唱能力同样出色，多次举办个人演唱会，音乐作品销量斐然。近年在演技上持续突破，挑战更多元的角色类型，展现出强烈的成长意愿，成为平成后期最具代表性的女性声优之一。
  name: 水瀬いのり
date: '2026-05-29'
history:
- event: 英国天文学家爱丁顿通过日全食观测，首次验证爱因斯坦广义相对论中的光线弯曲预言。
  year: '1919'
- event: 新西兰人埃德蒙·希拉里与夏尔巴人丹增·诺尔盖首次成功登顶珠穆朗玛峰。
  year: '1953'
- event: 微软发布Windows 2.1，增加对Intel 80286处理器的支持，分为286和386版本。
  year: '1988'
- event: 法国全民公投以54.87%的反对票否决《欧盟宪法条约》，引发欧洲一体化进程严重危机。
  year: '2005'
- event: Facebook IPO后第二个交易日股价暴跌11%，触发市场对科技股高估值的担忧。
  year: '2012'
- event: 国际足联多名高级官员在苏黎世因腐败指控被捕，FIFA面临史上最大丑闻。
  year: '2015'
llm:
- desc: 阿里云2024年9月发布的72B开源指令模型，支持29种语言与128K上下文，在数学、代码和通用推理上大幅提升，提供丰富的量化版本以便部署。
  tags:
  - 阿里云
  - 开源
  - LLM
  - 多语言
  title: Qwen2.5-72B-Instruct
new_project:
- desc: 低代码大模型微调框架，支持LLaMA、Qwen、ChatGLM等百种模型，集成LoRA、QLoRA、全量微调等方法，提供Web UI，大幅降低微调门槛。
  tags:
  - LLaMA
  - Fine-tuning
  - LoRA
  - 开源
  title: LLaMA-Factory
  url: https://github.com/hiyouga/LLaMA-Factory
paper:
- desc: 顶会论文推荐：NeurIPS 2023接收论文，提出无需显式奖励模型的RLHF替代方法，直接通过偏好对优化语言模型，简化对齐流程并提升稳定性。
  tags:
  - RLHF
  - Preference Optimization
  - LLM Alignment
  - NeurIPS 2023
  title: 'Direct Preference Optimization: Your Language Model is Secretly a Reward
    Model'
  url: https://arxiv.org/abs/2305.18290
