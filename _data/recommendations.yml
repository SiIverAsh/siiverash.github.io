llm:
- desc: DeepSeek于2026年4月正式开源V4模型，采用MoE架构总参数1.6万亿（激活参数约160B），原生支持1M token超长上下文窗口。在代码生成、Agent工具调用与多步推理基准上比肩GPT-5
    High，推理成本仅为闭源模型的1/20，训练采用FP8混合精度与Multi-Token Prediction策略大幅提升效率。
  tags:
  - DeepSeek V4
  - MoE
  - 1.6T Params
  - 1M Context
  - Open Source
  title: 'DeepSeek V4: 1.6T参数MoE开源旗舰，百万上下文普惠时代'
new_project:
- desc: vLLM是当前工业界最广泛部署的开源LLM推理引擎，基于PagedAttention实现近乎零浪费的KV缓存管理，支持连续批处理(Continuous
    Batching)、张量并行、前缀缓存(Prefix Caching)与FP8/AWQ/GPTQ多量化方案。v1引擎重构后吞吐量再提升1.5倍，已成为Anthropic、LMSYS等机构的基础设施核心组件。
  tags:
  - LLM Inference
  - PagedAttention
  - Continuous Batching
  - Python
  - CUDA
  title: 'vllm-project/vllm: Easy, Fast, and Cheap LLM Serving for Everyone'
  url: https://github.com/vllm-project/vllm
paper:
- desc: ICLR 2026 Oral论文，提出通用逆蒸馏框架(UID)，无需GAN即可利用真实数据监督训练图像匹配模型。通过逆向知识迁移将教师模型特征蒸馏至学生匹配网络，在多个视觉匹配基准上超越GAN-based方法，训练稳定性显著提升且无需对抗训练。
  tags:
  - ICLR 2026
  - Oral
  - Inverse Distillation
  - Image Matching
  - No GANs
  title: Universal Inverse Distillation for Matching Models with Real-Data Supervision
    (No GANs)
  url: https://openreview.net/forum?id=8NuN5UzXLC
