algorithm:
- desc: 一种非线性降维算法，基于流形学习，适用于高维数据可视化，保留局部结构且计算效率高，广泛用于单细胞转录组学和图像分析。
  tags:
  - Dimensionality Reduction
  - Manifold Learning
  - Visualization
  - Machine Learning
  title: UMAP (Uniform Manifold Approximation and Projection)
