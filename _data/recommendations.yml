llm:
- desc: 百度 ERNIE 5.0 是首个 2.4 万亿参数的原生全模态大模型，采用稀疏 MoE 设计与跨模态对齐预训练，在文本、图像、音频、视频任务上实现零样本
    SOTA。支持 128K 上下文，推理效率较稠密模型提升 5 倍，已在百舸·AI 云平台开放 API。
  tags:
  - 多模态
  - MoE
  - 零样本学习
  - 百度
  title: 'ERNIE 5.0: 统一多模态基础模型'
new_project:
- desc: LlamaIndex 是一个开源框架，用于构建基于大语言模型的文档问答与检索系统。支持多种文件格式解析、向量化存储与语义搜索，集成 OCR 引擎与多模态理解，可部署为本地代理或云端服务，已在
    GitHub 获得 25k+ stars。
  tags:
  - 文档处理
  - LLM 应用
  - 开源框架
  - Python
  title: 'LlamaIndex: 文档代理与 OCR 平台'
  url: https://github.com/run-llama/llama_index
paper:
- desc: 该论文发表于 ICLR 2026，提出了一种局部注意力机制，通过动态感受野调整，在 ImageNet 上达到 89.2% 的 top-1 准确率，同时将计算复杂度降低
    35%。方法结合了卷积的归纳偏置与 Transformer 的全局建模能力，适用于高分辨率图像分类。
  tags:
  - 视觉 Transformer
  - 注意力机制
  - 图像分类
  - ICLR
  title: Locality-Attending Vision Transformer
  url: https://iclr.cc/virtual/2026/poster/10010083
