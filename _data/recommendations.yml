    - Discourse Graph
    - LLM
    - Document-Level NLP
    title: Discourse Graph Guided Document Translation with Large Language Models
  Net:
  - desc: MediaTek在COMPUTEX 2026上发布Filogic Wi-Fi 8（802.11bn）单芯片平台，斩获两项Best Choice
