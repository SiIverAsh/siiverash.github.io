algorithm:
- desc: XGBoost是由陈天奇于2014年提出的梯度提升树集成算法，在结构化/表格数据任务中长期占据统治地位。其核心创新包括：对目标函数进行二阶泰勒展开以更精准近似损失、引入正则化项防止过拟合、支持列采样与加权分位数草图实现高效并行化。XGBoost在Kaggle竞赛中斩获无数冠军，至今仍是工业界表格数据建模的首选基线。
  tags:
  - Gradient Boosting
  - Tree Ensemble
  - Regularization
  - Structured Data
  title: XGBoost (eXtreme Gradient Boosting)
cv_recommend:
  agency: 青二プロダクション
  hometown: 奈良県
  intro: 羊宮妃那是日本新生代女性声优中备受瞩目的实力派。隶属于老牌事务所青二プロダクション，2000年3月26日出生于奈良县。她的声线清澈通透，兼具透明感与情感张力，尤其擅长演绎内心戏丰富的角色。在演技上，她以细腻的情感层次和精准的台词节奏著称，能从轻声细语瞬间切换至极具爆发力的呐喊，展现了远超同龄人的声优功底。作为令和时代声优界的代表性新星，她的成长轨迹备受业界与观众期待。
  name: 羊宮妃那
date: '2026-06-23'
