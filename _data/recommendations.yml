    title: 'UALM: Unified Audio Language Model for Understanding, Generation and Reasoning'
  CPU:
  - desc: AMD于2026年5月正式宣布Zen 6架构EPYC Venice处理器在TSMC 2nm(N2)工艺上启动量产爬坡。旗舰型号搭载256核心(32核/CCD
      × 8 CCD)，采用SP7新平台(Congo/Kenya/Nigeria)。工程样品显示全核频率达4.2GHz，较上代Turin性能提升约70%。首次引入L4缓存die-stacking方案，AI推理吞吐量较竞品NVIDIA
      Vera高出3.3倍。
    tags:
