tech:
  Arch:
  - desc: 采用台积电3nm FinFET工艺，集成291亿晶体管，CPU为1+3+4三簇架构，包括一颗Cortex-X5超大核（3.4GHz）。GPU为Immortalis-G720，支持硬件光追，AI算力达60
