cv_recommend:
  agency: I'm Enterprise
  hometown: 日本东京都
  intro: 内田真礼是日本知名声优，以其清澈而富有表现力的嗓音著称。她于2010年代初期出道，凭借多部作品中的出色演绎迅速积累人气。她的声音可塑性强，能够驾驭从活泼少女到沉稳御姐的多种角色类型。在配音工作中，她注重情感细节的刻画，善于通过声音传递角色的内心世界。此外，她也在音乐领域有所发展，发行过多张个人专辑。作为声优界的中坚力量，她持续以专业态度活跃于行业前沿。
  name: 内田真礼
date: '2026-04-01'
history:
- event: 苹果公司由史蒂夫·乔布斯、史蒂夫·沃兹尼亚克和罗纳德·韦恩共同创立。
  year: '1976'
- event: 谷歌推出Gmail电子邮件服务，初始提供1GB存储空间。
  year: '2004'
- event: 苹果公司发布第一代iPad，开创平板电脑市场。
  year: '2010'
- event: 微软发布Windows 8操作系统，引入Metro界面。
  year: '2012'
- event: 亚马逊推出Amazon Echo智能音箱，搭载Alexa语音助手。
  year: '2015'
- event: 日本政府公布新年号“令和”，取代“平成”时代。
  year: '2019'
