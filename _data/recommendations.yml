paper:
- desc: 一种端到端训练的大型多模态模型，连接视觉编码器与语言模型，用于通用视觉-语言理解与生成。在多个学术基准上达到当时最佳性能。
  tags:
  - 多模态
  - 视觉语言
  - 指令微调
  - 开源
  title: 'LLaVA: Large Language and Vision Assistant'
  url: https://arxiv.org/abs/2304.08485
tech:
  Arch:
  - desc: 搭载 280 亿晶体管，10 核 CPU（4 性能 + 6 能效），10 核 GPU，16 核神经网络引擎。统一内存带宽 120 GB/s，AI
      算力达 38 TOPS。
    tags:
    - ARM
    - 3nm
    - SoC
    - 统一内存
    title: Apple M4 芯片：第二代 3nm 工艺
  Audio:
  - desc: 微软发布，使用分解式编解码器和扩散模型，实现零样本语音克隆。支持情感、韵律和音色解耦控制，合成语音自然度接近真人。
    tags:
    - 语音合成
    - 扩散模型
    - 零样本
