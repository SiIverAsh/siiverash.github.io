llm:
- desc: Google DeepMind发布Gemma 3系列，旗舰27B参数模型支持128K上下文窗口与原生多模态理解（图像+文本输入），在LMSYS Chatbot
    Arena上ELO评分超越Llama 3.1 70B。采用分组查询注意力(GQA)与专家混合路由优化，可运行于单张NVIDIA H100 GPU，完全开放权重商用友好。
  tags:
  - Gemma 3
