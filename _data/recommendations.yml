    - 多模态
    - CVPR 2026
    title: 'GenVDM: 基于扩散模型的通用视频生成基础架构'
  GPU:
  - desc: RTX 5060 12GB搭载GB206-300-A1核心，4608 CUDA核心，128-bit显存位宽，12GB GDDR7显存，带宽384GB/s。支持DLSS
      4多帧生成与Reflex 2低延迟技术，TGP仅150W。国行售价2499元起，较RTX 4060性能提升约35%，成为1080p/1440p游戏新甜点。
