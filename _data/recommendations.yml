  intro: 花澤香菜于1989年2月25日出生于东京都，自幼以童星身份活跃于演艺界，后转型为职业声优，现隶属大沢事務所。凭借清澈透明、甜美柔和且辨识度极高的声线，她迅速成为日本声优界的标志性人物。其音域表现力极为丰富，能够自然游走于温柔治愈与冷静锐利之间，对不同性格类型的角色均能赋予独特生命力。除卓越的配音成就外，她亦在音乐领域深耕，发行多张个人专辑并成功举办大型巡回演唱会，实现了声优与歌手的双重事业高度。她曾荣获第9回声优奖最佳女配角奖，在业界与粉丝群体中均享有极高声誉，是实力与影响力兼备的顶级声优。
  name: 花澤香菜
