algorithm:
- desc: 决策树是一种经典监督学习算法，通过递归划分特征空间构建树形模型。核心算法包括ID3（信息增益）、C4.5（增益率）和CART（Gini不纯度）。其优势在于模型可解释性极强——任意预测路径均可追溯至明确的特征条件组合。作为集成学习（随机森林、GBDT、XGBoost）的基学习器，决策树在现代ML中仍占据基础性地位。关键参数包括max_depth、min_samples_split与criterion选择，控制过拟合与泛化性能的平衡。
  tags:
  - Decision Tree
  - Supervised Learning
  - CART
  - Gini Impurity
  - Interpretable ML
  - Ensemble Learning
  title: 决策树 (Decision Tree)
cv_recommend:
  agency: ラクーンドッグ (Raccoon Dog)
  hometown: 愛知県名古屋市
  intro: 1994年10月16日出生于爱知县名古屋市，所属事务所为Raccoon Dog。她以极具辨识度的声线著称，能在清冷透明与温暖柔和之间自如切换，声音可塑性极强。除配音工作外，她同时以solo歌手身份活跃，已发行多张单曲与原创专辑，展现出扎实的歌唱实力与音乐表现力。业内评价其声音富有层次感，能精准捕捉角色情感的细腻变化，无论少年角色还是少女角色均驾驭自如。凭借多年积累的演技功底与不断拓展的音乐事业，她已成为令和时代最具代表性的女性声优之一，持续在业界发挥着重要影响力。
  name: 鬼頭明里
date: '2026-06-13'
history:
- event: UNIVAC I（通用自动计算机）正式交付美国人口普查局，成为世界首台投入商用的电子计算机，标志计算机从实验室走向产业应用。
  year: 1951年
- event: 《纽约时报》开始连载刊登五角大楼文件（Pentagon Papers），引发关于政府透明度与新闻自由的历史性法律对决。
  year: 1971年
- event: 先驱者10号（Pioneer 10）探测器越过海王星轨道，成为人类历史上首个离开太阳系八大行星范围的人造物体。
  year: 1983年
- event: 微软联合有线电视巨头TCI与时代华纳宣布合资计划，旨在打造融合计算与电视的Cable-Box PC，为交互式电视时代铺路。
  year: 1993年
- event: 名为Junkie的多态计算机病毒在全球范围内快速传播，感染MS-DOS系统可执行文件，引发当时最大规模的跨国反病毒协作响应。
  year: 1994年
- event: 微软正式发布Direct3D API，为Windows平台3D图形加速建立标准化接口，成为PC游戏产业爆发的关键基础设施。
  year: 1996年
llm:
- desc: Google DeepMind于2026年5-6月发布Gemma 4 12B，以120亿参数实现原生多模态理解（文本+图像+音频+视频）。支持256K超长上下文窗口，基于Gemini
    3同源架构蒸馏。最大亮点：可在16GB显存的消费级笔记本上完全本地运行。在MMLU-Pro、MathVista、AudioBench等基准上超越同尺寸所有开源模型，部分指标接近Llama
    4 70B水平。采用Apache 2.0开源协议，开发者可自由商用。
  tags:
  - Gemma 4
  - Google DeepMind
  - Open-Source LLM
  - Multimodal
  - 256K Context
  - On-Device
  title: 'Google Gemma 4 12B: 开源多模态小模型新标杆'
new_project:
- desc: HuggingFace官方开源的轻量级AI Agent框架。核心理念是让Agent以代码为思维媒介——Agent通过生成并执行Python代码片段来完成工具调用、推理与决策，而非依赖传统JSON函数调用格式。支持多种LLM后端（OpenAI、Anthropic、本地模型），内置代码沙箱安全执行环境。提供CodeAgent与ToolCallingAgent两种范式，可连接HuggingFace
    Hub上数千个模型与工具。GitHub Star快速增长，已成为Agent开发领域热门基础设施。
  tags:
  - AI Agent
  - HuggingFace
  - Code-as-Action
  - Open Source
  - Tool Calling
  title: 'smolagents: HuggingFace轻量级代码思维Agent框架'
  url: https://github.com/huggingface/smolagents
paper:
- desc: CVPR 2026亮点论文。提出VerseCrafter——首个支持4D几何控制的动态逼真视频世界模型。基于DiT架构并结合显式相机-几何联合建模，可从单张图像或文本生成具有精确3D几何一致性的动态视频。创新点包括：4D几何条件注入、运动-外观解耦训练策略、以及自适应时域注意力机制。在视频生成质量、几何准确性、运动连贯性三个维度全面超越SOTA基线，为视频世界模型奠定新范式。
  tags:
  - CVPR 2026
  - Video World Model
  - 4D Geometry
  - DiT
  - Dynamic Generation
  title: 'VerseCrafter: Dynamic Realistic Video World Model with 4D Geometric Control'
  url: https://arxiv.org/abs/2601.05138
tech:
