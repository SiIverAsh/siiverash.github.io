algorithm:
- desc: 主成分分析是一种无监督线性降维算法，通过正交变换将数据投影到方差最大的方向上。计算协方差矩阵的特征值与特征向量，保留前 k 个主成分以保留大部分方差。时间复杂度
    O(n^3)，适用于数据压缩与可视化。
  tags:
  - 降维
  - 无监督学习
  - 特征提取
  - 统计
  title: 主成分分析 (Principal Component Analysis)
cv_recommend:
  agency: I'm Enterprise
  hometown: 日本兵库县
  intro: 上田丽奈以其清澈透明的音色和广泛的声音表现力而闻名，能够驾驭从少女到成熟女性的多种角色。她通过扎实的演技和情感投入，在声优界建立了独特的地位。自出道以来，她持续参与各类配音工作，获得了观众和业内的好评。
  name: 上田丽奈
date: '2026-04-05'
history:
