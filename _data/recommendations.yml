algorithm:
- desc: 无需指定聚类数，可识别任意形状簇与噪声点，通过ε邻域和核心点定义聚类，时间复杂度O(n log n)（使用空间索引）。
  tags:
  - Clustering
  - Density-Based
  - Unsupervised
  - Noise Robust
  title: 'DBSCAN: 基于密度的空间聚类算法'
