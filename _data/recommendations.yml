algorithm:
- desc: K-NN 是一种基于实例的学习算法，通过计算样本间距离（如欧氏距离）进行分类或回归，适用于非线性数据，但计算复杂度随数据量线性增长。
  tags:
  - 机器学习
  - 分类算法
  - 距离度量
  - 传统算法
  title: K-最近邻算法（K-Nearest Neighbors）
