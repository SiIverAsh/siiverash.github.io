algorithm:
- desc: 经典监督学习算法，通过寻找最大间隔超平面实现分类或回归。核技巧可处理非线性问题，泛化能力强。广泛应用于文本分类、图像识别等领域，是机器学习基础算法之一。
  tags:
  - 监督学习
  - 分类算法
  - 核方法
  - 最大间隔
  title: 支持向量机 (Support Vector Machine)
cv_recommend:
  agency: I'm Enterprise
  hometown: 日本东京都
  intro: 内田真礼是日本新生代声优中的代表人物，隶属于I'm Enterprise事务所。她出生于东京都，以其清澈透亮、极具辨识度的嗓音在业界崭露头角。内田真礼的声线灵活多变，能够驾驭从天真烂漫的少女到冷静沉着的成熟女性等多种角色类型，演技自然细腻，情感表达丰富。她凭借扎实的配音功底和出色的角色塑造能力，获得了大量粉丝的喜爱和业内的广泛认可，被视为声优界的中坚力量。
  name: 内田真礼
date: '2026-04-22'
history:
- event: 弗拉基米尔·列宁诞生，俄国革命家。
  year: '1870'
- event: 第一次世界大战中，德军在伊普尔战役首次使用氯气攻击。
  year: '1915'
- event: 第一个地球日举行，旨在提高环境保护意识。
  year: '1970'
- event: Mosaic 1.0网页浏览器发布，推动了万维网的普及。
  year: '1993'
- event: 中国成功发射第一颗北斗导航卫星，开启自主导航系统建设。
  year: '2000'
- event: 墨西哥湾深水地平线钻井平台爆炸，导致严重漏油事故。
  year: '2010'
llm:
- desc: 拥有5000亿参数，采用分组查询注意力机制，在中文理解和生成任务上超越GPT-4。支持128K上下文长度，推理成本降低50%。模型完全开源，涵盖多模态能力，并集成工具调用接口。
