  year: '1976'
- event: 温斯顿·丘吉尔辞去英国首相职务，由安东尼·艾登接任。
  year: '1955'
- event: 美国阿波罗6号任务发射，这是阿波罗计划的最后一次无人测试飞行。
  year: '1969'
- event: 朝鲜发射火箭，引发国际社会广泛关注与谴责。
  year: '2009'
- event: 苏联宣布废除《苏日中立条约》，为对日宣战做准备。
  year: '1945'
- event: 塞尔维亚军队包围波斯尼亚首都萨拉热窝，波黑战争开始。
  year: '1992'
llm:
- desc: Anthropic 发布的 Claude 3.5 Sonnet 模型，参数规模 70B，在推理与创意写作任务中超越 GPT-4o。采用宪法 AI 训练方法，支持
    200K 上下文窗口。在 MMLU 基准上得分 92.5%，代码生成 HumanEval 通过率 88%。推理速度比前代提升 2 倍。
  tags:
  - 大语言模型
  - Anthropic
  - 宪法AI
  - 推理
  title: Claude 3.5 Sonnet
new_project:
- desc: vLLM 是一个高吞吐量、内存高效的 LLM 推理引擎，采用 PagedAttention 算法实现 KV 缓存的高效管理。支持连续批处理与动态分片，在
    A100 GPU 上实现 10 倍吞吐量提升。项目开源，兼容 Hugging Face 模型。
  tags:
  - LLM推理
  - 开源
  - 高性能
  - Python
  title: vLLM
  url: https://github.com/vllm-project/vllm
paper:
- desc: ICLR 2026 论文，提出统一框架 AudioX，支持文本、图像、视频到音频的生成任务。采用分层扩散模型与跨模态对齐损失，在 AudioCaps
    测试集上取得 4.5 的 MOS 分。模型参数 1.2B，训练数据集包含 100 万小时多模态数据。
  tags:
  - 音频生成
  - 多模态
  - ICLR 2026
  - 扩散模型
  title: 'AudioX: A Unified Framework for Anything-to-Audio Generation'
  url: https://iclr.cc/virtual/2026/poster/10007216
tech:
  Arch:
  - desc: Blackwell Next 是 NVIDIA 下一代 GPU 架构，采用台积电 3nm 工艺，集成 192 个流式多处理器（SM），每个 SM
      包含 128 个 FP32 核心。支持第 5 代 Tensor Core，稀疏计算性能提升 4 倍。内存系统搭载 128MB L2 缓存与 32GB HBM4，带宽达
      8TB/s。专为万亿参数 AI 模型训练优化。
    tags:
    - GPU架构
    - 3nm工艺
    - AI计算
    - NVIDIA
    title: NVIDIA Blackwell Next 架构
  Audio:
  - desc: Gemini 3.1 Flash Live 是谷歌推出的实时语音生成模型，专为低延迟交互设计。采用流式编码器-解码器架构，端到端延迟低于 200
      毫秒，支持 50 种语言。模型使用扩散变压器进行声学建模，在 LibriSpeech 测试集上词错误率降至 2.1%。参数规模 8B，可部署在边缘设备。
    tags:
    - 语音合成
    - 实时生成
    - 低延迟
    - Google
    title: Gemini 3.1 Flash Live
  CPU:
  - desc: AMD EPYC Venice 采用 Zen 6 架构，基于台积电 2nm 工艺，最高 256 核心，512 线程。每个 CCD 包含 16 核心，共享
      64MB L3 缓存。支持 DDR6 内存与 CXL 4.0，内存带宽达 1TB/s。基准频率 3.5GHz，加速频率 5.0GHz，典型 TDP 400W。在
      SPECint 2017 测试中得分 1800。
    tags:
    - 服务器CPU
    - Zen6
    - 2nm工艺
    - 256核心
    title: AMD EPYC Venice Zen 6 CPU
  Computer Vision:
  - desc: SAM 3 在 SAM 2 基础上引入概念提示机制，支持通过文本描述进行零样本分割。采用混合编码器架构，整合视觉 Transformer 与概念嵌入层，在
      COCO 数据集上实现 58.7% mIoU（零样本），比前代提升 12%。模型参数 650M，支持实时推理。
    tags:
    - 计算机视觉
    - 图像分割
    - 零样本学习
    - ICLR 2026
    title: 'SAM 3: Segment Anything with Concepts'
  GPU:
  - desc: NVIDIA GeForce RTX 5090 基于 Blackwell Next 架构，配备 32GB GDDR7 显存，位宽 512-bit，带宽
      1.5TB/s。核心频率 2.8GHz，拥有 192 个 SM，共 24576 个 CUDA 核心。支持 PCIe 6.0，TDP 500W。在 4K
      光追游戏中性能比 RTX 4090 提升 70%。
    tags:
    - 显卡
    - 游戏
    - AI加速
    - GDDR7
    title: NVIDIA GeForce RTX 5090
  Lang:
  - desc: Python 3.14 引入即时编译器（JIT）加速模式，通过 LLVM 后端将热点代码编译为原生机器码，性能提升最高达 5 倍。新增模式匹配语法、改进的错误信息与类型系统。内存管理采用区域化分配器，减少碎片化。标准库增加异步
      I/O 模块的协程调度优化。
    tags:
    - 编程语言
    - 性能优化
    - JIT
    - Python
    title: Python 3.14
  NLP:
  - desc: Qwen3.6-Plus 是阿里通义千问系列的最新升级，采用 MoE 架构，激活参数 240B，总参数 1.2T。在编程基准 HumanEval
      上达到 92.5% 的通过率，支持 128K 上下文长度。使用分组查询注意力与旋转位置编码，推理速度比 Qwen3.5 提升 40%。
    tags:
    - 大语言模型
    - 开源
    - 编程能力
    - MoE
    title: Qwen3.6-Plus
  Net:
  - desc: ITU-T Y.2502 标准定义了算力网络的架构与协议，实现计算资源的动态调度与池化。标准基于 IPv6 扩展头承载算力需求描述，支持微秒级资源分配。核心机制包括算力感知路由协议（CARP）与分布式资源编排器（DRO），可提升数据中心资源利用率
      30% 以上。
    tags:
    - 网络协议
    - 算力网络
    - 国际标准
    - 资源调度
    title: ITU-T Y.2502 算力网络国际标准
  News:
  - desc: 智元AI宣布将于 2026 年 4 月 7 日启动“AI发布周”，每日发布具身智能领域自研成果。预计将推出新一代机器人操作系统、多模态感知芯片与实时决策算法。活动聚焦物理
      AI 与通用机器人技术，旨在推动产业落地。
    tags:
    - AI新闻
    - 具身智能
    - 机器人
    - 发布会
    title: 智元AI发布周即将启幕
