  Lang:
  - desc: Rust 1.96.0于2026年5月28日正式发布。本版本最重大的变化是Trait Upcasting的完全稳定化，允许将`dyn Trait`对象安全地向上转型为`dyn
      Supertrait`，消除了长期存在的类型系统限制。同时，`const_generics`特性迎来重大改进：支持在const泛型位置使用泛型参数进行布尔运算与基本算术，使得编译期矩阵运算等高级抽象成为可能。异步闭包(async
      closures)进入稳定轨道，支持`async || {}`语法直接创建异步闭包而无需嵌套async块。
    tags:
    - Rust
    - Trait Upcasting
    - Const Generics
    - Async Closures
    title: 'Rust 1.96.0: Trait Upcasting稳定化与Const泛型里程碑'
  NLP:
  - desc: EACL 2026最佳论文。该工作将概率论中的鞅理论(Martingale Theory)引入大语言模型推理时解码，提出Martingale Foresight
      Sampling(MFS)方法。MFS通过前瞻性评估多条候选生成路径的期望回报，构建上鞅停时策略动态决定何时停止前瞻并提交当前最优token。在AlpacaEval
      2.0上以相同计算预算超越Best-of-N采样12.7%胜率，且在数学推理(GSM8K)与代码生成(HumanEval)任务中均以更少的推理计算量获得显著提升。
    tags:
    - LLM Decoding
    - Martingale Theory
    - Inference-Time Optimization
    - EACL 2026 Best Paper
    title: 'Martingale Foresight Sampling: A Principled Approach to Inference-Time
      LLM Decoding'
