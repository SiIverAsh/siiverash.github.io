    title: 3GPP Release 21正式获批：6G标准化全面启动
  News:
  - desc: 2026年6月，国家超算深圳中心「灵晟」以持续性能超2 ExaFLOPS问鼎全球TOP500榜首，时隔8年重回世界第一。全系统采用纯国产CPU架构（零GPU加速卡），共计245万个处理器核心，彰显中国在E级超算领域的全自主可控实力。
    tags:
    - TOP500
