llm:
- desc: Moonshot AI于2026年6月发布Kimi K2.7 Code，这是一个1万亿参数的混合专家(MoE)架构开源编码模型。K2.7 Code专为Agentic
    Coding场景设计，支持128K上下文窗口，在SWE-bench Verified上以48.2%的解决率刷新开源模型纪录，超越GPT-5。模型采用16路MoE路由(每次推理仅激活约65B参数)，支持多文件编辑、终端交互、Git操作等复杂Agent行为。基于Apache
    2.0协议在HuggingFace开源权重，配套发布Kimi Coder Agent框架与vLLM推理适配方案。
  tags:
  - MoE
  - 1T Parameters
  - Agentic Coding
  - Open-Source
  - SWE-bench
  title: 'Kimi K2.7 Code: Moonshot AI开源1T参数Agentic Coding模型'
new_project:
- desc: 由Y Combinator合伙人Garry Tan开源的AI Agent框架。gbrain基于OpenClaw与Hermes架构，提供知识图谱层(KG
    Layer)实现自动链接、类型化关系与图查询，支持多Agent协作、工具调用(MCP协议)、长短期记忆管理与任务编排。项目采用TypeScript构建，内置对Claude、GPT等多模型后端的统一适配层。截至2026年6月已获1.2万+
    GitHub Stars，作为开发者构建自主AI Agent的轻量级基础设施而广受关注。
  tags:
  - AI Agent
  - Knowledge Graph
  - OpenClaw
  - MCP Protocol
  - TypeScript
  title: 'garrytan/gbrain: OpenClaw/Hermes AI Agent Brain'
  url: https://github.com/garrytan/gbrain
paper:
- desc: CVPR 2026录用论文。WorldReel提出了首个具有一致几何与运动建模的4D视频生成框架。该工作将视频扩散模型从3D(空间+时间)拓展至4D(3D空间+时间)，通过联合学习隐式神经辐射场(NeRF)与场景流(Scene
    Flow)，实现跨视角一致的动态场景生成。核心创新在于将相机位姿与场景几何作为显式条件引入扩散过程，解决了现有视频生成模型在多视角渲染时的几何不一致问题。在RealEstate10K与MVImgNet上，FVD指标较基线方法降低34%，且支持单目视频的4D重建与自由视角渲染。
  tags:
  - 4D Generation
  - Video Diffusion
  - NeRF
  - Scene Flow
  - CVPR 2026
  title: 'WorldReel: 4D Video Generation with Consistent Geometry and Motion Modeling'
  url: https://arxiv.org/abs/2512.07821
