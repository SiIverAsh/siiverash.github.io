  hometown: 东京都
  intro: 花泽香菜是日本知名声优，以其清澈柔和的声线著称。她于 2006 年出道，凭借多部作品中的出色演绎获得广泛认可。其声音具有高度的辨识度与表现力，能够细腻诠释从少女到成熟女性的各类角色。在配音之外，她也活跃于音乐领域，发行过多张个人专辑，展现了多元化的艺术才能。作为声优界的代表人物之一，她持续为行业注入活力，深受粉丝喜爱。
  name: 花泽香菜
date: '2026-04-07'
