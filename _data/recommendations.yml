algorithm:
- desc: 集成学习经典算法。通过Bootstrap采样构建多棵决策树，每棵树在随机特征子集上分裂，最终以投票（分类）或平均（回归）聚合预测。具有天然的过拟合抵抗能力、特征重要性评估功能，以及对缺失值与非平衡数据的高鲁棒性，仍是表格数据竞赛的基线首选。
  tags:
  - 集成学习
  - Bootstrap
  - 特征重要性
  - 表格数据
  title: 随机森林 (Random Forest)
cv_recommend:
  agency: アイムエンタープライズ (I'm Enterprise)
  hometown: 東京都
  intro: 1991年5月29日出生于东京都。所属声优事务所I'm Enterprise，是平成后期至令和时代最具代表性的女性声优之一。以其清澈透明、辨识度极高的嗓音著称，音域宽广，可驾驭从少女到成熟女性的多类型声线，尤以柔和细腻的吐字与精准的情感表达见长。自幼学习钢琴，具备扎实的音乐素养，歌唱能力在同业中亦属一流，多次以个人名义发行单曲与专辑，并在大型音乐场馆举办个人演唱会。在演技层面，她善于通过微妙的语气变化与呼吸节奏塑造角色的内在情绪，无论是内敛含蓄还是爆发力极强的场景均能精准拿捏，被业界誉为「透明感の天才」。此外，其在广播节目与公开活动中展现的沉稳谈吐与谦逊人柄，也为她积累了跨世代的广泛人气。
  name: 早見沙織
date: '2026-06-14'
history:
