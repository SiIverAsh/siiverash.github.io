  NLP:
  - desc: Anthropic于2026年5月推出Introspection Adapters，通过在LLM中间层插入轻量级探测适配器，引导模型在生成过程中主动报告内部状态、置信度及潜在偏见，无需外部监督即可降低幻觉与有害输出，在医疗对话和代码生成任务中已验证有效性。
