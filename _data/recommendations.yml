algorithm:
- desc: 一种经典的监督学习模型，通过寻找最大间隔超平面来进行分类与回归，利用核技巧处理非线性数据，广泛应用于文本分类、图像识别等领域。
  tags:
  - 机器学习
  - 分类
  - 核方法
  - 监督学习
  title: 支持向量机 (Support Vector Machine)
cv_recommend:
