  Audio:
  - desc: OpenBMB发布VoxCPM2，绕过传统文本分词器，直接以音素+声学特征联合建模，支持中英日等多语种流式语音合成、音色设计与跨语言声音克隆，参数量约0.3B，采用流匹配解码实现低延迟实时推理，模型已完全开源。
    tags:
    - TTS
    - Multilingual
    - Tokenizer-Free
    - Open Source
    - Voice Cloning
    title: VoxCPM2：OpenBMB开源免分词器多语言流式TTS
  CPU:
  - desc: NVIDIA于2026年5月发布Vera CPU，集成88个Arm Neoverse V3核心，通过NVLink-C2C提供1.8 TB/s内存带宽，专为Agentic
      AI工作负载设计，在推荐推理和大规模数据处理任务中能效比超越当前x86旗舰。
    tags:
    - NVIDIA Vera
