  - desc: 中国科学院于2026年3月发布'香山'高性能RISC-V开源处理器，采用6发射乱序执行架构，支持RV64GC及向量扩展，搭配'如意'开源板卡，形成从处理器设计到硬件验证的完整国产自主芯片生态。
