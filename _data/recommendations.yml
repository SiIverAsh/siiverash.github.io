  NLP:
  - desc: Llama 3采用混合专家架构，预训练数据规模达15万亿token，最大模型参数量超过4000亿。支持128K上下文长度，在MMLU、GSM8K等基准上性能持平GPT-4，同时开源7B、13B、70B三个版本，推理效率相比前代提升40%。
    tags:
