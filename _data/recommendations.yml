algorithm:
- desc: 最经典的实例基础监督学习算法之一。核心思想：对于待分类样本，在特征空间中找出与其距离最近的K个训练样本，通过多数投票（分类）或加权平均（回归）决定预测结果。无需显式训练过程，复杂度集中在推理阶段（懒惰学习）。常用距离度量包括欧氏距离、曼哈顿距离、余弦相似度。K值选择与距离度量对模型性能影响显著，适用于低维数据分类与回归任务。
  tags:
  - 监督学习
  - 实例基础
  - 懒惰学习
  - 分类与回归
  title: K近邻算法 (K-Nearest Neighbors, KNN)
