  intro: 松冈祯丞是日本知名男性声优，以其独特的嗓音和广泛的声音表现力在业内享有高度评价。他于2010年代出道，凭借出色的配音技巧迅速崛起，能够驾驭从青少年到成年男性的多种角色类型。他的声音特点包括清澈的高音和富有感染力的情感表达，在配音作品中常常展现出细腻的情感刻画能力。在职业生涯中，他持续精进演技，积极参与声优培训活动，并致力于推动声优行业的发展。根据《声优名鉴》数据，他在声优界拥有稳定的地位和广泛的粉丝基础，是当代声优中备受瞩目的代表之一。
  name: 松冈祯丞
