algorithm:
- desc: PCA是最经典的线性降维算法，通过正交变换将高维数据投影到方差最大化的低维主成分子空间。核心步骤为：数据中心化→计算协方差矩阵→特征值分解→选取前k个最大特征值对应的特征向量。广泛应用于数据可视化、噪声过滤、特征提取与LLM潜空间分析（如稀疏自编码器的初始化），是现代机器学习不可或缺的基础算法。
  tags:
  - 降维
  - 特征提取
  - 线性代数
  - 无监督学习
  - PCA
  - 经典算法
  title: 主成分分析 (Principal Component Analysis, PCA)
cv_recommend:
  agency: 俳協 (Haikyo)
  hometown: 大分県
  intro: 2000年代后期以成人向作品为中心积累经验，2012年后逐渐转向一般向作品并迅速崭露头角。声线跨度极广，既能演绎沉稳知性的成熟女性，也能自然切换至天真烂漫的少女与少年角色，被誉为「七色之声」的实力派。2019年获第13回声优奖助演女优赏，2023年再获第17回声优奖主演女优赏，展现出扎实的演技功底与持续进化的表现力。舞台朗读剧与旁白领域同样活跃，是当今业界最具信頼感的中坚声优之一。
  name: 種崎敦美
date: '2026-05-25'
history:
- event: 肯尼迪总统在国会联席会议上宣布「十年内将人类送上月球并安全返回」的阿波罗计划目标，开启人类航天史上最宏大的科技工程。
  year: '1961'
- event: '《星球大战：新希望》(Star Wars: Episode IV - A New Hope) 在北美32家影院首映，以工业光魔(ILM)开创的计算机控制摄影技术彻底改变了电影特效产业。'
  year: '1977'
- event: 第一届国际万维网大会(WWW94)在CERN召开，Tim Berners-Lee主持，380名与会者共同定义Web开放标准，奠定了互联网商业化的基础。
  year: '1994'
- event: ICANN与VeriSign签署.com顶级域注册管理机构协议，确立互联网域名系统的商业化治理框架，为全球DNS稳定性提供制度保障。
  year: '2001'
- event: 欧盟《通用数据保护条例》(GDPR)正式生效，确立「被遗忘权」「数据可携权」等数字隐私基石权利，全球科技企业被迫重构数据治理架构，首日即有多起诉讼发起。
  year: '2018'
- event: OpenAI发布ChatGPT iOS应用，上线6天内安装量突破50万次，标志大语言模型正式从Web端进入移动原生时代，开启AI应用生态新纪元。
  year: '2023'
llm:
- desc: NVIDIA发布Nemotron-Labs-Diffusion 3B，业界首个统一自回归、扩散与自推测解码的三模态语言模型。在单次前向传播中生成高达6倍于同规模自回归模型(Qwen3-8B)的令牌数，推理吞吐量提升4.8倍。通过迭代扩散去噪并行生成文本块，结合自推测验证保证输出质量，开源Apache
    2.0协议。
  tags:
  - NVIDIA
  - 扩散语言模型
  - Nemotron
  - 高效推理
  - 开源
  - 三模态
  title: NVIDIA Nemotron-Labs-Diffusion：三模态语言模型，单次前向生成6倍令牌
new_project:
- desc: strukto-ai开源的Mirage为AI智能体提供统一的虚拟文件系统抽象层，支持本地、S3、GCS、HuggingFace等多种存储后端的透明访问。核心特性包括：基于内容寻址的去重存储、版本化文件快照、流式读写、跨Agent共享缓存及POSIX兼容接口。使用Rust构建核心引擎，Python
    SDK提供高层API，适合构建多Agent协作系统。
  tags:
  - AI Agent
  - 虚拟文件系统
  - Rust
  - 开源
  - 多Agent
  - Mirage
  title: 'Mirage: AI Agent的统一虚拟文件系统'
  url: https://github.com/strukto-ai/mirage
paper:
- desc: 发现预训练扩散模型的特征空间中隐式编码了高质量的实例边缘检测能力。无需任何额外训练，仅通过聚合扩散U-Net的多层注意力特征即可实现SOTA级别的零样本实例边缘检测，在BSDS500与NYUDv2上超越专门训练的边缘检测器。ICLR
    2026 Oral论文，为扩散模型的可解释性与特征复用开辟新范式。
  tags:
  - ICLR 2026
  - Oral
  - 扩散模型
  - 边缘检测
  - 零样本
  - 可解释性
  title: 'TRACE: Your Diffusion Model is Secretly an Instance Edge Detector (ICLR
    2026 Oral)'
  url: https://openreview.net/forum?id=BjElYlJKMj
