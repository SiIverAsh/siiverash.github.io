    title: 'UCIe 2.0: 新一代芯片互连规范'
  Audio:
  - desc: MAI-Transcribe-1是微软推出的音频转录模型，词错误率低至3.2%，支持超过100种语言和方言。模型基于自监督学习框架，集成噪声抑制和说话人分离技术，已在Azure语音服务中提供预览版。
