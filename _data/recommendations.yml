    - RibbonFET
    - PowerVia
    title: 'Intel 18A制程进入风险量产: RibbonFET GAA晶体管与PowerVia背面供电'
  Audio:
  - desc: 基于Flow Matching与离散声学Token化技术，实现单次3秒参考音频即可完成任意文本的语音克隆与实时风格迁移。支持情感强度连续调节与跨语言音色保持，在LibriTTS和VCTK上MOS评分达4.51，推理延迟仅78ms。
    tags:
    - 语音克隆
    - Flow Matching
    - 零样本
    - 声学建模
    title: 'VoiceCraft 2: 零样本语音编辑与风格迁移统一框架'
  CPU:
  - desc: Panther Lake-HX旗舰Core Ultra 9 385H采用Intel 18A制程，配备8个Cougar Cove P核与16个Skymont
      E核，共24核24线程。P核单核Boost频率高达5.7GHz，搭载第四代NPU提供48 TOPS AI算力。Geekbench 6单核得分3821，多核得分23105，较Meteor
      Lake-H同级别提升超40%。
    tags:
    - Intel
