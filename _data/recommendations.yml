  - 开放权重
  - 128K上下文
  - 多模态
  title: Gemma 3 27B：Google开放多模态大语言模型家族
new_project:
- desc: 微软开源基于图的检索增强生成（GraphRAG）框架。从非结构化文本自动构建实体知识图谱与社区层次结构，支持全局语义搜索与局部实体关联查询双模式，在复杂多跳问答与文档摘要任务上显著超越传统向量RAG方案，已获65k+
    GitHub Star。
  tags:
  - GraphRAG
  - 知识图谱
  - RAG
  - 微软
  - 开源
  title: microsoft/graphrag
  url: https://github.com/microsoft/graphrag
paper:
- desc: NeurIPS 2024最佳论文(Oral)。该工作提出VAR范式，将图像自回归建模从传统'下一个Token'重新定义为'下一个尺度'，在ImageNet
    256×256上FID达到1.73，推理速度较扩散模型提升20倍以上。该范式为自回归视觉生成开辟了全新方向，已被广泛引用于后续视觉生成研究。
  tags:
  - NeurIPS 2024
  - Best Paper
  - 视觉生成
  - 自回归模型
  - VAR
  title: 'Visual Autoregressive Modeling: Scalable Image Generation via Next-Scale
    Prediction'
  url: https://arxiv.org/abs/2404.02905
