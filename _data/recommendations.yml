algorithm:
- desc: K-Means是一种经典无监督聚类算法，通过迭代将数据点分配到K个簇中，以最小化簇内方差。适用于客户分群、图像压缩和异常检测，时间复杂度O(n*k*t)。
  tags:
  - 机器学习
  - 聚类
  - 无监督学习
  - 算法
  title: K-Means聚类算法
cv_recommend:
  agency: 青二プロダクション（Aoni Production）
  hometown: 千叶县
  intro: 悠木碧是日本知名声优，以宽广的音域和出色的演技著称。她擅长演绎从少女到成年女性的多种角色，声音具有独特的透明感和表现力。在职业生涯中，她获得了多项声优奖项，包括声优奖主演女优奖。她的配音工作涵盖了动画、游戏和外语片配音，以其专业的素养和多样化的表现受到业界高度评价。
  name: 悠木碧
date: '2026-04-14'
history:
