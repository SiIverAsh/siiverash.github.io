algorithm:
- desc: KNN是最经典的实例基学习算法之一，核心思想为「近朱者赤」——对未知样本，在特征空间中寻找与其距离最近的K个训练样本，通过多数投票（分类）或均值（回归）进行预测。其数学基础为Cover与Hart于1967年证明的渐近误差率上界：当样本量趋于无穷时，KNN误差率不超过贝叶斯最优分类器的两倍。KNN无需显式训练过程（惰性学习），但对高维数据面临维度灾难，常用距离度量包括欧氏距离、曼哈顿距离与余弦相似度。作为非参数方法，KNN在推荐系统、异常检测与模式识别领域仍有广泛应用。
  tags:
  - Instance-Based Learning
  - Non-Parametric
  - Lazy Learning
  - Distance Metric
  - Pattern Recognition
  title: K-近邻算法 (K-Nearest Neighbors)
cv_recommend:
  agency: 株式会社ラクーンドッグ (Raccoon Dog)
  hometown: 愛知県名古屋市
  intro: 1994年10月16日出生于爱知县名古屋市。2014年以Pro-Fit事务所所属身份声优出道，2022年随事务所重组移籍至ラクーンドッグ。声线具备罕见的可塑性，从清澈少女音到低沉冷静声线均能驾驭自如，尤以情感层次丰富的演技见长。2019年获得第13回声优奖新人女优奖。同时作为歌手活跃，2019年以单曲「Swinging
    Heart」歌手出道，拥有稳定的音乐活动。公认的演技派声优，在业界以敬业态度与持续进步的技艺获得高度评价。
  name: 鬼頭明里
date: '2026-06-05'
history:
- event: Ada Lovelace在伦敦首次会见Charles Babbage，后者向她展示了差分机原型。此次会面开启了两人在分析机上的合作，Lovelace后来撰写了被认为是世界上第一个计算机程序的算法笔记。
  year: '1833'
- event: 美国国务卿乔治·马歇尔在哈佛大学毕业典礼上发表演说，提出马歇尔计划（欧洲复兴计划），为二战后欧洲经济重建奠定基础，该计划后来获得1953年诺贝尔和平奖。
  year: '1947'
- event: Apple II个人电脑正式上市销售，搭载MOS 6502处理器、4KB RAM（可扩展至48KB），首次引入彩色图形显示与内置BASIC解释器，定价1298美元，被誉为个人计算革命的起点。
  year: '1977'
- event: 美国疾病控制与预防中心（CDC）在《发病率与死亡率周报》中首次报告5例罕见的肺孢子菌肺炎病例，这成为全球首次对艾滋病（AIDS）的正式医学记录。
  year: '1981'
- event: 苹果公司CEO史蒂夫·乔布斯在WWDC上宣布Mac电脑将从PowerPC架构全面转向Intel x86处理器，结束了与IBM长达十余年的芯片合作，首款Intel
    Mac于2006年1月发布。
  year: '2005'
- event: 21世纪最后一次金星凌日天象上演，全球大部分地区可见。金星从太阳圆面前经过，持续约6小时40分钟。下一次金星凌日将发生在2117年12月。
  year: '2012'
llm:
- desc: MiniMax于2026年5月发布M3系列模型，搭载1M token超长上下文窗口与原生多模态理解能力。基于MoE架构，在SWE-bench Verified编程基准上达到76.3%准确率，超越GPT-5.5与Gemini
    3.1 Pro。独特之处在于将视觉、语音与文本编码统一到单一Transformer骨干，实现真正的端到端多模态推理。API成本仅为同级模型的5-10%，同时开源了轻量版M3-8B供社区研究。
  tags:
  - MiniMax
  - MoE
  - 1M Context
  - Multimodal
  - SWE-bench
  title: 'MiniMax M3: 1M上下文原生多模态编程旗舰'
new_project:
- desc: CodeGraph为AI编程助手（Claude Code、Codex、Gemini、Cursor、OpenCode等）提供预构建的代码库知识图谱，将代码结构、依赖关系与符号引用索引为图数据库。与直接读取源码相比，可减少60-80%的token消耗与工具调用次数，完全本地运行无需外部服务。支持Python、TypeScript、Rust、Go等12种语言，通过语义级代码压缩实现百万行代码库的秒级查询。GitHub
    5月热门项目，目前已获超12K星。
  tags:
  - Code Knowledge Graph
  - AI Coding Assistant
  - Token Optimization
  - Local-First
  - Developer Tools
  title: 'CodeGraph: 预索引代码知识图谱'
  url: https://github.com/colbymchenry/codegraph
paper:
- desc: ICLR 2026 Oral杰出论文。该工作提出GLASS Flows框架，通过在推理阶段引入过渡采样策略，无需重新训练即可将奖励信号对齐到预训练Flow
    Matching与扩散模型中。核心创新在于推导出score函数与奖励梯度之间的闭式桥接，使单个模型在推理时动态适配多样化奖励函数（美学、安全性、文本对齐等），推理开销仅增加约15%。在Stable
    Diffusion 3与Flux等主流模型上验证了其通用性。
  tags:
  - Flow Matching
  - Reward Alignment
  - ICLR 2026 Outstanding Paper
  - Diffusion Models
  - Inference-Time Optimization
  title: 'GLASS Flows: Efficient Inference for Reward Alignment of Flow and Diffusion
    Models'
  url: https://openreview.net/forum?id=vH7OAPZ2dR
