paper:
- desc: 该论文发表于NeurIPS 2024，提出异步低精度注意力机制，相比FlashAttention-2提升50%训练速度，同时保持模型精度，为大模型训练提供高效解决方案。
  tags:
  - 注意力机制
  - 优化
  - 训练加速
  - 低精度计算
  title: 'FlashAttention-3: Fast and Accurate Attention with Asynchrony and Low-Precision'
