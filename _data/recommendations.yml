algorithm:
- desc: GBDT 是一种经典的集成学习算法，通过迭代训练决策树来拟合前一轮残差（负梯度方向）。核心思想是每棵新树专注于纠正前序模型的预测误差，最终将所有弱学习器加权组合。XGBoost、LightGBM、CatBoost
    均基于此框架，在表格数据竞赛与工业推荐系统中占据统治地位。正则化（学习率、子采样、树深限制）是防止过拟合的关键手段。
  tags:
  - Ensemble Learning
  - Boosting
  - Tree-based
  - XGBoost 基础
  title: 梯度提升决策树 (Gradient Boosting Decision Tree, GBDT)
