algorithm:
- desc: 基于贝叶斯定理与特征条件独立假设的概率分类算法，通过先验概率和似然估计后验概率，实现高效分类。尽管假设简单，但在文本分类、垃圾邮件过滤等任务中表现优异，具有计算复杂度低、可解释性强、适用于大规模数据的优点。
  tags:
  - 算法
  - 机器学习
  - 分类
  - 概率
  - 贝叶斯
  title: 朴素贝叶斯分类器 (Naive Bayes Classifier)
cv_recommend:
  agency: 青二プロダクション
  hometown: 日本千叶县
  intro: 悠木碧是日本知名女性声优，以其宽广的音域和丰富的角色塑造能力著称。她能够驾驭从幼女到成熟女性、从少年到反派的多元声线，演技细腻且富有爆发力，在业界享有极高评价。其扎实的声音控制与情感投入使每个角色都独具灵魂，被誉为“变色龙声优”。同时她在歌手领域也颇有建树，舞台魅力十足。作为一线声优，悠木碧持续活跃于广播、旁白等多个领域，是声优界标志性人物之一。
  name: 悠木碧
date: '2026-05-26'
