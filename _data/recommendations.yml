algorithm:
- desc: KNN是最经典的非参数监督学习算法之一。核心思想：在特征空间中，通过距离度量（欧氏距离、曼哈顿距离等）找到与待预测样本最接近的K个训练样本，以多数投票（分类）或均值（回归）决定输出。无需显式训练过程（惰性学习），决策边界高度灵活。然而，KNN对维度灾难敏感，高维空间中距离度量失效，且预测时需遍历全量训练数据，时间复杂度和存储开销均为O(n·d)。通常在低维、小样本场景下仍具竞争力。
  tags:
  - KNN
  - Non-parametric
  - Distance-based
  - Lazy Learning
  title: K近邻 (K-Nearest Neighbors, KNN)
