algorithm:
- desc: 经典二分类与多分类线性模型，通过Sigmoid/Softmax函数将线性组合映射为概率输出。基于最大似然估计优化，配合L1/L2正则化可有效防止过拟合。作为线性分类器的基石，其输出天然具备概率可解释性，是信用评分、医疗诊断、推荐系统中不可或缺的基线算法，同时也是深度学习交叉熵损失的数学前身。
  tags:
  - 逻辑回归
  - 分类算法
  - 最大似然估计
  - 可解释性
  - Sigmoid
  title: 逻辑回归 (Logistic Regression)
cv_recommend:
  agency: アイムエンタープライズ (I'm Enterprise)
  hometown: 东京都
  intro: 内田真礼于2010年代初期出道，以其清亮而富有穿透力的声线迅速获得业界瞩目。她的音域宽广，能自如切换于元气活泼与冷静沉稳之间，展现出极强的角色塑造弹性与情感表现力。作为I'm
    Enterprise所属声优，她在配音工作之外亦以歌手身份活跃，签约Pony Canyon后陆续发行多张个人专辑与单曲，音乐风格融合J-Pop与轻摇滚元素，舞台表现力备受认可。其专业态度与长期稳定高质量的演绎输出，使她在同代女性声优中稳居一线地位，商业价值与行业口碑均极为突出，持续拓展多元化演艺事业版图。
  name: 内田真礼
date: '2026-06-28'
