cv_recommend:
  agency: I'm Enterprise
  hometown: 日本兵库县
  intro: 内田真礼是日本知名声优，以其清澈多变的声线著称。她于2010年代出道，凭借扎实的配音技巧和独特的音色在业界迅速积累人气。她的声音可塑性极强，能够驾驭从活泼少女到冷静成熟女性的多种角色类型，深受听众喜爱。除了配音工作，她也积极参与音乐活动，发行多张个人单曲和专辑，展现出色的歌唱实力。内田真礼以专业的态度和持续的精进，在声优领域树立了良好的口碑，是新生代声优中的代表性人物之一。
  name: 内田真礼
date: '2026-04-09'
history:
- event: 美国内战结束，罗伯特·李将军在阿波马托克斯法院向尤利西斯·格兰特将军投降。
  year: '1865'
- event: NASA 正式宣布水星计划的首批七名宇航员，为美国载人航天奠定基础。
  year: '1959'
- event: 马丁·路德·金葬礼在亚特兰大埃比尼泽浸信会教堂举行，数万人参加悼念。
  year: '1968'
- event: 格鲁吉亚最高苏维埃宣布脱离苏联独立，成为首个在苏联解体前宣布独立的加盟共和国。
  year: '1991'
- event: 伊拉克战争期间，美军攻占巴格达，萨达姆·侯赛因政权倒台。
  year: '2003'
- event: 全球 COVID-19 疫情加剧，单日新增确诊病例突破 10 万例，多国实施封锁措施。
  year: '2020'
