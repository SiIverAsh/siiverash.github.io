algorithm:
- desc: 最经典的无监督学习算法之一，由Stuart Lloyd于1957年提出（1982年正式发表）。核心思想：将n个数据点划分到k个簇中，使得每个点属于距离最近均值（簇中心）对应的簇，迭代优化簇内平方和（Inertia）。关键变体：K-Means++（2007）通过智能初始化显著提升收敛质量与速度，Mini-Batch
    K-Means（2010）适用于大规模数据集的随机梯度下降变体。主要局限：需预先指定k值、对初始中心敏感、假设簇呈球形分布。与DBSCAN、GMM等算法形成互补。在客户分群、图像压缩、异常检测等场景中广泛应用。
  tags:
  - Unsupervised Learning
  - Clustering
  - Lloyd's Algorithm
  - K-Means++
  title: K-Means 聚类算法
