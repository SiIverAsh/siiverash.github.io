algorithm:
- desc: 密度ベースのクラスタリングアルゴリズム。1996年にMartin EsterらがKDD'96で提案。事前のクラスタ数指定が不要で、任意形状のクラスタを発見可能。ある点から半径ε（イプシロン）以内にMinPts個以上のデータ点が存在する場合にクラスタを形成し、ノイズを外れ値として明示的に識別する。計算量は空間インデックス使用時でO(n
    log n)。地理データ解析・異常検知・画像セグメンテーションで広く利用される。
  tags:
  - Clustering
  - Density-Based
  - Unsupervised Learning
  - DBSCAN
  - Anomaly Detection
  title: DBSCAN（Density-Based Spatial Clustering of Applications with Noise）
cv_recommend:
  agency: 大沢事務所
  hometown: 東京都
  intro: 花澤香菜は、透明感のある柔らかな声質と確かな演技力で、声優業界を代表する存在として確固たる地位を築いている。幼少期より芸能活動を始め、子役としての経験を経て声優へ転身。その声は「天使の声」と称され、聴く者の心に深く響く温かみを持つ一方、時に凛とした芯の強さを感じさせる繊細な表現を可能とする。癒し系の柔らかな声色から、複雑な感情を内包した難役まで、幅広い役柄を自然に演じ分ける技巧は業界内外から高く評価されている。また、アーティストとしても精力的に活動し、歌唱力を活かした音楽活動でも成功を収めている。長年にわたるキャリアの中で培われた表現の奥行きと、唯一無二の声の魅力により、同世代の声優の中でも際立った存在感を放ち続けている。
  name: 花澤香菜（はなざわ かな）
date: '2026-05-19'
history:
- event: アン・ブーリン（Anne Boleyn）、イングランド王ヘンリー8世の2番目の妃がロンドン塔で処刑される
  year: '1536'
- event: 米国議会、緊急移民割当法（Emergency Quota Act）を可決し、国別移民制限制度を確立
  year: '1921'
- event: Java言語の生みの親、ジェームズ・ゴスリン（James Gosling）がカナダ・カルガリーで誕生
  year: '1955'
- event: ソ連の探査機「ベネラ1号」が人類史上初めて金星をフライバイ通過
  year: '1961'
- event: 『スター・ウォーズ エピソード1／ファントム・メナス』が全米劇場公開され、SFX技術の新時代を切り拓く
  year: '1999'
- event: Appleがバージニア州とカリフォルニア州に初のApple Store 2店舗を同時オープン
  year: '2001'
llm:
- desc: Google DeepMindが2026年3月にApache 2.0ライセンスで公開した最新オープンLLMシリーズ。同パラメータ規模で既存の全オープンモデルを上回る性能を達成し、1B・4B・10B・27Bの4サイズを展開。アーキテクチャにMoE（Mixture
    of Experts）を採用し、27BモデルはLlama 4やQwen3.6を複数ベンチマークで凌駕。Google Cloud Vertex AIおよびオンデバイス（Android・Chrome）での推論にネイティブ対応。
  tags:
  - Gemma 4
  - Google DeepMind
  - Open Source
  - Apache 2.0
  - MoE
  title: Google Gemma 4：バイト単位で「最も高性能」なオープンモデル
new_project:
- desc: WebサイトをAIエージェントから操作可能にするオープンソースフレームワーク。Playwrightベースのブラウザ自動制御レイヤーを提供し、LLMと組み合わせて複雑なWebタスクを自律実行。視覚的要素認識と構造化DOM解析を融合したハイブリッドナビゲーションエンジンを搭載。2026年5月時点でGitHub
    Stars 45k超。LangChain統合済みで、MCP（Model Context Protocol）にも対応し、エージェント開発のデファクトスタンダードとして急成長中。
  tags:
  - AI Agent
  - Browser Automation
  - Web Scraping
  - MCP
  - Playwright
  title: browser-use/browser-use
  url: https://github.com/browser-use/browser-use
paper:
- desc: ICLR 2026 Outstanding Paper（口頭発表）。マルチターン会話においてLLMが最大39%の精度低下を引き起こす根本メカニズムを解明。長文コンテキストにおける「Lost
    in the Middle」現象が会話履歴全体に拡大することを実証し、ターン数増加に伴う注意機構の希釈と意図ミスマッチの蓄積が主因であることを特定。対策として文脈圧縮と明示的意図追跡の二段階アプローチを提案し、10ターン以上の会話でも精度低下を5%未満に抑制することに成功。
  tags:
  - ICLR 2026
  - Outstanding Paper
  - Multi-Turn
  - LLM
  - Attention
  title: LLMs Get Lost In Multi-Turn Conversation
  url: https://arxiv.org/abs/2505.06120
tech:
  Arch:
  - desc: 'ASPLOS 2026 Best Paper受賞。Compute Express Link（CXL）ブリッジの合成と形式的検証を自動化するフレームワーク。異種アーキテクチャ間のキャッシュコヒーレンシプロトコル変換を形式的に保証し、RISC-V、x86、ARM間のメモリ共有を安全に実現。生成されたブリッジは実チップ上で検証済み。CXL
      3.0/3.1時代のチップレット相互接続設計を根本から変革する成果。doi: 10.1145/3779212.3790245。'
    tags:
    - CXL
    - ASPLOS 2026
    - Best Paper
    - Heterogeneous Computing
    - Formal Verification
    title: vCXLGen：CXLブリッジ自動合成・検証フレームワーク（ASPLOS 2026 Best Paper）
  Audio:
  - desc: 'ICLR 2026 Oral論文。音声とテキストを統一潜在空間上で処理するTransformerアーキテクチャを提案。離散化された音声トークンとテキストトークンを同一の自己注意機構でモデリングし、音声認識・音声合成・音声翻訳を単一モデルで実現。連続表現を介したマルチモーダル融合により、従来のカスケード方式を凌駕する自然性と精度を両立。arxiv:
      2510.06195。'
    tags:
    - Speech-Text
    - ICLR 2026 Oral
    - Multi-Modal
    - Transformer
    - Unified Model
    title: Latent Speech-Text Transformer：ICLR 2026 Oral採択
  CPU:
  - desc: IntelがMWC 2026で正式発表したデータセンター向けフラッグシップCPU。Intel 18A（1.8nm級）プロセスノードを初採用し、288基のDarkmont
      E-coreを単一パッケージに集積。Foveros Direct 3D + EMIB 2.5Dのハイブリッドパッケージング技術により、576MB共有キャッシュ、12チャネルDDR5-8000メモリを実装。5GエッジAIや初期6Gインフラ向けに最適化され、電力効率で前世代比2倍以上を達成。
    tags:
    - Intel
    - Xeon 6+
    - 18A
    - Darkmont
    - 288 Cores
    - Foveros Direct
    title: Intel Clearwater Forest「Xeon 6+」：288コア・Intel 18Aプロセス
  Computer Vision:
  - desc: MetaがCVPR 2026で発表した1000ピクセル解像度のビジョン基盤モデル。エンコーダ・デコーダ統合アーキテクチャを採用し、深度推定・表面法線・セグメンテーション・キーポイント検出など多様なタスクを単一モデルで高精度に処理。1K解像度での人物理解において従来モデルを大幅に上回る性能を示し、オープンソース（Apache
      2.0）としてfacebookresearch/sapiens2で公開済み。
    tags:
    - Vision Foundation Model
    - CVPR 2026
    - Meta
    - 1K Resolution
    - Multi-Task
    title: Sapiens2：Meta 1K解像度ビジョン基盤モデル
  GPU:
  - desc: AMDが2026年5月に正式発表したCDNA5世代のFP64特化型GPU。432GB HBM4メモリを搭載し、FP64演算性能は約200 TFLOPSに達し、NVIDIA
      RubinをFP64ワークロードで最大6倍上回る。HPC・古典的スーパーコンピューティング用途に最適化され、歐米の主要スパコンに採用確定。MI400シリーズの一翼として、MI440X（AI特化）やMI455X（バランス型）と共にラインアップを構成。
    tags:
    - AMD
    - CDNA5
    - HBM4
    - FP64
    - HPC
    - MI430X
    title: AMD Instinct MI430X：CDNA5アーキテクチャのFP64特化型HPCアクセラレータ
  Lang:
  - desc: Modular社が2026年3月にMojo 1.0 Beta（v1.0.0b1）をリリース。Pythonの使いやすさとRust級のメモリ安全性を両立するownership
      & borrow checkerを正式導入。MLIRベースのコンパイラスタックによりPythonの最大68,000倍の実行速度を達成可能。MAXプラットフォームと統合され、GPUカーネル記述からモデルデプロイまで単一言語で完結するAI開発エコシステムを実現。
    tags:
    - Mojo
    - Ownership
    - Borrow Checker
    - MLIR
    - Systems Programming
    title: Mojo 1.0 Beta：所有権システムと借用チェッカーを搭載
  NLP:
  - desc: Sapient Intelligenceが2026年5月に発表した脳の情報処理メカニズムに着想を得たテキスト基盤モデル。従来のLLMと比較して最大1000分の1のトークン数で同等以上の言語理解性能を達成。階層的再帰記憶（Hierarchical
      Recurrent Memory）機構により効率的な文脈処理を実現し、スケール至上主義に対する代替パラダイムを提示。HuggingFace Transformers
      v5.8.0で統合済み。
    tags:
    - Brain-Inspired
    - Foundation Model
    - Efficient NLP
    - HRM
    - Sapient Intelligence
    title: HRM-Text：Sapient Intelligenceの脳模倣型基盤モデル
  Net:
  - desc: IEEE 802.11bn（Wi-Fi 8）が2026年に最終仕様策定段階へ。最大の特徴はUltra High Reliability（UHR）で、スループット向上より安定性を優先。高度なCoordinated
      Spatial Reuse、Multi-Link Operationの強化、適応変調最適化により、工場自動化・遠隔医療・VR/AR等のミッションクリティカル用途でのパケットロス率を従来比1/100以下に低減。802.11beの後継規格。
    tags:
    - Wi-Fi 8
    - 802.11bn
    - Ultra High Reliability
    - Wireless
    - IEEE
    title: Wi-Fi 8 (IEEE 802.11bn)：超高信頼性無線LAN規格
  News:
  - desc: 2026年5月中旬、中国当局は自律型AIエージェントの急速な普及に伴う新たなセキュリティリスクに対応するため、エージェント特化のガバナンスフレームワーク策定を加速。エージェントの意思決定透明性、人間による監視義務、悪用防止のためのアクセス制御などを柱とし、国家標準化委員会と共同で技術基準の整備を進めている。同時にSMICは約60億ドル規模のAI向け半導体増産投資を発表。
    tags:
    - AI Governance
    - China
    - Agent Safety
    - Regulation
    - SMIC
    title: 中国、AIエージェントのガバナンス加速：新たな安全リスクに対応
