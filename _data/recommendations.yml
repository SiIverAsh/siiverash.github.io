llm:
- desc: 面壁智能联合清华大学于2026年5月13日开源MiniCPM-V 4.6，以1.3B参数规模实现多项超越10B+模型的端侧多模态性能。核心技术：采用SigLIP-2视觉编码器与Qwen2.6-1.5B语言
    backbone，通过三阶段渐进式训练（分辨率递增预训练→多任务监督微调→RLHF对齐）实现高效视觉语言对齐。支持最大1344×1344分辨率输入与128K上下文窗口，在MMBench、MMMU等基准上以1.3B参数量超越Qwen2.5-VL-7B和Gemma-3-12B。仅需6GB内存即可在移动设备流畅推理，推理速度达18
    tokens/s（iPhone 17 Pro）。
  tags:
  - Edge AI
  - Multimodal
  - Open Source
  - 1.3B
  - On-Device
  title: 'MiniCPM-V 4.6: 面壁智能1.3B端侧多模态模型开源'
new_project:
- desc: GitHub于2026年5月正式开源spec-kit，一套面向AI辅助编程的规格驱动开发（Spec-Driven Development）工具链。核心组件包括：(1)
    Spec Parser——将自然语言需求规格自动转换为结构化任务分解；(2) AI Agent Orchestrator——协调多个AI编码代理按规格并行执行实现、测试与文档生成；(3)
    Spec Validator——通过形式化验证确保代码实现与原始规格的一致性。深度集成GitHub Copilot与Actions，支持Python/TypeScript/Go/Rust等多语言。发布两周即获97K+
    GitHub Stars，被业界视为从Vibe Coding向Agentic Engineering过渡的关键基础设施。
  tags:
  - Spec-Driven Development
  - AI Coding
  - GitHub
  - Agentic Engineering
  - Toolkit
  title: 'github/spec-kit: GitHub官方Spec-Driven开发工具套件'
  url: https://github.com/github/spec-kit
paper:
- desc: ICLR 2026 Oral论文。提出VC-STaR框架，通过对比学习范式实现视觉语言模型的自我改进推理。核心方法：(1) 构建Contrastive
    Visual Reasoning Chain数据集，迫使模型在正确与错误推理链之间进行对比甄别；(2) 设计Visual Contrastive Preference
    Optimization (VCPO)训练目标，在无需人工标注的情况下利用模型自身生成的正负样本进行偏好优化；(3) 在ScienceQA、MMMU等7个视觉推理基准上平均提升8.3%，且展现出与RLHF互补的
    scaling 特性。代码与数据已开源。
  tags:
  - ICLR 2026 Oral
  - Visual Reasoning
  - VLM
  - Self-Improvement
  - Contrastive Learning
  title: 'Through the Lens of Contrast: Self-Improving Visual Reasoning in VLMs (VC-STaR)'
  url: https://arxiv.org/abs/2603.02556
tech:
  Arch:
  - desc: SiFive于2026年5月12日发布第三代Performance系列RISC-V CPU IP。P570 Gen3采用13级流水线、4-wide超标量乱序执行微架构，支持2核至16核集群配置。较Gen2实现40%的SPECint2006性能提升，达到7.2
      SPECint2006/GHz。全面兼容RVA23 Profile，原生支持矢量加密扩展（Zvkb/Zvkg）与Pointer Masking安全特性。采用7nm工艺可实现3.5GHz主频，目标市场覆盖消费电子、汽车ADAS与数据中心边缘推理。
    tags:
    - RISC-V
    - SiFive P570
    - RVA23
    - CPU IP
    - High-Performance
    title: 'SiFive Performance P570 Gen3: 第三代高性能RISC-V CPU IP'
  Audio:
  - desc: 美团技术团队2026年4月开源，首次将Diffusion Transformer (DiT)架构引入波形潜空间的语音合成。核心创新包括：(1)
      在Mel-Spectrogram潜空间中进行扩散建模，相比原始波形扩散效率提升20倍；(2) 提出Conditional Audio DiT Block，通过交叉注意力机制融合音色参考编码与文本语义特征；(3)
      仅需3秒参考音频即可零样本克隆任意说话人音色，MOS评分4.52超越ElevenLabs等商业方案。支持中英双语，RTF低至0.08。
    tags:
    - TTS
    - Voice Cloning
    - Diffusion Transformer
    - Zero-Shot
    - Open Source
    title: 'LongCat-AudioDiT: 基于DiT的零样本高保真语音克隆TTS'
  CPU:
  - desc: Intel Nova Lake-S桌面CPU工程样品信息于2026年5月泄露。采用Intel 18A（1.8nm级）工艺与Foveros Advanced封装，混合架构包含Coyote
      Cove性能核（P-core）与Arctic Wolf能效核（E-core），最高52核配置（8P+44E）。全新LGA 1954插槽，配套900系列芯片组，支持DDR5-8000原生内存与48条PCIe
      5.0通道。首次在桌面平台集成NPU 5.0 AI引擎，INT8算力达48 TOPS。ES样品基础频率3.2GHz，加速频率4.8GHz，预计2026年Q4正式发布。
    tags:
    - Intel 18A
    - Nova Lake
    - 52 Cores
    - LGA 1954
    - NPU 5.0
    title: 'Intel Nova Lake: 52核Intel 18A旗舰桌面CPU曝光'
  Computer Vision:
  - desc: ICLR 2026 Oral论文，首次系统证明大语言模型在无视觉编码器、仅通过纯文本预训练的条件下，可隐式习得颜色、形状、空间关系等视觉概念先验知识。研究通过大规模对照实验与探针分类器，量化了不同规模LLM中视觉先验的涌现阈值（约7B参数），并揭示这些先验可在下游视觉推理任务中零样本迁移，挑战了「视觉能力必依赖视觉编码器」的传统认知。
    tags:
    - ICLR 2026
    - Visual Priors
    - LLM
    - Multimodal Cognition
    title: 'Learning to See Before Seeing: LLM纯文本预训练涌现视觉先验'
  GPU:
  - desc: NVIDIA于2026年5月正式发售GeForce RTX 5060。搭载Blackwell GB206-300核心，TSMC 4N定制工艺，集成30组SM（4608
      CUDA Core）、144个第5代Tensor Core与36个第4代RT Core。配备8GB三星GDDR7显存（128-bit位宽，28Gbps速率），总带宽448GB/s。支持DLSS
      4多帧生成（MFG）与神经网络渲染，TGP仅145W，采用单8-pin供电。起售价$299/¥2499，定位1080P高刷光追游戏与入门级AI推理。
    tags:
    - Blackwell
    - GDDR7
    - DLSS 4
    - RTX 5060
    - Neural Rendering
    title: 'NVIDIA GeForce RTX 5060: Blackwell入门级GDDR7显卡正式上市'
  Lang:
  - desc: Rust 1.95.0于2026年4月16日正式发布。核心稳定化特性包括：async closures（异步闭包）正式进入稳定通道，支持`async
      || {}`语法；`impl Trait`在异步函数返回位置全面稳定化；const泛型表达式能力扩展，支持`const { N + 1 }`等编译期运算。编译器后端升级至LLVM
      21，引入Polymorphic Inline Cache优化，整体编译速度提升15%。标准库新增`LazyLock`、`OnceLock`稳定化及`Duration::abs`等API。
    tags:
    - Rust 1.95
    - Async Closures
    - LLVM 21
    - Systems Programming
    title: Rust 1.95.0 发布：Async Closures稳定化与LLVM 21后端
  NLP:
  - desc: 2026年KV Cache压缩技术进入工程落地阶段。TurboQuant采用混合精度量化策略（Key保留4-bit/Value压缩至2-bit），在保持95%+精度前提下将KV缓存体积缩减至原始的1/8；KVTC（KV
      Token Compression）则通过基于注意力分数的动态令牌合并算法，实现自适应上下文窗口管理。二者联合部署可将Llama-4等长文本模型在128K上下文长度下的推理显存占用从48GB降至14GB，端侧部署成为可能。
    tags:
    - KV Cache Compression
    - LLM Inference
    - Quantization
    - Long Context
    title: KV Cache压缩2026：TurboQuant与KVTC推动长上下文推理实用化
  Net:
  - desc: 2026年5月12日，OpenAI联合OCP（开放计算项目）正式发布MRC v1.0规范。该协议基于SRv6实现多路径并行传输与亚毫秒级链路故障切换，专为10万卡以上AI训练集群设计。核心机制包括：(1)
      包级多路径负载均衡，避免ECMP哈希冲突；(2) 基于INT（In-band Network Telemetry）的实时拥塞感知；(3) 零丢包快速重传。在OpenAI
      Stargate集群实测中将All-Reduce通信效率从87%提升至96%。
    tags:
    - AI Supercomputer
    - SRv6
    - Multipath
    - OCP
    - Open Protocol
    title: 'MRC: OpenAI联合OCP发布AI超算多路径可靠连接协议'
  News:
  - desc: 2026年4月30日，中央网信办正式部署为期3个月的「清朗·整治AI应用乱象」专项行动。重点打击7类AI违法行为：(1) AI生成「数字泔水」——批量制造低质、虚假、拼凑信息污染网络生态；(2)
      深度伪造侵犯肖像权与名誉权；(3) AI炮制虚假新闻与谣言；(4) AI驱动的网络水军及流量造假；(5) AI换脸/拟声电信诈骗；(6) AI生成侵权文字、图片、音视频内容；(7)
      AI模型系统性偏见与歧视性内容输出。要求平台2026年6月底前完成自查整改并建立AI内容标识机制。
    tags:
    - AI Regulation
    - Deepfake
    - Content Governance
    - Digital Slop
    - China
    title: 中央网信办启动「清朗·整治AI应用乱象」专项行动
