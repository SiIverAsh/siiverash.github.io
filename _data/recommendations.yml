  - desc: 2026年6月7日，NVIDIA与SK海力士宣布达成多年期技术合作伙伴关系，共同开发面向下一代AI工厂的先进内存解决方案。合作覆盖Vera Rubin架构GPU所需的新一代HBM、用于RTX
