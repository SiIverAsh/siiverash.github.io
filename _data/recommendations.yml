algorithm:
- desc: SVM通过寻找最大化类别间隔的超平面实现二分类，核心思想是将低维线性不可分数据通过核函数映射到高维空间。常用核函数包括线性核、多项式核、RBF核与Sigmoid核。SVM在小样本、高维数据场景下表现优异，是传统机器学习中理论基础最坚实的算法之一。其凸优化目标保证了全局最优解的唯一性，至今仍在文本分类与生物信息学中广泛应用。
  tags:
  - SVM
  - 分类算法
  - 核方法
  - 凸优化
  title: 支持向量机 (Support Vector Machine)
cv_recommend:
  agency: Music Ray'n
  hometown: 东京都
  intro: 雨宮天以其清澈透明且极具辨识度的音质在声优界独树一帜。2014年正式声优出道后迅速跻身一线行列，声线可塑性极强，从元气活泼的少女到冷峻沉稳的角色均能精准驾驭。凭借扎实的歌唱功底，她同时以个人歌手身份活跃于乐坛，多次登上大型音乐舞台并展现出优秀的现场表现力。所属Music
    Ray'n期间，在广播节目、舞台演出与综艺活动中同样表现亮眼，是兼具偶像气质与实力派声优专业素养的平成年代代表性人物。其持续拓展的演艺边界与稳定高产的配音水准，使其在竞争激烈的声优行业中始终保持强劲的职业生命力。
  name: 雨宮天
date: '2026-07-01'
history:
- event: 加拿大自治领成立，安大略、魁北克、新斯科舍和新不伦瑞克四省组成联邦，7月1日由此成为加拿大国庆日（Canada Day）。
  year: '1867'
- event: 中国共产党第一次全国代表大会在上海开幕，标志着中国共产党的正式成立，7月1日后被定为党的诞生纪念日。
  year: '1921'
- event: 香港回归中国，英国对香港长达156年的殖民统治正式结束，香港特别行政区成立，「一国两制」方针开始实施。
  year: '1997'
- event: 索姆河战役爆发，英法联军与德军在法国北部索姆河流域展开一战中规模最大的战役，战役首日英军即伤亡近6万人，成为英国军事史上最惨烈的一天。
  year: '1916'
- event: 国际刑事法院（ICC）在荷兰海牙正式成立，成为世界上第一个常设的国际战争罪、反人类罪与种族灭绝罪审判机构。
  year: '2002'
- event: 美国邮政服务正式引入邮政编码（ZIP Code）系统，五位数编码彻底革新了全美邮件自动分拣与投递效率，成为现代物流体系的重要基石。
  year: '1963'
llm:
- desc: DeepSeek于2025年1月发布R1推理模型，首次大规模验证了纯强化学习（无需SFT冷启动）即可激发LLM的链式推理能力。R1采用Group Relative
    Policy Optimization（GRPO）算法，在MATH-500上达97.3%，AIME 2024得分79.8，对标OpenAI o1。开源模型权重与训练细节完全公开，引发全球推理模型研究热潮。
  tags:
  - DeepSeek-R1
  - 推理模型
  - 强化学习
  - 开源
  title: 'DeepSeek-R1: 强化学习驱动的推理增强大语言模型'
new_project:
- desc: 开源本地大语言模型运行框架，支持一键拉取并运行Llama、Mistral、Gemma、DeepSeek等主流开源模型。提供REST API与命令行接口，支持多平台（macOS/Linux/Windows），GPU加速开箱即用。内置Modelfile允许自定义模型参数与系统提示词。截至2026年中GitHub
    Star突破120k，已成为本地LLM推理的事实标准工具。
  tags:
  - LLM推理
  - 本地部署
  - 开源
  - 模型管理
  title: ollama/ollama
  url: https://github.com/ollama/ollama
paper:
- desc: 顶会论文推荐：ICLR 2025接收。提出将预训练权重分解为幅度与方向两个分量，仅对方向分量施加低秩约束进行微调，幅度分量则使用可学习缩放因子。在保持LoRA参数效率的同时，微调性能全面接近全参数微调（Full
    Fine-Tuning），在GPT-2、LLaMA-7B/13B等多个基准上以相同可训练参数量超越LoRA平均2.4个百分点。
  tags:
  - 参数高效微调
  - LoRA
  - ICLR 2025
  - 大语言模型
  title: 'DoRA: Weight-Decomposed Low-Rank Adaptation'
  url: https://arxiv.org/abs/2402.09353
tech:
  Arch:
  - desc: Intel 18A（1.8nm级）制程于2026年Q2进入风险量产阶段，是Intel首个同时搭载RibbonFET（GAA纳米片晶体管）与PowerVia（背面供电网络）的制程节点。相比Intel
      3，逻辑密度提升1.6倍，同功耗下性能提升15%，已获得高通、博通等首批外部客户订单。
    tags:
