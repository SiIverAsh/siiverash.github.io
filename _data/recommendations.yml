  year: '1944'
- event: 苏联发射联盟11号载人飞船，成功与礼炮1号空间站对接，航天员在轨驻留23天。
  year: '1971'
- event: 以色列大规模入侵黎巴嫩，第五次中东战争爆发，持续至同年8月。
  year: '1982'
- event: 微软发布Windows NT 3.1操作系统，为后续Windows NT内核奠定基础，面向企业级市场。
  year: '1993'
- event: 美国正式退出《反弹道导弹条约》，为部署国家导弹防御系统扫除障碍。
  year: '2002'
- event: 金星凌日天文现象发生，本世纪最后一次，全球大部分地区可见。
  year: '2012'
llm:
- desc: 开源的百万上下文大语言模型，支持Agent调用与工具使用，推理性能在多个基准上领跑开源社区。采用MIT许可证，首次将超长上下文与实用Agent能力普惠化，为开发者提供了媲美闭源模型的轻量级替代方案。
  tags:
  - DeepSeek
  - 开源
  - LLM
  - Agent
  - 百万上下文
  title: DeepSeek-V4 预览版
new_project:
- desc: HKUDS团队开发的轻量级开源AI代理框架，专注于任务自动化与工具编排。支持自然语言指令分解、外部API调用与状态记忆，旨在以最小资源消耗实现复杂的多步骤工作流，适合嵌入式或边缘AI场景。
  tags:
  - AI Agent
  - 开源
  - 自动化
  - 轻量级
  title: nanobot
  url: https://github.com/HKUDS/nanobot
paper:
- desc: 顶会论文推荐：本文提出MemSearcher框架，首次将记忆读写与检索决策统一到端到端强化学习范式中。LLM学习何时更新内部记忆、何时查询外部知识库，在复杂多跳推理任务中显著优于传统RAG，为构建具有持续学习能力的智能体提供了新思路。
  tags:
  - ACL 2026
  - Memory
  - RL
  - LLM Agent
  title: 'MemSearcher: Training LLMs to Reason, Search and Manage Memory via End-to-End
    RL'
  url: https://arxiv.org/abs/2511.02805
tech:
  Arch:
  - desc: 在Computex 2026上，英特尔发布了基于全新能效核（E-core）架构的Xeon 6+处理器，单芯片集成288个核心，专为高密度云计算和原生AI推理负载优化。该平台摒弃传统大小核设计，通过统一E核阵列实现2倍于前代的能效比，支持DDR5和PCIe
      6.0。
    tags:
    - Intel
    - Xeon
    - E-core
    - 288核
    - 数据中心
    title: Intel Xeon 6+ 平台：288核全E核设计
  Audio:
  - desc: 小米开源的视频到音频生成模型，支持用户通过文本或时间线指定音效类型和时机。采用扩散模型处理跨模态冲突，在音画同步性和听觉真实感上达到商业级水平，旨在简化影视后期音效制作流程。
    tags:
    - 音频生成
    - 视频音效
    - 扩散模型
    - 开源
    title: 'ControlFoley: 可控视频音效生成模型'
  CPU:
  - desc: 为纪念AM4平台诞生十周年，AMD推出基于Zen 3架构的7nm处理器，搭载3D V-Cache技术，拥有96MB超大L3缓存。兼容AM4及AM5主板，游戏性能仍可匹敌最新i9-14900K。同时发布的Ryzen
      7 7700X3D则将3D V-Cache引入中端AM5平台。
    tags:
    - AMD
    - Ryzen
    - 3D V-Cache
    - 游戏
    - 十周年
    title: AMD Ryzen 7 5800X3D 十周年纪念版
  Computer Vision:
  - desc: 提出一种针对视觉Transformer的测试时训练方法，利用自监督任务在推理阶段动态调整模型参数，无需额外标注即可显著提升分布外泛化能力。该方法在多个OOD基准上实现SOTA，为视觉模型在实际部署中的鲁棒性提供了新范式。
    tags:
    - CVPR 2026
    - Test-Time Training
    - Vision Transformer
    - 分布外泛化
    title: 'ViT^3: Unlocking Test-Time Training in Vision'
  GPU:
  - desc: 专为HPC和科学计算打造，配备全新设计的双精度（FP64）计算单元，FP64性能达英伟达Rubin的6倍以上。采用台积电3nm工艺与HBM3E内存子系统，支持12V-2x6供电接口，功耗600W，已获得全球两大超算集群采用。
    tags:
    - AMD
    - Instinct
    - HPC
    - FP64
    - HBM3E
    title: AMD Instinct MI430X GPU
  Lang:
  - desc: 引入新型范围类型（Range types）增强集合操作安全性，新增assert_matches!宏简化测试断言，Cargo集成两个关键安全更新以防范供应链攻击。同时优化异步运行时性能，巩固系统编程语言的安全与效率标杆地位。
    tags:
    - Rust
    - 编程语言
    - 系统编程
    - 安全
    title: Rust 1.96.0 稳定版发布
  NLP:
  - desc: 通过端到端强化学习训练大语言模型进行推理、搜索与记忆管理。模型自主决策何时检索外部知识、读写记忆模块，在开放域问答和多跳推理任务中显著优于传统检索增强生成（RAG）方法，展现了更类人的认知行为。
    tags:
    - ACL 2026
    - Memory
    - RL
    - LLM Agent
    title: 'MemSearcher: Training LLMs to Reason, Search and Manage Memory via End-to-End
      RL'
  Net:
  - desc: 支持IEEE 802.11bk (Wi-Fi 8) 标准，引入智能频谱调度与确定性低延迟机制，为AI应用和工业物联网提供微秒级时延保障。旗舰级三频设计，整机速率超30
      Gbps，是构建AI就绪型园区网络的关键组件。
    tags:
    - Wi-Fi 8
    - 企业网络
    - 低延迟
    - AI就绪
    title: 新华三全球首发企业级Wi-Fi 8 接入点 WA8648
  News:
  - desc: OpenAI宣布将ChatGPT与Codex能力深度整合，推出统一的“超级Agent”产品，可直接在对话中完成代码编辑、调试与部署，并调用外部工具。该功能面向全球10亿用户推出，标志着通用AI智能体从实验室走向大众化应用。
    tags:
    - OpenAI
    - ChatGPT
    - Codex
    - Agent
    - AI
    title: ChatGPT与Codex正式合并，打造超级Agent
