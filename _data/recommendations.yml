  year: 2014年
llm:
- desc: 微软发布Phi-4，仅14B参数却在数学与科学推理任务上超越多数70B模型。核心创新包括合成数据驱动的渐进式训练策略、基于质量的课程学习以及Dolma-CC高质量预训练语料。在GPQA、MATH-500与AMC基准上取得突破性分数，证明小模型通过数据质量优化可逼近大模型能力。
  tags:
  - Small Language Model
  - Synthetic Data
  - Microsoft
  - Reasoning
  title: 'Phi-4: 微软14B参数高效推理模型'
new_project:
- desc: Ollama是一个跨平台(Windows/Linux/macOS)的本地LLM部署工具，支持一行命令运行Llama 3.1、Qwen2.5、Gemma
    2、Phi-4等主流开源模型。内置量化(GGUF)、GPU加速(CUDA/Metal)、REST API与OpenAI兼容接口。Modelfile机制允许自定义系统提示与参数，是目前GitHub上最活跃的LLM本地化工具之一。
  tags:
  - LLM Deployment
  - Local Inference
  - GGUF
  - Go
  title: 'Ollama: 本地大语言模型推理引擎'
  url: https://github.com/ollama/ollama
paper:
- desc: NeurIPS 2024 Oral论文，提出ReFT方法族：在冻结的基础模型上训练低秩线性干预模块，以远低于LoRA的参数量(仅0.01%-0.1%)实现同等甚至更优的微调效果。核心创新在于对隐空间表示而非权重进行干预，在指令微调、推理等任务上展现出卓越的参数效率。
  tags:
  - NeurIPS 2024
  - Parameter-Efficient FT
  - LoRA Alternative
  - Representation Intervention
  title: 'ReFT: Representation Finetuning for Language Models'
  url: https://arxiv.org/abs/2404.03592
tech:
  Arch:
  - desc: 台积电N3P工艺在N3E基础上实现5%频率提升或10%功耗降低，光学收缩达1.04x。采用第三代FinFlex技术，允许在同一die上混合使用不同阈值电压的标准单元库。面向HPC与移动SoC双轨优化，苹果A19
      Pro与高通骁龙8 Elite Gen 2已确认采用此节点。
    tags:
    - TSMC
    - 3nm
    - FinFlex
    - N3P
    title: 'TSMC N3P: 3nm增强工艺节点量产'
  Audio:
  - desc: 阿里巴巴通义实验室推出的语音合成模型，仅需3秒参考音频即可实现高保真零样本语音克隆。基于Flow Matching与优化的声码器架构，支持中英日韩等多语种，在情感表达与韵律自然度方面显著超越XTTS-v2与Fish
      Speech，MOS分达4.5+。
    tags:
    - Zero-Shot TTS
    - Flow Matching
    - Voice Cloning
    - Multilingual
    title: 'CosyVoice 2: 零样本多语种语音合成'
  CPU:
  - desc: 基于Zen 5架构，8核16线程，采用第二代3D V-Cache技术(64MB堆叠缓存+L3共96MB)。基础频率4.7GHz，Boost至5.2GHz，TDP
      120W。相较于上代7800X3D，IPC提升16%，游戏帧率平均提升11%，同时解除了前代频率锁定限制，支持全核心PBO超频。
    tags:
    - Zen 5
    - 3D V-Cache
    - AM5
    - Gaming
    title: 'AMD Ryzen 7 9800X3D: Zen 5 3D V-Cache游戏旗舰'
  Computer Vision:
  - desc: 微软推出的轻量级视觉基础模型，仅0.23B/0.77B参数即实现多任务SOTA。采用序列到序列架构，统一处理图像描述、目标检测、分割、视觉定位等任务。通过FLD-5B大规模标注数据集训练，在zero-shot场景下超越多数专用模型，推理速度极快，适合边缘部署。
    tags:
    - Vision Foundation Model
    - Sequence-to-Sequence
    - Zero-Shot
    - Microsoft
    title: 'Florence-2: 轻量级视觉基础模型'
  GPU:
  - desc: 基于Blackwell GB206-300 GPU核心，搭载4608 CUDA核心，配备8GB/16GB GDDR7显存(128-bit位宽，28Gbps)。支持DLSS
      4多帧生成与Reflex 2低延迟技术，FP4张量算力达988 TOPS。TGP仅150W，单8pin供电，1080p光追游戏性能接近前代RTX 4070。
    tags:
    - Blackwell
    - GB206
    - GDDR7
    - DLSS 4
    title: 'NVIDIA GeForce RTX 5060: Blackwell主流甜点卡'
  Lang:
  - desc: Swift 6正式引入完整的数据竞争安全(Data Race Safety)保证，编译器通过Sendable协议与region-based isolation在编译期消除数据竞争。引入Typed
      Throws、Noncopyable泛型与嵌入式Swift子集，支持裸机与MCU开发。Swift 6模式下的严格并发检查使多线程崩溃率降低80%以上。
    tags:
    - Swift
    - Concurrency
    - Data Race Safety
    - Sendable
    title: 'Swift 6: 全面数据竞争安全并发模型'
  NLP:
  - desc: AI2发布的全开放大语言模型系列，提供7B与13B参数版本。完全公开训练数据(Dolma)、代码、权重、日志与中间检查点。采用分组查询注意力(GQA)与SwiGLU激活，在MMLU、ARC等基准上超越同规模Llama
      2与Mistral，主打学术可复现性。
    tags:
    - Open Source LLM
    - AI2
    - GQA
    - Reproducible Research
    title: 'OLMo 2: 完全开放的语言模型家族'
  Net:
  - desc: CXL联盟发布3.1规范，在CXL 3.0基础上增强结构性与安全性。支持PBR(Peer-to-Peer Backbone Routing)、可信安全协议(TSP)与改进的全局结构内存。基于PCIe
      6.0物理层(64 GT/s)，实现跨机架内存池化与多主机共享，是数据中心可组合架构的核心使能技术。
    tags:
    - CXL
    - PCIe 6.0
    - Memory Pooling
    - Data Center Fabric
    title: 'CXL 3.1: 计算快速链路互联规范发布'
  News:
  - desc: Computex 2026于6月2日在台北南港展览馆开幕，聚焦AI PC规模化落地。AMD预计发布Zen 6架构预览，NVIDIA展出Vera
      Rubin GPU平台，Intel推进Nova Lake处理器。联发科与高通展示面向Copilot+ PC的ARM SoC新品，AI算力门槛提升至50+
      TOPS。
    tags:
    - Computex
    - AI PC
    - Zen 6
    - Vera Rubin
    title: Computex 2026台北开幕：AI PC生态全面爆发
