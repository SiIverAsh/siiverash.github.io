  intro: 拥有清澈透明且富有感染力的声线，演技自然细腻，能精准演绎从活泼少女到沉静角色的广泛类型。2016年荣获第10届声优奖主演女声优奖，成为年轻一代声优中的佼佼者。歌唱方面亦展现非凡才华，发行多张单曲与专辑，连续登上红白歌合战，实现声优与歌手的双重活跃。其不懈的努力与对表演的热忱，使她深受业界与粉丝的喜爱。
  name: 水瀬いのり
date: '2026-06-07'
