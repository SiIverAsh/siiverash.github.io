algorithm:
- desc: PCA是机器学习中最经典的线性降维算法，通过正交变换将原始高维数据投影到方差最大的主成分方向上，在保留数据主要变异性的同时实现降维。数学上通过协方差矩阵的特征值分解（EVD）或数据矩阵的奇异值分解（SVD）求解。PCA广泛应用于数据可视化（降至2D/3D）、噪声过滤、特征提取、以及作为其他算法的预处理步骤。虽然线性假设限制其在复杂非线性数据上的表现，但计算高效、可解释性强，至今仍是数据科学入门与实践中不可或缺的基础工具。
  tags:
  - Dimensionality Reduction
  - Eigenvalue Decomposition
  - Unsupervised Learning
  - Feature Extraction
  - Linear Algebra
  title: 主成分分析 (Principal Component Analysis, PCA)
