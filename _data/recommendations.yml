  - desc: 提出CoALM，首个统一多轮对话与工具调用能力的对话式Agent语言模型。通过Multi-Task Instruction Tuning策略，将对话历史建模、API调用生成、工具执行反馈整合进单一Transformer架构。在MT-Bench和ToolBench基准上，以7B参数规模超越GPT-4在工具编排任务上的表现。引入Conversation-Tool
