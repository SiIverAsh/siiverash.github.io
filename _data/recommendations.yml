    - RISC-V
    - CPU
    - 高性能计算
    - 阿里达摩院
    title: 玄铁 C950 RISC-V 处理器
  Audio:
  - desc: UALM 是 NVIDIA 提出的统一音频语言模型，集成理解、生成与推理能力，基于 Transformer 架构，在音频问答任务上达到 85%
      准确率，参数量 1.2B。
    tags:
    - 音频语言模型
