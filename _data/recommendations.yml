  Audio:
  - desc: ICASSP 2026录用。Omni-AVSR构建了首个将音频、视频唇语与文本三模态统一的大语言模型语音识别框架。该模型利用Q-Former桥接冻结的音频编码器(Whisper)与视觉编码器(CLIP)，将多模态特征对齐至LLaMA-3的语义空间，实现端到端的音视频融合语音识别。在LRS3-TED数据集上，Omni-AVSR在-10dB极低信噪比场景下WER降低41.3%，首次展示LLM在多模态抗噪语音识别中的鲁棒优势，并支持流式推理部署。
