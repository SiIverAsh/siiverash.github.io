  year: 1911
- event: 苏联发射Vostok 6，宇航员Valentina Tereshkova成为首位进入太空的女性，开辟了女性参与航天的新纪元。
  year: 1963
- event: Oracle Corporation由Larry Ellison、Bob Miner和Ed Oates创立，日后成长为全球第二大软件公司。
  year: 1977
- event: Swype输入法在Android平台正式发布，通过滑动手势革新了移动设备的文字输入方式。
  year: 2010
- event: 微软收购自然语言处理初创公司Wand Labs，加强其在消息应用和机器人的语义理解能力。
  year: 2016
- event: Boston Dynamics开始向美国企业公开销售Spot四足机器人，定价$74,500，标志仿生机器人走向商用。
  year: 2020
llm:
- desc: Mistral AI于2025年12月发布的旗舰模型，采用Mixture-of-Experts架构，总参数675B，激活参数约40B。支持128K上下文窗口，在MMLU、HumanEval等基准上与GPT-4o持平，提供开放权重，专为复杂推理、代码生成和多语言任务优化。
  tags:
  - LLM
  - Mistral
  - MoE
  - Open-Weight
  title: 'Mistral Large 3: 675B 参数 MoE 开源旗舰'
new_project:
- desc: Block（原Square）开源的Goose是一个基于MCP协议的AI代理，支持70+扩展，能够自主执行终端命令、管理代码仓库、操控浏览器等。旨在打造开发者日常工作的智能助手，6月在GitHub趋势榜上迅速攀升。
  tags:
  - AI Agent
  - MCP
  - Open Source
  - Automation
  title: 'Goose: 可扩展的开源 AI 代理'
  url: https://github.com/block/goose
paper:
- desc: ICLR 2026 论文，提出一种交错推理框架，将文本规划与图像生成步骤交替执行，显著提升复杂场景下文本到图像生成的一致性和细节还原。在多个基准上超越现有扩散模型，展示了推理能力在生成任务中的重要性。
  tags:
  - ICLR 2026
  - Text-to-Image
  - Diffusion Model
  - Reasoning
  title: Interleaving Reasoning for Better Text-to-Image Generation
  url: https://openreview.net/forum?id=lLNNzBQPas
tech:
  Arch:
  - desc: SiFive于2026年5月推出第三代Performance系列P570核心，完全兼容RVA23 Profile。采用13级流水线、4-wide超标量乱序设计，SPECint估算性能较上一代提升40%，目标市场为消费电子与AIoT设备，标志着RISC-V向主流高性能领域的关键迈进。
    tags:
