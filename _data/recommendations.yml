    title: 'Arm AGI CPU: Arm首款自研硅芯片，Neoverse V3架构专为Agentic AI打造'
  Audio:
  - desc: ICLR 2026 Oral论文(NVIDIA出品)。首次将音频理解、生成与推理统一于单一自回归语言模型架构。通过音频离散化token与文本token联合训练，在语音识别、TTS、音乐理解和音频问答等12项任务上达到或超越专用模型水平，参数量仅7B。
    tags:
