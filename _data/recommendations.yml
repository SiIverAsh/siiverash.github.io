  Computer Vision:
  - desc: CVPR 2026录用。GHPT首次将混合路径追踪与3D Gaussian Splatting深度融合，实现实时可重光照场景渲染。该框架在Gaussian原语上引入BRDF材质属性，通过GPU加速的路径追踪管线动态计算全局光照与间接光照，在1920×1080分辨率下达到60fps以上的交互式重光照性能。相比传统逆渲染方法，PSNR提升3.2dB，且支持动态光源、环境贴图切换与材质编辑，为AR/VR与电影预可视化提供了轻量级物理真实感渲染新范式。
    tags:
    - 3D Gaussian Splatting
    - Path Tracing
    - Real-Time Relighting
