  Audio:
  - desc: AMD Software Adrenalin Edition 26.3.1 集成新一代实时噪声抑制算法，基于深度神经网络实现 48 kHz 采样率下
      98% 背景噪声消除，延迟低于 2 ms。支持 GPU 硬件加速，占用显存仅 50 MB，兼容所有 RDNA 3/4 架构显卡，语音清晰度指标 PESQ
      达 4.2。
