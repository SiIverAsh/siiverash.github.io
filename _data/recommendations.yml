algorithm:
- desc: 经典监督学习算法，通过在高维特征空间中寻找最大间隔超平面实现二分类。核技巧(Kernel Trick)使SVM无需显式计算高维映射即可处理非线性可分数据，常用核函数包括RBF、多项式与Sigmoid。在小样本、高维场景（如基因表达分类、文本分类）中至今保持竞争力，软间隔引入允许一定分类误差以提升泛化能力。
  tags:
  - SVM
  - Supervised Learning
  - Kernel Trick
  - Maximum Margin
  - Convex Optimization
  title: 支持向量机 (Support Vector Machine, SVM)
cv_recommend:
  agency: Music Ray'n（ミュージックレイン）
  hometown: 东京都
  intro: 雨宮天于1993年8月28日出生于东京都，所属事务所为Sony Music旗下Music Ray'n。2012年通过Music Ray'n超级声优选拔出道，以清澈通透且富有穿透力的声线著称，擅长演绎从高冷神秘到元气活泼的广泛角色谱系。其嗓音辨识度极高，高音区明亮不刺耳，低音区沉稳有力，在情感爆发场景中展现出极强的控制力与感染力。2014年起同时开展歌手活动，以solo艺人身份发行多张单曲与专辑，是声优歌手双栖发展的典型代表。作为TrySail组合成员之一，在广播与综艺领域同样活跃，以率真自然的性格获得广泛人気。
  name: 雨宮天
date: '2026-06-18'
history:
