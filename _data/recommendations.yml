algorithm:
- desc: PCA是最经典的线性降维算法，由Karl Pearson于1901年提出。核心思想是通过正交变换将原始特征映射到方差最大化的低维子空间，保留数据主要变异信息。数学上等价于对协方差矩阵进行特征值分解或对数据矩阵进行SVD。广泛应用于高维数据可视化、噪声过滤、特征提取与压缩。在深度学习时代，PCA仍作为嵌入空间分析与模型初始化的重要工具，其变体包括Kernel
    PCA、Sparse PCA、Robust PCA等。
  tags:
  - 降维
  - 特征值分解
  - 无监督学习
  - 数据预处理
  title: 主成分分析 (Principal Component Analysis, PCA)
cv_recommend:
  agency: ラクーンドッグ（Raccoon Dog）
  hometown: 愛知県名古屋市
  intro: 1994年10月16日生。原所属プロ・フィット（Pro-Fit）于2022年解散后移籍至Raccoon Dog。以其清澈通透而富有穿透力的声线著称，音域宽广，从元气少女到冷酷角色均能精准驾驭。歌唱实力出众，作为solo歌手多次登上武道馆舞台，展现出超越声优本职的音乐表现力。演技风格细腻内敛，擅于通过微妙的呼吸与停顿传达角色内心情感，在萌系与严肃题材间切换自如，被誉为同世代最具实力与人气的女性声优之一。
  name: 鬼頭明里
date: '2026-06-20'
history:
- event: 富士通（Fujitsu）在日本神户成立，最初为富士电机的通信设备部门，后发展为全球IT服务与超级计算巨头。
  year: '1935'
- event: MP3之父 Karlheinz Brandenburg 出生。他领导Fraunhofer团队开发MP3音频编码格式，彻底改变数字音乐产业。
  year: '1965'
- event: Napster文件共享服务上线，由Shawn Fanning创立，开创P2P音乐分享时代，深刻影响版权法与数字内容分发。
  year: '1999'
- event: 维基媒体基金会（Wikimedia Foundation）在美国佛罗里达州正式注册成立，Jimmy Wales任首任主席，运营维基百科等自由知识项目。
  year: '2003'
- event: Google以5.55亿美元现金收购智能摄像头公司Dropcam，进军智能家居安防市场，后整合入Nest产品线。
  year: '2013'
- event: 神威·太湖之光以93 PFLOPS峰值性能登顶TOP500超级计算机榜首，成为中国首台完全采用国产处理器（申威SW26010）的全球最快超算。
  year: '2016'
llm:
- desc: MiniMax于2026年6月开源M3系列模型。支持1M token原生上下文窗口，MoE架构激活参数约20B，总参数量级达数百B。原生多模态（文本+图像理解），在HumanEval、MBPP等Coding基准上超越GPT-4.1，Agentic工具调用能力业界领先。同步开源完整权重与训练技术报告，支持国产算力平台部署，被誉为国内首个Frontier级全开源模型。
  tags:
  - MiniMax M3
  - 开源LLM
  - 1M上下文
  - Agentic Coding
  title: 'MiniMax M3: 开源Frontier Coding与多模态旗舰'
new_project:
- desc: NVIDIA开源的人形机器人通用参考设计平台，2026年6月发布即登上GitHub Trending榜首。包含完整机械结构（28个自由度）、PCB设计文件、ROS
    2驱动栈及Isaac Sim仿真环境。基于Jetson AGX Thor（800 TOPS）计算平台，预集成GR00T基础模型实现零样本灵巧操作。提供Sim-to-Real迁移蓝图与Isaac
    Lab强化学习训练框架，目标降低学术机构机器人研究入门门槛。
  tags:
  - 人形机器人
  - 开源硬件
  - ROS 2
  - Sim-to-Real
  title: NVIDIA/Isaac-GR00T
  url: https://github.com/NVIDIA/Isaac-GR00T
paper:
- desc: EACL 2026最佳论文。系统研究多LLM Agent协作进行零日漏洞利用：Agent团队通过规划、侦察、代码生成与验证循环，在无人类干预下发现并利用真实世界软件漏洞。在15个未公开CVE测试集上获得53%端到端成功率，首次证明LLM
    Agent具备自主网络攻击能力，引发AI安全治理广泛讨论。
  tags:
  - LLM Agent
  - 零日漏洞
  - 网络攻击
  - AI安全
  title: Teams of LLM Agents can Exploit Zero-Day Vulnerabilities
  url: https://aclanthology.org/2026.eacl-long.2/
