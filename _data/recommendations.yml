  CPU:
  - desc: Computex 2026期间，Intel Nova Lake-S桌面CPU规格泄露。旗舰型号搭载52核（8P+44E），引入bLLC（大容量末级缓存）三级层次架构，支持多核独立超频。配套Z990芯片组采用PCIe
      5.0，功耗显著提升。GIGABYTE已展示首款Z990主板（3x 8-pin供电），预计2027年初发布，为Arrow Lake后继者。
    tags:
