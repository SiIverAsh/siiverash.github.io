algorithm:
- desc: 梯度提升是集成学习中Boosting家族的核心算法，通过迭代训练弱学习器（通常为CART决策树），每一步拟合前一步残差的负梯度方向，最终加权组合所有弱学习器得到强模型。XGBoost在工程层面引入二阶泰勒展开自定义损失函数、列采样、shrinkage缩减、稀疏感知分割查找与系统级缓存优化，使其在Kaggle竞赛与工业结构化数据任务中长期占据统治地位。LightGBM与CatBoost为其高效变体。
  tags:
  - 集成学习
  - Boosting
  - 树模型
  - 监督学习
  title: 梯度提升决策树 (Gradient Boosting / XGBoost)
cv_recommend:
