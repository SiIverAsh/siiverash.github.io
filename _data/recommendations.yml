tech:
  Arch:
  - desc: PCI-SIG 于 2026 年第一季度定案 PCIe 7.0 规范，每通道速率提升至 128 GT/s，x16 双向带宽达 512 GB/s。采用
      PAM4 调制、低功耗 L0p 状态与前向纠错技术，专为 AI 训练与 HPC 场景设计，预计 2028 年量产。
    tags:
    - 高速互连
    - PAM4 调制
    - 带宽翻倍
    - AI 基础设施
    title: PCI Express 7.0 标准正式定案
  Audio:
  - desc: 2026年4月开源的高保真音频扩散模型，基于 Transformer 架构在波形潜在空间中操作，支持文本到语音与音色克隆。在 LibriSpeech
      测试集上说话人相似度指标达 0.818，可生成 24kHz 采样率音频，集成噪声抑制与情感控制模块。
    tags:
    - 扩散模型
    - 音色克隆
    - 文本到语音
    - 开源音频
    title: 美团 LongCat-AudioDiT 音频生成模型
  CPU:
  - desc: 基于 Zen 5 架构的 Ryzen 9000 系列于 CES 2026 发布，采用台积电 4nm 工艺，最高 16 核 32 线程，基础频率
      4.0 GHz，加速频率 5.8 GHz，支持 DDR5-6400 与 PCIe 5.0，TDP 65W-170W，IPC 提升 18%。
    tags:
    - Zen 5 架构
    - 4nm 工艺
    - 高频率
    - 桌面处理器
    title: AMD Ryzen 9000 系列桌面 CPU
  Computer Vision:
  - desc: ICLR 2026 论文提出在视觉Transformer中引入块循环动态机制，通过递归计算使每个块能够迭代细化特征表示，显著降低计算复杂度并提升长距离依赖建模能力。实验表明在
      ImageNet-1K 上仅用 2 个递归块即可达到 DINO v2 96% 的精度，参数量减少 40%。
    tags:
    - Vision Transformer
    - 递归机制
    - 计算效率
    - ICLR 2026
    title: Block Recurrent Dynamics in Vision Transformers
  GPU:
  - desc: 砺算科技 TrueGPU 显卡于 2026 年 3 月上市，采用 6nm 工艺，集成 12GB GDDR6 显存，浮点性能 12 TFLOPS，支持
      DirectX 12 与 Vulkan，兼容超 100 款游戏，性能对标 NVIDIA RTX 4060，功耗 180W。
    tags:
