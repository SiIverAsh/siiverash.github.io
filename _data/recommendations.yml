    title: 'Intel Core Ultra 9 385H: Panther Lake移动旗舰Intel 18A制程详细评测'
  Computer Vision:
  - desc: 提出首个支持文本/图像/语音多模态条件联合控制的视频扩散Transformer，在CVPR 2026上获得最佳论文提名。核心创新包括时空分离注意力机制与分层噪声调度策略，在UCF-101、MSR-VTT等基准上FVD指标提升23.7%，单卡A100即可完成512×512分辨率推理。
    tags:
