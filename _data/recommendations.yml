llm:
- desc: Anthropic于2026年Q1发布Claude 4 Opus，在推理、代码生成与多模态理解领域全面超越前代。模型引入Extended Thinking
    2.0机制，支持最长100万token推理链自主展开与检验；多模态能力原生融合文本、图像、音频与视频输入；在GPQA Diamond(92.3%)、SWE-Bench
    Verified(71.8%)、MMMU(76.4%)等基准上达到新SOTA。采用Constitutional AI 3.0对齐框架与多阶段RLHF训练，显著降低幻觉率。API上下文窗口扩展至200K
    tokens。
  tags:
  - Anthropic
  - 闭源LLM
  - 推理增强
  - 多模态
  title: Claude 4 Opus：Anthropic新一代旗舰推理模型
new_project:
- desc: 微软开源的轻量级Python工具库，可将PDF、Word、Excel、PowerPoint、图片、HTML、CSV、JSON、XML、ZIP等十余种常见文件格式转换为统一的Markdown文本，专为大语言模型(LLM)数据预处理与RAG场景设计。内置OCR支持（图片/扫描PDF转文字）、表格保留（HTML
    Table→Markdown Table）、元数据提取等功能。支持CLI命令行与Python API双模式调用，一行代码即可完成文档转换。截至2026年6月在GitHub已获超过45K
    Star。
  tags:
  - 文档转换
  - LLM数据预处理
  - Markdown
  - 微软开源
  title: microsoft/markitdown
  url: https://github.com/microsoft/markitdown
paper:
- desc: 顶会论文推荐：ICML 2024接收。该论文提出Gradient Low-Rank Projection(GaLore)策略，通过在训练过程中对梯度矩阵进行低秩分解并投影到低维子空间进行更新，将LLM全参数微调的内存占用降低至原来的1/3。在LLaMA
    7B模型上，GaLore仅需24GB显存即可完成全参数训练，同时保持与全秩训练相当的收敛速度与下游任务性能。支持与8-bit优化器、FlashAttention等技术组合使用，为消费级GPU上的大模型训练开辟新路径。
  tags:
  - ICML 2024
  - LLM训练
  - 内存优化
  - 梯度低秩投影
  title: 'GaLore: Memory-Efficient LLM Training by Gradient Low-Rank Projection'
  url: https://arxiv.org/abs/2402.19427
tech:
  Arch:
  - desc: PCI-SIG于2025年底正式发布PCIe 7.0规范(v1.0)，单lane速率达128GT/s，x16双向带宽高达512GB/s（是PCIe
      5.0的4倍）。采用PAM4(4-level Pulse Amplitude Modulation)信令，引入前向纠错(FEC)与动态链路均衡机制以保障信号完整性。完全向下兼容PCIe
      6.0/5.0设备。面向AI/ML加速器、800G以太网与CXL 3.1内存互连场景优化，首批商用控制器预计2027年面世。
    tags:
    - PCIe 7.0
    - PAM4
    - 512GB/s
    - AI加速
    title: PCIe 7.0规范正式发布：512GB/s双向带宽，PAM4信令
  Audio:
  - desc: 阿里巴巴通义实验室推出CosyVoice 3，基于流匹配(Flow Matching)与双编码器架构，实现3秒音频即可零样本克隆任意说话人音色。新增全情感强度滑条控制(arousal-valence二维空间)，支持22种语言跨语种合成，MOS评分达4.62。引入音频水印与DeepFake检测模块，有效防御语音伪造攻击。推理延迟降至80ms(流式)，已开源全部模型权重与训练代码。
    tags:
    - 语音合成
    - 零样本克隆
    - 情感控制
    - 开源TTS
    title: CosyVoice 3：零样本语音合成与全情感控制框架
  CPU:
  - desc: AMD于2026年4月推出Ryzen 7 9800X3D，基于Zen 5架构单CCD设计，8核16线程，采用第二代3D V-Cache技术，L3缓存扩容至96MB(32MB片上+64MB堆叠)。最大加速频率提升至5.5GHz，TDP维持120W，相比上代7800X3D游戏性能提升18%，生产力多线程性能提升24%。3D
      V-Cache置于CCD下方优化散热，支持AM5平台与DDR5-6400内存。在1080p游戏测试中全面超越Intel Core Ultra 7 265K。
    tags:
    - AMD
    - Zen 5
    - 3D V-Cache
    - AM5
    title: AMD Ryzen 7 9800X3D：Zen 5单CCD 3D V-Cache游戏旗舰
  Computer Vision:
  - desc: Google DeepMind在2026年Q2向开发者全面开放Veo 2视频生成API。模型支持8K分辨率、最长120秒视频生成，引入物理世界模拟器(World
      Simulator)模块，能够推理物体运动、光影变化与流体动力学。基于扩散Transformer架构，训练数据量达50亿视频-文本对，推理时使用级联超分辨率策略，单卡H100即可生成1080p/24fps视频。支持文本/图像/视频多模态条件输入，在VBench-Long基准上大幅领先Sora与Kling。
    tags:
    - 视频生成
    - 扩散Transformer
    - 世界模型
    - Google DeepMind
    title: Veo 2：Google DeepMind视频生成模型全面开放
  GPU:
  - desc: AMD于2026年Q1正式推出Radeon RX 9070 XT，基于RDNA 4架构Navi 48 GPU，采用TSMC N4P工艺，配备64个CU(4096流处理器)、16GB
      20Gbps GDDR7显存与256-bit位宽，总带宽640GB/s。第二代AI加速器提供192 TOPS INT8算力，第三代光追核心RT性能较RDNA
      3提升2.1倍。支持DisplayPort 2.1 UHBR20与FSR 4超分辨率。首发定价3299元，对标RTX 5070 Ti，在1440p光栅化性能中领先约8%。
    tags:
    - AMD
    - RDNA 4
    - GDDR7
    - FSR 4
    title: AMD Radeon RX 9070 XT：RDNA 4旗舰，16GB GDDR7，3299元
  Lang:
  - desc: Oracle于2026年3月发布Java 26 (JDK 26)，作为非LTS版本引入多项JEP。核心特性包括：值类型(Value Types)第三轮预览，通过identity-free对象实现栈分配与扁平化内存布局，大幅降低GC压力；虚拟线程(Virtual
      Threads)增强，引入结构化并发(Structured Concurrency)正式API与作用域值(Scoped Values)性能优化；外部函数与内存API(FFM
      API)正式毕业，彻底替代JNI。
    tags:
    - 编程语言
    - Java
    - 值类型
    - 虚拟线程
    title: Java 26 正式发布：值类型预览与虚拟线程增强
  NLP:
  - desc: 阿里巴巴通义实验室发布Qwen 3系列，涵盖0.5B至720B参数规模。旗舰Qwen 3-720B采用Hybrid MoE架构，激活参数仅37B，在MMLU-Pro、GPQA
      Diamond、LiveCodeBench等基准上比肩Claude 4 Opus。创新引入Thinking-in-Self-Distillation训练策略，使小模型从大模型思维链中学习推理能力；支持131072
      tokens原生上下文窗口，通过YaRN外推可扩展至1M。全系列采用Apache 2.0协议开源。
    tags:
    - 开源LLM
    - MoE架构
    - 通义千问
    - 推理增强
    title: Qwen 3：通义千问第三代开源大语言模型家族
  Net:
  - desc: 3GPP于2026年Q1正式冻结Release 19规范，标志着5G-Advanced第二阶段完成。Rel-19核心特性包括：AI/ML原生空口(Native
      AI Air Interface)标准化，支持基站与终端联合训练联邦学习模型；集成传感与通信(ISAC)第一阶段规范，实现厘米级定位与环境感知；非地面网络(NTN)增强，支持LEO/GEO卫星间无缝切换与星地直连宽带。为3GPP
      Release 21 6G标准化奠定基础。
    tags:
    - 5G-Advanced
    - 3GPP
    - ISAC
    - AI原生空口
    title: 3GPP Release 19标准正式冻结：5G-Advanced迈向6G关键一步
  News:
  - desc: 2026年6月，欧盟《人工智能法案》(AI Act)历经两年过渡期后进入全面实施阶段。高风险AI系统(涵盖招聘、信贷、司法、医疗等领域)须通过第三方合格评定并注册欧盟数据库；通用AI(GPAI)模型提供者须披露训练数据摘要并遵守版权指令；实时生物识别监控在公共场所全面禁止(除极少数例外)。违规最高可罚全球年营收7%或3500万欧元。该法案推动全球AI治理格局深刻重塑，美国、日本、韩国相继加速本国AI立法进程。
    tags:
    - AI监管
    - 欧盟AI法案
    - 合规
    - 科技政策
    title: 欧盟《人工智能法案》全面实施：全球首部全面AI监管法律生效
