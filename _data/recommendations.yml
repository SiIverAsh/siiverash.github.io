  intro: 1989年5月30日出生于兵庫県。子役出身，自幼积累丰富舞台经验，后转向声优领域。其演技以情感层次的细腻递进而著称——从压抑的静默到爆发的高扬之间，拥有令人信服的动态幅度。凭借扎实的呼吸控制与精准的间（ま）感，在需要大量内心独白的角色中展现出罕见的说服力。2021年荣获第15回声优Awards主演女优赏，印证了业界对其表现力的高度认可。近年亦活跃于舞台剧与旁白领域，持续拓展声优表现边界。所属事务所mitt
    management。
  name: 石川由依
