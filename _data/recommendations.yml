llm:
- desc: DeepSeek于2026年4月发布V4系列，采用改进的混合专家架构（MoE）与稀疏注意力机制，原生支持百万Token超长上下文窗口，无需位置外推即可稳定运行。V4
    Pro版本在HumanEval、SWE-bench等Coding及Agent基准上达到开源模型SOTA，推理成本较V3降低约60%。采用Multi-head
    Latent Attention压缩KV缓存，使百万Token上下文的显存占用仅为同等上下文长度下标准注意力的1/8。
