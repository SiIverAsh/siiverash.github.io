algorithm:
- desc: GBDT是一种集成学习算法，通过迭代训练决策树来最小化损失函数，适用于回归与分类任务。具有高精度与可解释性，支持特征重要性评估，广泛用于搜索排序与金融风控。
  tags:
  - 集成学习
  - 决策树
  - 机器学习算法
  - 可解释AI
  title: 梯度提升决策树（GBDT）
cv_recommend:
  agency: 青二Production
  hometown: 千叶县松户市
  intro: 神谷浩史是日本一线男性声优，以其多变的声线和精湛的演技在业界享有极高声誉。他擅长演绎从热血青年到冷静理智的各类角色，声音兼具清澈与张力，能够精准捕捉人物情感。曾多次获得声优奖项，包括“声优奖”主演男优奖，其专业素养和持续的作品输出使他成为声优行业的标杆人物。除了配音工作，他还积极参与广播节目和活动，展现了广泛的娱乐才能。
  name: 神谷浩史
date: '2026-03-21'
history:
- event: 德国作曲家约翰·塞巴斯蒂安·巴赫出生，被誉为“西方音乐之父”。
  year: '1685'
- event: 拿破仑颁布《民法典》（又称《拿破仑法典》），成为现代民法体系的基础。
  year: '1804'
- event: 第一次世界大战中，德军发动“皇帝会战”春季攻势，企图突破联军防线。
  year: '1918'
- event: 南非沙佩维尔大屠杀发生，69名示威者被警方枪杀，成为反种族隔离运动的重要事件。
  year: '1960'
- event: 美国阿尔卡特拉斯联邦监狱正式关闭，该监狱以关押重刑犯而闻名。
  year: '1963'
- event: 杰克·多西发送第一条推文，社交媒体平台推特（现X）正式诞生。
  year: '2006'
llm:
- desc: Claude 4采用宪法AI技术，支持100万令牌上下文，在HumanEval编码基准上得分92.5%。具备高级推理与多轮对话能力，模型参数规模未公开，提供API与企业级部署方案。
  tags:
  - 大语言模型
  - 宪法AI
  - 编码能力
  - 长上下文
  title: Anthropic Claude 4 系列模型
new_project:
- desc: vLLM采用PagedAttention技术实现高吞吐量与内存高效的LLM推理，支持连续批处理与动态内存管理。相比Hugging Face Transformers，推理速度提升24倍，已集成到众多生产系统。
  tags:
  - LLM推理
  - 开源
  - 高性能
  - Python
  title: 'vLLM: High-throughput LLM Inference Engine'
  url: https://github.com/vllm-project/vllm
paper:
- desc: 该论文提出门控注意力机制，动态控制注意力头激活，在保持性能的同时减少计算开销。在LLaMA-3B模型上实现20%推理速度提升，被NeurIPS 2025收录为最佳论文候选。
  tags:
  - 注意力机制
  - 大语言模型
  - 高效推理
  - NeurIPS 2025
  title: Gated Attention for Large Language Models
  url: https://arxiv.org/abs/2505.06708
