  - desc: 提出LucidFlux，首个无需Caption输入的照片级通用图像复原框架。基于大规模Diffusion Transformer架构，通过自监督学习在百万级图像数据上训练，单模型统一处理去噪、去模糊、超分辨率、JPEG去伪影等20+任务。核心创新包括：Degradation-Adaptive
