llm:
- desc: 'DeepSeek-R1 通过纯强化学习（GRPO 算法）实现推理能力涌现，无需 SFT 冷启动即可自动生成链式思考。模型采用 Mixture-of-Experts
    架构（671B 总参数 / 37B 激活），在数学竞赛（AIME 2024: 79.8%）、编程竞赛（Codeforces: 96.3%）等基准上比肩 OpenAI
    o1。完全开源 MIT 许可，并提供蒸馏版（1.5B-70B），降低推理模型应用门槛。'
  tags:
  - Reasoning
  - GRPO
  - MoE
  - Open Source
  title: 'DeepSeek-R1: 开源推理模型里程碑'
new_project:
- desc: Maybe Finance 是一个开源的「你拥有自己的数据」个人财务管理平台，提供资产追踪、投资组合管理、预算规划与财务仪表板。支持自建部署 (Docker)，内置
    Plaid 等金融 API 集成，采用 Ruby on Rails + React 全栈架构，PostgreSQL 数据库。GitHub 星标超 40K，属于个人数据主权运动中的代表性项目，适合关注财务隐私的软件工程师研究与自我托管。
  tags:
  - Finance
