algorithm:
- desc: 经典监督式机器学习算法，通过寻找最大间隔超平面实现二分类。利用核技巧（Kernel Trick）将数据映射到高维空间处理非线性可分问题。核心优势在于对高维数据与小样本场景的泛化能力，广泛用于文本分类、图像识别等领域。
  tags:
  - 机器学习
  - 分类算法
  - 核方法
  - 经典算法
  title: 支持向量机 (Support Vector Machine, SVM)
cv_recommend:
  agency: フリー（元プロ・フィット所属）
  hometown: 東京都
  intro: 1970年6月24日出生于东京都，资深男性声优。其声线兼具清澈的少年感与沉稳的成年男性魅力，在旁白解说领域拥有极高评价，以克制而富有张力的语调控制能力著称。演艺生涯横跨1990年代至今逾三十年，积累了深厚的舞台功底与语音表现力。经历过所属事务所プロ・フィット的闭业后，以自由身份继续活跃于业界。他擅长通过微妙的语速变化与气息控制来塑造角色内心世界，在同辈声优中以敬业态度与稳定的演技水准受到广泛尊重。
  name: 岩永哲哉
date: '2026-06-24'
history:
- event: 微软正式发布Windows 98操作系统，首次集成Internet Explorer浏览器与桌面，奠定PC互联网时代基石。
  year: '1998'
- event: 人类基因组工作草图完成并公布，标志着生命科学进入基因组时代。
  year: '2000'
- event: 苹果iPhone 4正式在全球发售，Retina视网膜屏幕与FaceTime视频通话引领智能手机革命。
  year: '2010'
- event: 英国脱欧公投结果公布，52%选民支持脱离欧盟，对全球科技产业格局产生深远影响。
  year: '2016'
- event: 微软正式发布Windows 11操作系统，全新UI设计与Android应用原生支持成为最大亮点。
  year: '2021'
- event: 全国科技大会、国家科学技术奖励大会、两院院士大会在北京隆重召开，习近平为国家最高科学技术奖获得者颁奖。
  year: '2024'
llm:
- desc: 字节跳动于2026年6月23日发布豆包大模型2.1 Pro（Seed 2.1 Pro），Coding与Agent能力实现质变突破。在SWE-bench
    Verified、HumanEval等编程基准上比肩GPT-5.5水平，支持自主Agent执行复杂任务（如芯片设计代码生成18小时自主运行），并开源深度思考模型。
  tags:
  - 豆包
  - LLM
  - Agent
  - 字节跳动
  title: 豆包2.1 Pro (ByteDance Seed 2.1 Pro)：Coding与Agent能力跨越'质变点'
new_project:
- desc: Nex-AGI团队于2026年6月开源Nex-N2，基于Qwen3.5进行后训练优化的AI Agent模型。专注于工具调用、多步推理与自主任务执行，在Function
    Call准确率与复杂Agent工作流中表现优异，支持MCP协议集成与自定义工具链扩展。
  tags:
  - AI Agent
  - 开源
  - GitHub
  - Qwen
  title: nex-agi/Nex-N2：为行动而生的开源AI Agent模型
  url: https://github.com/nex-agi/Nex-N2
paper:
- desc: ACL 2026顶会论文，提出将LLM上下文窗口扩展至1600万Token。通过Token级重要性感知机制实现超长上下文的精准建模，在长文档理解与多轮对话等任务中刷新SOTA，为超长上下文LLM应用奠定基础。
  tags:
  - ACL 2026
  - Long Context
  - LLM
  - 16M Tokens
  title: 'Every Token Counts: Generalizing 16M Ultra-Long Context in Large Language
    Models'
  url: https://aclanthology.org/2026.acl-long.464/
tech:
  Arch:
  - desc: ARM于2026年正式发布ARMv10-A架构，相较ARMv9实现单线程IPC 30%的提升。集成原生AI加速指令（Matrix Multiplication
      Engine指令扩展），支持INT8/FP16混合精度推理，目标覆盖端侧AI推理与边缘计算场景。
    tags:
    - ARMv10
    - ISA
    - AI加速
    - IPC提升
    title: ARMv10指令集架构发布：IPC提升30%，原生AI加速引擎落地
  Audio:
  - desc: ICLR 2026录用论文，首次将Mamba状态空间模型与扩散控制结合用于语音克隆。相比Transformer架构推理速度提升3倍以上，在语音自然度与说话人相似度指标上达到新SOTA，仅需3秒参考音频即可完成高质量零样本克隆。
    tags:
    - ICLR 2026
    - TTS
    - State-Space Model
    - Diffusion
    title: 'MambaVoiceCloning: Efficient and Expressive Text-to-Speech via State-Space
      Modeling and Diffusion Control'
    url: https://arxiv.org/abs/2604.00292
  CPU:
  - desc: Intel于CES 2026发布Panther Lake处理器（Core Ultra 300系列），首发Intel 18A（1.8nm级）制程。最高14核心（P-core
      + E-core + LP E-core三丛集），P-core频率达5.1GHz，集成第四代NPU（AI算力达48 TOPS），共14款SKU覆盖9W至45W。
    tags:
    - Intel 18A
    - Panther Lake
    - Core Ultra
    - AI PC
    title: Intel Core Ultra Series 3 (Panther Lake)：首款Intel 18A制程AI PC平台
  Computer Vision:
  - desc: CVPR 2026论文，提出可扩展的测试时训练框架用于大规模3D重建。通过动态适配机制在推理阶段优化场景表征，无需额外标注即可提升重建精度，在稀疏视角与大场景设定下显著超越现有方法。
    tags:
    - CVPR 2026
    - 3D重建
    - Test-Time Training
    - 可扩展架构
    title: 'Scal3R: Scalable Test-Time Training for Large-Scale 3D Reconstruction'
    url: https://arxiv.org/abs/2604.08542
  GPU:
  - desc: AMD Radeon RX 9060基于RDNA 4架构Navi 44 GPU，配备28个CU（1792个流处理器），搭载8GB 18Gbps
      GDDR6显存，TDP仅132W。主打1080p高帧率游戏，支持FSR 4与AI加速，定位主流级甜品市场。
    tags:
    - RDNA 4
    - AMD
    - 显卡
    - GDDR6
    title: AMD Radeon RX 9060：RDNA 4主流级正式上市
  Lang:
  - desc: JetBrains于2026年6月发布Kotlin 2.4.0，引入guard condition守卫子句语法（减少嵌套层级）、Kotlin/Native类型安全增强、以及K2编译器性能大幅优化。在JVM、JS、Native三平台编译速度平均提升15-20%。
    tags:
    - Kotlin
    - JVM
    - 编程语言
    - JetBrains
    title: Kotlin 2.4.0 正式发布：守卫子句与跨平台类型安全全面升级
  NLP:
  - desc: ACL 2026论文，突破LLM超长上下文瓶颈，将上下文窗口扩展至1600万Token量级。提出Token级重要性感知机制，在全长上下文中精准捕获关键信息，在长文档理解、多轮对话等任务中取得SOTA。
