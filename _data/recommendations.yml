  - desc: Arm于2026年3月Arm Everywhere大会上发布首款自研CPU——Arm AGI CPU。采用TSMC 3nm工艺，基于Armv9.6-A指令集架构，最高配置136个Neoverse
      Hercules核心，TDP 300W。集成PCIe 6.0、CXL 3.1与HBM3e控制器，专为Agentic AI推理与大规模云端工作负载设计。Meta为首发客户，标志着Arm从IP授权商向芯片供应商的战略延伸。
    tags:
