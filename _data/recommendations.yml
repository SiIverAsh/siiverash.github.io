  Net:
  - desc: Linux内核社区提交QUIC协议原生支持的net-next v11补丁系列（15个补丁），由Red Hat工程师Xin Long主导。核心实现包括：定义IPPROTO_QUIC与SOL_QUIC常量、构建内核级QUIC
      Socket基础设施、实现路径管理与连接迁移（Path Management & Connection Migration）、以及Stream多路复用框架。相比用户态QUIC实现，内核原生方案可减少上下文切换开销40%以上，吞吐量提升至用户态的1.8倍。目标合入Linux
      6.12+主线。
    tags:
    - QUIC
    - Linux Kernel
    - net-next
    - Transport Protocol
    - Socket
    title: Linux Kernel 原生 QUIC 协议栈：net-next v11 补丁系列
  News:
  - desc: 2026年5月12日，国家市场监督管理总局与国家标准化管理委员会正式发布《人工智能终端智能化分级》系列国家标准（GB/Z 177系列）。该标准将AI终端从L1至L5分为五个智能等级，涵盖感知智能、认知智能、决策智能与自主智能等维度。适用于智能手机、PC、智能家居、车载终端等产品品类的AI能力评估与认证。这是全球首个面向AI终端智能分级的国家级标准体系，为AI终端产业规范化和消费者选购提供权威依据。
    tags:
    - AI Standard
    - National Standard
    - Terminal Intelligence
    - GB/Z 177
