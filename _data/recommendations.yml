  - desc: 2026年6月，3GPP新加坡全会正式批准Release 21，锁定6G标准化时间表。Rel-21将定义6G场景与技术需求（含AI原生空口、通感一体化等），预计2029年完成ASN.1/OpenAPI冻结，2030年实现6G商用部署。
    tags:
