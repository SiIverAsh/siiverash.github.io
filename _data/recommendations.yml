  - 开源大模型
  - 中文理解
  - 千亿参数
  - 多模态
  title: 'Baichuan 4: 百川智能开源千亿参数大模型'
new_project:
- desc: 由Karpathy贡献的模板，指导如何使用Claude进行高效代码生成。包含提示工程、代码风格和调试技巧，已在GitHub获得超6000星标，适用于AI辅助编程工作流。
  tags:
  - 代码生成
  - 提示工程
  - 最佳实践
  - GitHub
  title: 'CLAUDE.md: Claude代码最佳实践模板'
  url: https://github.com/shanraisshan/claude-code-best-practice/blob/main/CLAUDE.md
paper:
- desc: ICLR 2026口头报告论文，提出能量基于Transformer的生成模型，在长序列建模和推理任务中表现优异。方法结合能量模型和注意力机制，实现更好的可扩展性和样本效率，并在多个基准测试中刷新SOTA。
  tags:
  - Transformer
  - 能量模型
  - 生成模型
  - ICLR 2026
  title: Energy-Based Transformers are Scalable Learners and Thinkers
  url: https://iclr.cc/virtual/2026/oral/10008833
