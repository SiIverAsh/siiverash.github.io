    - Low Latency
    - IETF
    title: 'QUIC v3: 低时延传输协议的进一步标准化'
  News:
  - desc: 日本国会通过《AI利用与治理基本法》，要求高风险AI系统进行影响评估，建立透明性义务与责任追究机制，并设立AI安全委员会，于2027年全面实施。
    tags:
    - AI Regulation
