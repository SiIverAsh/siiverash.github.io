new_project:
- desc: 开源AI Agent框架，让大语言模型能够像人类一样操控浏览器完成复杂任务。支持多标签页管理、表单填写、动态内容交互与视觉定位，内置自愈机制与XPath/CSS选择器智能回退。支持LangChain、CrewAI等多Agent编排框架集成，已广泛应用于Web自动化测试、价格监控、表单自动填报等场景。GitHub
    Stars迅速增长至100K+，成为2026年最活跃的AI Agent工具链项目之一。
  tags:
  - AI Agent
  - Browser Automation
  - Web Scraping
  - LLM
  title: browser-use/browser-use
  url: https://github.com/browser-use/browser-use
paper:
- desc: NeurIPS 2025最佳论文奖(Best Paper)。该研究颠覆性地指出：当模型在推理阶段分配更多计算资源时，传统微调中追求高置信度的策略反而会损害数学推理能力。论文提出Confidence-Limited
    Fine-Tuning (CLFT)方法，通过在训练时主动限制模型置信度上界，保留推理不确定性，使test-time compute scaling的效率提升2-3倍。在MATH、GSM8K等基准上使用额外推理计算时性能大幅超越标准SFT。
  tags:
  - NeurIPS 2025
  - Best Paper
  - Test-Time Compute
  - Mathematical Reasoning
  title: 'Rethinking Fine-Tuning when Scaling Test-Time Compute: Limiting Confidence
    Improves Mathematical Reasoning'
  url: https://proceedings.neurips.cc/paper_files/paper/2025/file/e8f4eae0a41cab67fdead3aa6b77f083-Paper-Conference.pdf
