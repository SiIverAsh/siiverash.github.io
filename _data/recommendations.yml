  - desc: o3/o4-mini首次引入图像思考机制，无需外部视觉编码器，直接处理像素级输入。在VQA、图像描述等任务上准确率超越GPT-4V，推理速度提升10倍，模型参数量仅20B，支持端到端多模态指令跟随。
    tags:
